<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MES FreshDesk Pro Max</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect rx='14' width='64' height='64' fill='%235FBC6B'/><path d='M32 12l3 7 7 3-7 3-3 7-3-7-7-3 7-3zM46 32l2 5 5 2-5 2-2 5-2-5-5-2 5-2zM24 38l2 4 4 2-4 2-2 4-2-4-4-2 4-2z' fill='white'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --f:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --white:#fff;--black:#1d1d1f;
    --g50:#fafafa;--g100:#f5f5f7;--g200:#e8e8ed;--g300:#d2d2d7;--g400:#aeaeb2;--g500:#86868b;--g600:#6e6e73;--g700:#48484a;
    --blue:#007aff;--blue2:#0055d4;--blue-bg:rgba(0,122,255,0.08);
    --green:#30d158;--green-bg:rgba(48,209,88,0.1);
    --orange:#ff9f0a;--orange-bg:rgba(255,159,10,0.1);
    --red:#ff453a;--red-bg:rgba(255,69,58,0.08);
    --purple:#bf5af2;--purple-bg:rgba(191,90,242,0.08);
    --teal:#64d2ff;
    --r:16px;--r2:12px;--r3:8px;
}
html,body{height:100%;overflow:hidden;font-family:var(--f);color:var(--black);background:var(--g100);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

/* ===== TOP NAV ===== */
nav{
    height:52px;display:flex;align-items:center;padding:0 20px;gap:10px;
    background:rgba(255,255,255,0.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-bottom:0.5px solid var(--g200);position:relative;z-index:100;
}
nav .brand{font-size:17px;font-weight:600;letter-spacing:-0.4px;color:var(--black)}
nav .dot{width:4px;height:4px;border-radius:50%;background:var(--g300);margin:0 6px}
nav input{
    height:30px;border:none;background:var(--g100);border-radius:8px;padding:0 10px;
    font:13px/30px var(--f);color:var(--black);outline:none;transition:all .2s;
}
nav input:focus{background:var(--white);box-shadow:0 0 0 3px rgba(0,122,255,0.25)}
nav input::placeholder{color:var(--g400)}
nav #inp-key{width:150px}
nav #inp-domain{width:180px}
nav #inp-search{width:200px;margin-left:auto}
nav .nbtn{
    height:30px;padding:0 14px;border:none;border-radius:980px;
    font:500 12px/30px var(--f);cursor:pointer;transition:all .2s;
}
nav .nbtn.primary{background:var(--blue);color:var(--white)}
nav .nbtn.primary:hover{background:var(--blue2)}
nav .nbtn.ghost{background:none;color:var(--g600)}
nav .nbtn.ghost:hover{background:var(--g100)}
nav .conn-status{font:500 11px var(--f);color:var(--g400);white-space:nowrap}
nav .conn-status.on{color:var(--green)}
nav .ticket-stats{font:600 11px var(--f);color:var(--g500);white-space:nowrap;margin-left:8px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;transition:opacity .15s}
nav .ticket-stats:hover{opacity:.7}
nav .ticket-stats .stat-group{display:inline-flex;align-items:center;gap:4px;background:var(--g100);padding:2px 10px;border-radius:10px}
nav .ticket-stats .stat-label{font-weight:500;color:var(--g400);margin-right:2px}
nav .ticket-stats .pct{font-weight:700;padding:1px 6px;border-radius:8px}
nav .ticket-stats .pct.green{background:#dcfce7;color:#16a34a}
nav .ticket-stats .pct.amber{background:#fef3c7;color:#d97706}
nav .ticket-stats .pct.red{background:#fee2e2;color:#dc2626}

/* ===== DASHBOARD ===== */
.dash{padding:32px 40px 80px;max-width:1100px;animation:fadeUp .3s ease}
.dash-title{font:700 28px/1.2 var(--f);color:var(--black);letter-spacing:-0.8px;margin-bottom:28px}
.dash-title span{font-weight:400;color:var(--g400);font-size:16px;margin-left:8px}

.dash-heroes{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:12px}
.dash-hero{background:var(--white);border-radius:var(--r);padding:24px 28px;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:all .2s}
.dash-hero[onclick]{cursor:pointer}
.dash-hero[onclick]:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-2px)}
.dash-hero[onclick]:active{transform:translateY(0);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.dash-hero .dh-num{font:800 42px/1 var(--f);letter-spacing:-1.5px;color:var(--black)}
.dash-hero .dh-label{font:500 13px/1 var(--f);color:var(--g500);margin-top:8px}
.dash-hero .dh-sub{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap}
.dash-hero .dh-pill{font:600 12px/1 var(--f);padding:5px 12px;border-radius:980px;display:inline-flex;align-items:center;gap:4px;cursor:pointer;transition:all .15s}
.dash-hero .dh-pill:hover{filter:brightness(0.92)}
.dash-hero .dh-pill:active{transform:scale(0.95)}
.dh-pill.blue{background:var(--blue-bg);color:var(--blue)}
.dh-pill.green{background:#dcfce7;color:#16a34a}
.dh-pill.red{background:#fee2e2;color:#dc2626}
.dh-pill.orange{background:#fef3c7;color:#d97706}
.dh-pill.purple{background:var(--purple-bg);color:#7c3aed}
.dh-pill.teal{background:rgba(100,210,255,.12);color:#0891b2}

.dash-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
.dash-pills .dp{font:500 12px/1 var(--f);padding:6px 14px;border-radius:980px;background:var(--white);color:var(--g600);box-shadow:0 1px 3px rgba(0,0,0,.05);display:inline-flex;align-items:center;gap:5px}
.dash-pills .dp[onclick]{cursor:pointer;transition:all .15s}
.dash-pills .dp[onclick]:hover{background:var(--blue-bg);color:var(--blue)}
.dash-pills .dp[onclick]:active{transform:scale(0.95)}
.dash-pills .dp strong{font-weight:700;color:var(--black)}

.dash-section{font:600 15px/1 var(--f);color:var(--black);letter-spacing:-0.2px;margin:32px 0 14px}
.dash-section:first-of-type{margin-top:8px}

.dash-agents{display:flex;flex-direction:column;gap:8px;margin-bottom:28px}
.dash-agent{background:var(--white);border-radius:var(--r2);padding:16px 20px;box-shadow:0 1px 3px rgba(0,0,0,.04);display:flex;align-items:center;gap:16px;transition:all .15s}
.dash-agent:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.dash-agent .da-name{font:600 14px/1 var(--f);color:var(--black);min-width:130px;cursor:pointer}
.dash-agent .da-name:hover{color:var(--blue)}
.dash-agent .da-stats{display:flex;gap:6px;flex:1;flex-wrap:wrap;align-items:center}
.da-chip{font:600 11px/1 var(--f);padding:5px 10px;border-radius:980px;cursor:pointer;transition:all .12s;white-space:nowrap}
.da-chip:hover{filter:brightness(0.88);transform:scale(1.04)}
.da-chip:active{transform:scale(0.96)}
.da-chip.assigned{background:var(--blue-bg);color:var(--blue)}
.da-chip.responded{background:#dcfce7;color:#16a34a}
.da-chip.noresp{background:#fef3c7;color:#d97706}
.da-chip.merged{background:#fee2e2;color:#dc2626}
.da-chip.open{background:var(--purple-bg);color:#7c3aed}
.da-chip.pending{background:rgba(100,210,255,.12);color:#0891b2}
.da-chip.resolved{background:#dcfce7;color:#16a34a}
.da-chip.closed{background:var(--g100);color:var(--g600)}
.dash-agent .da-bar-wrap{width:120px;flex-shrink:0;display:flex;align-items:center;gap:6px}
.dash-agent .da-bar-bg{flex:1;height:6px;background:var(--g100);border-radius:3px;overflow:hidden}
.dash-agent .da-bar-fill{height:100%;border-radius:3px;background:var(--blue);transition:width .4s ease}
.dash-agent .da-pct{font:700 11px/1 var(--f);color:var(--g500);min-width:30px;text-align:right}

.dash-grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
@media(max-width:900px){.dash-grid3{grid-template-columns:1fr}}
.dash-mini{background:var(--white);border-radius:var(--r2);padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.dash-mini .dm-title{font:600 12px/1 var(--f);color:var(--g500);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.3px}
.dash-mini .dm-row{display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid var(--g100);cursor:pointer;transition:background .1s;border-radius:4px;padding:6px 8px;margin:0 -8px}
.dash-mini .dm-row:last-child{border-bottom:none}
.dash-mini .dm-row:hover{background:var(--blue-bg)}
.dash-mini .dm-row:active{background:var(--blue);color:var(--white)}
.dash-mini .dm-row:active .dm-label,.dash-mini .dm-row:active .dm-val{color:var(--white)}
.dash-mini .dm-label{font:13px/1 var(--f);color:var(--black)}
.dash-mini .dm-val{font:600 13px/1 var(--f);color:var(--g600);font-variant-numeric:tabular-nums}

.dash-chart{background:var(--white);border-radius:var(--r2);padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);margin-bottom:28px}
.dash-chart-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:4px 0;border-radius:6px;transition:background .1s}
.dash-chart-row:last-child{margin-bottom:0}
.dash-chart-row[onclick]{cursor:pointer}
.dash-chart-row[onclick]:hover{background:var(--g50)}
.dash-chart-label{font:500 12px/1 var(--f);color:var(--g600);width:90px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dash-chart-bar-bg{flex:1;height:22px;background:var(--g100);border-radius:6px;overflow:hidden}
.dash-chart-bar-fill{height:100%;border-radius:6px;transition:width .5s ease}
.dash-chart-val{font:600 12px/22px var(--f);color:var(--g600);min-width:36px;text-align:left}

.dash-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:28px}
.dash-tag{font:500 12px/1 var(--f);padding:6px 14px;border-radius:980px;background:var(--white);color:var(--g600);box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.dash-tag:hover{background:var(--blue-bg);color:var(--blue);box-shadow:0 2px 6px rgba(0,0,0,.08)}
.dash-tag:active{transform:scale(0.95)}
.dash-tag strong{font-weight:700;color:var(--black)}

.dash-footer{font:12px var(--f);color:var(--g400);margin-top:32px;padding-top:16px;border-top:0.5px solid var(--g200)}

.dd-back{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:980px;font:600 12px/1 var(--f);color:var(--blue);background:var(--blue-bg);border:none;cursor:pointer;margin-bottom:20px;transition:all .15s}
.dd-back:hover{background:var(--blue);color:var(--white)}
.dd-count{font:500 14px var(--f);color:var(--g500);margin-bottom:16px}
.dd-tkt{display:flex;gap:12px;padding:12px 16px;border-bottom:0.5px solid var(--g100);cursor:pointer;transition:background .12s;border-radius:var(--r3)}
.dd-tkt:hover{background:var(--blue-bg)}
.dd-tkt:active{background:var(--blue);color:var(--white)}
.dd-tkt:active .ttl,.dd-tkt:active .sub,.dd-tkt:active .time{color:var(--white)}
.dd-tkt .pri{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0}
.dd-tkt .col{flex:1;min-width:0}
.dd-tkt .ttl{font:500 13px/1.4 var(--f);color:var(--black);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dd-tkt .sub{font:12px/1.3 var(--f);color:var(--g500);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dd-tkt .right{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.dd-tkt .time{font:11px var(--f);color:var(--g400)}

/* ===== LAYOUT ===== */
.app{display:flex;height:calc(100vh - 52px)}

/* ===== LEFT PANEL ===== */
.left{width:420px;display:flex;flex-direction:column;background:var(--white);border-right:0.5px solid var(--g200)}
.tabs{display:flex;padding:12px 10px 0;gap:3px;overflow:hidden}
.tabs button{
    height:32px;padding:0 10px;border:none;border-radius:980px;
    font:500 12px var(--f);cursor:pointer;color:var(--g600);background:none;transition:all .15s;white-space:nowrap;min-width:0;flex-shrink:1;
}
.tabs button:hover{background:var(--g100)}
.tabs button.on{background:var(--black);color:var(--white)}
.tabs button.on .tab-badge{opacity:.9}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;border-radius:8px;color:#fff;font:700 9px/1 var(--f);padding:0 4px;margin-left:4px;vertical-align:middle}
.tab-badge.bg-red{background:#e53e3e}
.tab-badge.bg-amber{background:#b36b00}
.tab-badge.bg-purple{background:#7c3aed}
.tab-badge.bg-green{background:#1a8a3a}
.tab-badge.bg-gray{background:var(--g400)}
.list{flex:1;overflow-y:auto;padding:8px 0;will-change:scroll-position}
.list::-webkit-scrollbar{width:0;background:transparent}
.tkt{
    display:flex;gap:12px;padding:12px 16px;cursor:pointer;
    border-bottom:0.5px solid var(--g100);transition:background .12s;position:relative;
    contain:layout style;
}
.tkt:hover{background:var(--g50)}
.tkt.active{background:var(--blue-bg)}
.tkt.active::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--blue)}
.tkt .pri{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0}
.tkt .col{flex:1;min-width:0}
.tkt .ttl{font:500 13px/1.3 var(--f);color:var(--black);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tkt .sub{font:12px var(--f);color:var(--g500);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tkt .right{text-align:right;flex-shrink:0}
.tkt .time{font:11px var(--f);color:var(--g400)}
.tkt .indicator{
    display:inline-block;margin-top:4px;height:18px;padding:0 7px;border-radius:980px;
    font:600 9px/18px var(--f);letter-spacing:0.3px;text-transform:uppercase;
}
.tkt .indicator.yours{background:var(--orange-bg);color:#b36b00}
.tkt .indicator.wait{background:var(--green-bg);color:#1a8a3a}
.tkt .indicator.new{background:var(--blue-bg);color:var(--blue)}
.tkt .indicator.pend{background:var(--purple-bg);color:#7c3aed}
.ctx-menu{position:fixed;background:var(--white);border:1px solid var(--g200);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);padding:4px 0;z-index:999;min-width:160px}
.ctx-menu div{padding:7px 14px;font:500 12px/1.4 var(--f);cursor:pointer;color:var(--black)}
.ctx-menu div:hover{background:var(--g100)}
.tkt .indicator.stale{background:var(--red-bg);color:#c00}
.pgr{display:flex;gap:8px;padding:10px;justify-content:center;border-top:0.5px solid var(--g200)}
.pgr button{
    height:28px;padding:0 12px;border:0.5px solid var(--g200);border-radius:8px;
    font:12px var(--f);cursor:pointer;background:var(--white);color:var(--g600);
}
.pgr button:disabled{opacity:.3;cursor:default}
.pgr span{font:12px var(--f);color:var(--g400);align-self:center}

/* ===== RIGHT PANEL ===== */
.right-panel{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--g100)}
#hdr{flex-shrink:0}
#tab-bar{flex-shrink:0}
#scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
#scroll-area::-webkit-scrollbar{width:6px}
#scroll-area::-webkit-scrollbar-track{background:transparent}
#scroll-area::-webkit-scrollbar-thumb{background:var(--g300);border-radius:3px}
.rpad{padding:24px 32px 60px;max-width:800px}

.hdr-box{padding:20px 32px;background:var(--white);border-bottom:0.5px solid var(--g200)}
.hdr-box h1{font:600 20px/1.35 var(--f);letter-spacing:-0.4px;color:var(--black);margin-bottom:8px}
.hdr-box .chips{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.hdr-box .hdr-actions{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn-fd{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:980px;font:600 11px/1 var(--f);color:var(--white);background:linear-gradient(135deg,#0ea5e9,#6366f1);border:none;cursor:pointer;text-decoration:none;letter-spacing:0.2px;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.btn-fd:hover{opacity:.88;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.btn-fd svg{width:12px;height:12px;fill:currentColor}
.btn-group{display:inline-flex;box-shadow:0 1px 3px rgba(0,0,0,.1);border-radius:980px;overflow:hidden}
.btn-group .btn-fd{border-radius:0;box-shadow:none}
.btn-gl{border-radius:980px 0 0 980px!important;padding-right:12px}
.btn-gr{border-radius:0 980px 980px 0!important;padding-left:12px;border-left:1px solid rgba(255,255,255,.25)}
.btn-sp{background:linear-gradient(135deg,#22c55e,#16a34a);color:#1a1a1a}
.btn-sp:hover{opacity:.88}
.btn-group .btn-sp.btn-gr{border-left:1px solid rgba(0,0,0,.12)}
.btn-sw{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff}
.btn-sw:hover{opacity:.88}
.btn-sw svg{stroke:currentColor;fill:none}
.btn-kbr{background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a1a1a}
.btn-kbr:hover{opacity:.88}
.btn-kbr svg{stroke:currentColor;fill:none}
.chip{
    height:22px;padding:0 9px;border-radius:980px;
    font:600 10px/22px var(--f);letter-spacing:0.2px;display:inline-flex;align-items:center;
}
.chip-open{background:var(--blue-bg);color:var(--blue)}
.chip-pending{background:var(--orange-bg);color:#b36b00}
.chip-resolved{background:var(--green-bg);color:#1a8a3a}
.chip-closed{background:var(--g100);color:var(--g500)}
.chip-urg{background:var(--red-bg);color:var(--red)}
.chip-high{background:var(--orange-bg);color:#c05500}
.chip-med{background:#fff8e1;color:#9a7b00}
.chip-low{background:var(--green-bg);color:#1a8a3a}
.chip-meta{background:none;color:var(--g500);padding:0;font-weight:400;font-size:12px}

.tab-row{display:flex;padding:0 32px;background:var(--white);border-bottom:0.5px solid var(--g200)}
.tab-row button{
    height:42px;padding:0 6px;margin:0 10px;border:none;border-bottom:2px solid transparent;
    font:500 13px var(--f);color:var(--g500);background:none;cursor:pointer;transition:all .15s;
}
.tab-row button:hover{color:var(--black)}
.tab-row button.on{color:var(--blue);border-bottom-color:var(--blue)}
.tab-row .bdg{
    display:inline-flex;height:16px;padding:0 5px;border-radius:8px;
    font:600 10px/16px var(--f);background:var(--g100);color:var(--g500);margin-left:4px;
}
.tab-row button.on .bdg{background:var(--blue-bg);color:var(--blue)}

/* ===== SUMMARY CONTENT ===== */
.action-strip{
    display:flex;align-items:center;gap:16px;padding:20px 24px;border-radius:var(--r);margin-bottom:20px;
    font:600 15px/1.3 var(--f);letter-spacing:-0.2px;
    animation:fadeUp .2s ease;position:relative;overflow:hidden;
}
.action-strip::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;opacity:.04;background:radial-gradient(ellipse at 20% 50%,currentColor,transparent 70%)}
.action-strip .emoji{font-size:28px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.1))}
.action-strip .desc{flex:1}
.action-strip .when{font:500 12px var(--f);opacity:.5;background:rgba(255,255,255,.5);padding:3px 10px;border-radius:980px}
.action-strip.act-respond{background:linear-gradient(135deg,#fff7ed,#fff1e0);color:#7c2d12}
.action-strip.act-waiting{background:linear-gradient(135deg,#faf5ff,#f3e8ff);color:#581c87}
.action-strip.act-followup{background:linear-gradient(135deg,#fef2f2,#ffe4e6);color:#7f1d1d}
.action-strip.act-new{background:linear-gradient(135deg,#eff6ff,#dbeafe);color:#1e3a8a}

.grid-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;animation:fadeUp .2s ease}
.gs{background:var(--white);border-radius:var(--r2);padding:18px 16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid var(--g100);transition:all .15s}
.gs:hover{border-color:var(--g200);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.gs .n{font:700 26px var(--f);color:var(--blue);letter-spacing:-.5px}
.gs .l{font:500 11px var(--f);color:var(--g400);margin-top:4px;text-transform:uppercase;letter-spacing:.3px}

<script>
const PC={1:'var(--green)',2:'var(--orange)',3:'var(--red)',4:'var(--red)'};
const PN={1:'Low',2:'Medium',3:'High',4:'Urgent'};

const SN={2:'Open',3:'Pending',4:'Resolved',5:'Closed',8:'ReOpen',9:'On-hold',11:'Waiting for local engineer'};

var _praw=JSON.parse(localStorage.getItem('fd_pending')||'[]');
var _pend=new Set(Array.isArray(_praw)?_praw:Object.keys(_praw).map(Number));

var _aiSeedExamples=[
{c:"error crash not working problem",a:"I would like to check the issue remotely. Please let me know what time works best for you.",l:"en"},
{c:"error falla problema no funciona",a:"Comprendo, ¿me puedes dar acceso remoto para revisarlo?",l:"es"},

{c:"gracias ya funciona resuelto todo bien",a:"Me da gusto, cualquier cosa estamos para apoyarte.",l:"es"},
{c:"teamviewer remote session tv id password credentials",a:"I am available now. Please give me the TeamViewer session.",l:"en"},
{c:"teamviewer acceso remoto credenciales sesion",a:"Claro, ¿me compartes las credenciales de TeamViewer?",l:"es"},
{c:"i will check test verify get back health check tomorrow",a:"Sounds good, take your time. I will be here if you need anything.",l:"en"},
{c:"voy a verificar revisar probar mañana te confirmo",a:"Perfecto, quedo al pendiente de tu confirmación.",l:"es"},
{c:"done installed applied loaded listo ya lo hice",a:"Is everything working properly now?",l:"en"},
{c:"listo ya lo instalé ya lo apliqué ya cargué",a:"¿Todo funcionando correctamente?",l:"es"},
{c:"how to can you is it possible question",a:"Please refer to the following steps:",l:"en"},
{c:"como puedo es posible pregunta",a:"Claro, los pasos serían los siguientes:",l:"es"},
{c:"still same problem persists again otra vez",a:"Could you share remote access so I can take a look?",l:"en"},
{c:"sigue igual mismo problema persiste otra vez",a:"Comprendo, ¿me puedes dar acceso remoto para revisarlo directamente?",l:"es"},
{c:"available now schedule time when hora disponible",a:"Are you available now? If so, please provide TeamViewer session.",l:"en"},
{c:"disponible hora cuando sesion remota",a:"¿Qué hora te parece bien para la sesión remota?",l:"es"},
{c:"quotation cotizacion quote precio",a:"Adjunto cotización. Una vez recibida, el tiempo de desarrollo es de aproximadamente 4 semanas.",l:"es"}
];
var _aiExamples=JSON.parse(localStorage.getItem('fd_ai_examples')||'[]');
var _aiCorrections=JSON.parse(localStorage.getItem('fd_ai_corrections')||'[]');
function saveAIExample(customerMsg,agentReply,lang,subject){
    if(!customerMsg||!agentReply)return;
    _aiExamples.push({c:customerMsg.substring(0,500),a:agentReply.substring(0,500),l:lang,s:(subject||'').substring(0,80),d:Date.now()});
    if(_aiExamples.length>200)_aiExamples=_aiExamples.slice(-200);
    try{localStorage.setItem('fd_ai_examples',JSON.stringify(_aiExamples))}catch(e){}
}
function saveAICorrection(aiDraft,userEdit,lang){
    if(!aiDraft||!userEdit||aiDraft===userEdit)return;
    _aiCorrections.push({ai:aiDraft.substring(0,400),user:userEdit.substring(0,400),l:lang,d:Date.now()});
    if(_aiCorrections.length>50)_aiCorrections=_aiCorrections.slice(-50);
    try{localStorage.setItem('fd_ai_corrections',JSON.stringify(_aiCorrections))}catch(e){}
}
function getCorrectionHints(lang,n){
    var recent=_aiCorrections.filter(function(x){return x.l===lang}).slice(-n);
    if(!recent.length)return '';
    var hints=recent.map(function(c){return '\n- YOU wrote: "'+c.ai.substring(0,150)+'..."\n  USER changed to: "'+c.user.substring(0,150)+'..."'});
    return (lang==='es'
        ?'\n\nCORRECCIONES PREVIAS (el usuario editó tus respuestas — aprende de esto):'
        :'\n\nPREVIOUS CORRECTIONS (user edited your replies — learn from this):')+hints.join('');
}
var _aiStopWords=new Set(['the','a','an','is','are','was','were','be','been','to','of','in','for','on','with','at','by','that','this','it','and','or','but','not','no','from','as','do','did','has','have','had','will','can','could','would','should','i','you','we','they','he','she','me','my','your','our','el','la','los','las','un','una','de','del','en','por','para','con','que','es','son','no','se','lo','al','como','su','nos','le','te','mi','tu','ya','si','más','muy']);
function getAIExamples(lang,n,customerMsg){
    var all=_aiSeedExamples.concat(_aiExamples);
    var matching=all.filter(function(x){return x.l===lang});
    if(!customerMsg||!matching.length)return matching.slice(-n);
    var stop=_aiStopWords;
    var words=customerMsg.toLowerCase().replace(/[^a-záéíóúñü\s]/g,'').split(/\s+/).filter(function(w){return w.length>2&&!stop.has(w)});
    if(!words.length)return matching.slice(-n);
    var wordSet=new Set(words);
    var scored=matching.map(function(ex){
        var exWords=ex.c.toLowerCase().replace(/[^a-záéíóúñü\s]/g,'').split(/\s+/).filter(function(w){return w.length>2&&!stop.has(w)});
        var hits=exWords.filter(function(w){return wordSet.has(w)}).length;
        var score=hits/Math.max(wordSet.size,1);
        return{ex:ex,score:score};
    });
    scored.sort(function(a,b){return b.score-a.score});
    var result=[];
    for(var i=0;i<scored.length&&result.length<n;i++){
        if(scored[i].score>0.1)result.push(scored[i].ex);
    }
    return result;
}
let D={key:'',dom:'',tks:[],cur:null,cvs:[],fl:2,pg:1,pgs:1,aid:null,anm:'',sig:'',allOpen:[],lr:{},newTks:[],pending:_pend};

document.getElementById('inp-search').onkeydown=e=>{if(e.key==='Enter')doSearch()};
document.getElementById('inp-key').onkeydown=e=>{if(e.key==='Enter')connect()};
function toggleKey(){const i=document.getElementById('inp-key');i.type=i.type==='password'?'text':'password'}

(function(){const k=localStorage.getItem('fd_apikey');if(k){document.getElementById('inp-key').value=k;setTimeout(connect,300)}})();

var _q=[],_qPri=[],_qRun=0,_qPriRun=0,_qMax=6,_qNormMax=4;
function _qFlush(){
    while(_qPri.length&&_qRun<_qMax){_qRun++;_qPriRun++;var pj=_qPri.shift();pj()}
    while(_q.length&&_qRun<_qMax&&(_qRun-_qPriRun)<_qNormMax){_qRun++;var nj=_q.shift();nj()}
}
function api(p,opts){
    opts=opts||{};
    var isPri=!!opts.priority;
    return new Promise(function(resolve,reject){
        var fn=function(){
            var retries=0;
            function attempt(){
                var init={headers:{'X-FD-Key':D.key,'X-FD-Domain':D.dom}};
                if(opts.method){init.method=opts.method;init.headers['Content-Type']='application/json'}
                if(opts.body)init.body=opts.body;
                fetch('/fd/'+p,init).then(function(r){
                    if(r.status===429&&retries<3){
                        retries++;
                        var ra=r.headers.get('Retry-After');
                        var wait=ra?parseInt(ra)*1000:Math.pow(2,retries)*1000;
                        setTimeout(attempt,wait);return;
                    }
                    _qRun--;if(isPri)_qPriRun--;_qFlush();
                    if(!r.ok){reject(new Error('API '+r.status));return}
                    resolve(r);
                }).catch(function(e){_qRun--;if(isPri)_qPriRun--;_qFlush();reject(e)});
            }
            attempt();
        };
        if(isPri){_qPri.push(fn)}else{_q.push(fn)}
        _qFlush();
    });
}
async function get(p,opts){return(await api(p,opts)).json()}

async function connect(){
    D.key=document.getElementById('inp-key').value.trim();
    D.dom=document.getElementById('inp-domain').value.trim();
    if(!D.key||!D.dom)return st('Enter key & domain');
    st('Connecting...');
    try{
        const me=await get('agents/me');D.aid=me.id;D.anm=me.contact?me.contact.name:'Agent';D.sig=me.signature||'';
        localStorage.setItem('fd_apikey',D.key);st(D.anm,1);

var _statsRun=0,_statsCache={ts:0,allT:null,myT:null,resp6:null},_statsMerged=new Set(),_statsNoResp=new Set();
async function loadStats(){
    var run=++_statsRun;
    try{
        var yr=new Date().getFullYear(),now=new Date();
        var tags=["branchkya","KYA Internal"];
        var mes="cf_rand412401:'MES'";
        var el=document.getElementById('ticket-stats');
        var CK='fd_resp6';
        var cache=JSON.parse(localStorage.getItem(CK)||'{}');
        var merged=new Set();
        var noResp=new Set();
        Object.keys(cache).forEach(function(k){
            if(cache[k]==='merged')merged.add(Number(k));
            else if(!cache[k])noResp.add(Number(k));
        });
        _statsMerged=merged;_statsNoResp=noResp;

        function render(allT,myT){
            if(_statsRun!==run)return;
            var total=0,totalClosed=0,closed=0;
            allT.forEach(function(t){if(!merged.has(t.id)){total++;if(t.status===4||t.status===5){totalClosed++;if(t.responder_id===D.aid)closed++}}});
            var mine=0;
            myT.forEach(function(t){if(!noResp.has(t.id)&&!merged.has(t.id))mine++});
            var closedPct=totalClosed>0?Math.round(closed/totalClosed*100):0;
            var pct=total>0?Math.round(mine/total*100):0;
            var clr=pct>=30?'green':pct>=20?'amber':'red';
            var clrC=closedPct>=30?'green':closedPct>=20?'amber':'red';
            el.innerHTML='<span class="stat-group"><span class="stat-label">Assigned</span>'+mine+' / '+total+' <span class="pct '+clr+'">'+pct+'%</span></span><span class="stat-group"><span class="stat-label">Resolved</span>'+closed+' / '+totalClosed+' <span class="pct '+clrC+'">'+closedPct+'%</span></span>';
            el.title=D.anm+' '+yr+': Assigned '+mine+' de '+total+' ('+pct+'%) · Resolved '+closed+' de '+totalClosed+' ('+closedPct+'%)';
            el.style.display='';
        }

        var allT,myT;
        if(_statsCache.allT&&Date.now()-_statsCache.ts<900000){
            allT=_statsCache.allT;myT=_statsCache.myT;
        }else{
            async function pages(q){
                var out=[],pg=1;
                while(pg<=10){
                    try{
                        var d=await get('search/tickets?query='+encodeURIComponent(q)+'&page='+pg);
                        var r=d.results||[];out=out.concat(r);if(r.length<30)break;pg++;
                    }catch(e){break}
                }
                return out;
            }
            var qtr=[['-01-01','-04-01'],['-04-01','-07-01'],['-07-01','-10-01'],['-10-01','-01-01']];
            var queries=[];
            for(var i=0;i<4;i++){
                var ds=yr+qtr[i][0];
                if(new Date(ds)>now)break;
                var prev=new Date(ds);prev.setDate(prev.getDate()-1);
                var ps=prev.getFullYear()+'-'+String(prev.getMonth()+1).padStart(2,'0')+'-'+String(prev.getDate()).padStart(2,'0');
                var de=i<3?(yr+qtr[i][1]):((yr+1)+'-01-01');
                var df="created_at:>'"+ps+"' AND created_at:<'"+de+"'";
                for(var ti=0;ti<tags.length;ti++){
                    queries.push('"'+"tag:'"+tags[ti]+"' AND "+mes+' AND '+df+'"');
                }
            }
            if(_statsRun!==run)return;
            var results=await Promise.all(queries.map(function(q){return pages(q)}));

            var seen=new Set();allT=[];myT=[];
            var yrs=String(yr);
            for(var i=0;i<results.length;i++)results[i].forEach(function(t){
                if(!seen.has(t.id)&&t.created_at&&t.created_at.slice(0,4)===yrs){
                    seen.add(t.id);allT.push(t);
                    if(t.responder_id===D.aid)myT.push(t);
                }
            });
            _statsCache={ts:Date.now(),allT:allT,myT:myT,resp6:cache};
        }

        render(allT,myT);

        var myIds=new Set(myT.map(function(t){return t.id}));
        var unchecked=allT.filter(function(t){return !(t.id in cache)||cache[t.id]===false});
        if(unchecked.length>0){
            for(var b=0;b<unchecked.length;b+=5){
                if(_statsRun!==run)return;
                var batch=unchecked.slice(b,b+5);
                await Promise.all(batch.map(function(t){
                    return get('tickets/'+t.id+'/conversations?per_page=100').then(function(convs){
                        var cl=convs||[];
                        var last=cl.length?cl[cl.length-1]:null;
                        var isMerged=last&&last.private&&last.body_text&&last.body_text.indexOf('merged into ticket')!==-1;
                        if(isMerged){cache[t.id]='merged';merged.add(t.id);}
                        else{
                            var has=cl.some(function(c){return c.incoming===false&&!c.private});
                            cache[t.id]=has;
                            if(!has)noResp.add(t.id);
                        }
                    }).catch(function(){});
                }));
                render(allT,myT);
                if(b%25===0){try{localStorage.setItem(CK,JSON.stringify(cache))}catch(e){}}
                await new Promise(function(r){setTimeout(r,1500)});
            }
            try{localStorage.setItem(CK,JSON.stringify(cache))}catch(e){}
        }
    }catch(e){console.warn('loadStats',e)}
}

async function fetchByStatus(st){
    try{
        let q='"agent_id:'+D.aid+' AND status:'+st+'"';
        let all=[],pg=1;
        while(true){
            const d=await get('search/tickets?query='+encodeURIComponent(q)+'&page='+pg);
            const res=d.results||[];
            all=all.concat(res);
            if(res.length<30||pg>=10)break;
            pg++;
        }
        return all;
    }catch(e){return[]}
}

async function checkLastReply(tid){
    var batch=await get('tickets/'+tid+'/conversations?per_page=100');
    if(!batch||!batch.length)return true;
    if(batch.length>=100){
        var page=2;
        while(true){
            var more=await get('tickets/'+tid+'/conversations?per_page=100&page='+page);
            if(!more||!more.length)break;
            batch=batch.concat(more);
            if(more.length<100)break;
            page++;
        }
    }
    for(var i=batch.length-1;i>=0;i--){if(!batch[i].private)return batch[i].incoming!==false}
    return true;
}

async function loadAll(){
    document.getElementById('list').innerHTML='<div class="loading-msg">Loading tickets</div>';

    const lists=await Promise.all([2,3,8].map(st=>fetchByStatus(st)));
    const seen=new Set();
    D.allOpen=[].concat(...lists).filter(t=>{if(seen.has(t.id))return false;seen.add(t.id);return true});
    D.lr={};
    var craw=JSON.parse(localStorage.getItem('fd_cache4')||'{}');
    const cache=craw._v===6?craw:{_v:6};
    let done=0;const total=D.allOpen.length;
    var _loadThrottle=0;function tick(){done++;showProg(done,total);if(!_loadThrottle){_loadThrottle=setTimeout(function(){_loadThrottle=0;applyFilter()},500)}}
    D.allOpen.forEach(function(t){
        var c=cache[t.id];

            else cache[t.id]={u:null,lr:r[0],rn:t._reqName,co:t._company};

async function loadNewTickets(){
    try{
        if(!D._teamIds){
            let allAgents=[],apg=1;
            while(true){
                const a=await get('agents?per_page=100&page='+apg);
                allAgents=allAgents.concat(a);
                if(a.length<100)break;
                apg++;
            }
            D._agentMap={};
            allAgents.forEach(a=>{D._agentMap[a.id]=a.contact?a.contact.name:'Agent #'+a.id});
            D._teamIds=allAgents.filter(a=>{
                const n=a.contact?a.contact.name:'';
                return /alexis|ramiro/i.test(n);
            }).map(a=>a.id);
        }
        if(!D._teamIds.length){D.newTks=[];updateNewBadge();return}

        var searchOne=async function(aid){
            let q='"agent_id:'+aid+' AND status:2"',r=[],pg=1;
            while(true){const d=await get('search/tickets?query='+encodeURIComponent(q)+'&page='+pg);const res=d.results||[];r=r.concat(res);if(res.length<30||pg>=10)break;pg++}
            return r;
        };
        var all=[].concat(...await Promise.all(D._teamIds.map(searchOne)));
        D._earlyNewIds=new Set(all.map(function(t){return t.id}));

        var noReply=[];
        var cache=D._cacheNew||(D._cacheNew={});
        await Promise.all(all.map(function(t){
            var c=cache[t.id];
            if(c&&c.u===t.updated_at&&c.ar!==undefined){
                t._reqName=c.rn;t._company=c.co;if(!c.ar)noReply.push(t);return Promise.resolve();
            }
            return get('tickets/'+t.id+'?include=stats,requester,company').then(function(d){
                var replied=!!(d.stats&&d.stats.agent_responded_at);
                t._reqName=d.requester?d.requester.name:'Unknown';
                t._company=coName(d);
                cache[t.id]={u:t.updated_at,rn:t._reqName,co:t._company,ar:d.stats?d.stats.agent_responded_at:null};
                if(!replied)noReply.push(t);
            }).catch(function(){noReply.push(t)});
        }));
        try{localStorage.setItem('fd_cache_new',JSON.stringify(cache))}catch(e){}
        D.newTks=noReply.sort(function(a,b){return a.created_at<b.created_at?-1:a.created_at>b.created_at?1:0});
        D._earlyNewIds=null;
        updateNewBadge();
    }catch(e){D.newTks=[];updateNewBadge()}
}

    const c=D.newTks.length;

    else{badge.style.display='none'}
}

function applyFilter(){
    var newIds=D._earlyNewIds||new Set(D.newTks.map(function(t){return t.id}));
    _newIdSet=newIds;
    if(D.fl==='new'){
        D.tks=D.newTks.slice();
    }
    else if(D.fl===2)D.tks=D.allOpen.filter(t=>D.lr[t.id]===true&&!D.pending.has(t.id)&&!newIds.has(t.id)).sort(function(a,b){return a.updated_at<b.updated_at?-1:a.updated_at>b.updated_at?1:0});
    else if(D.fl===4)D.tks=D.allOpen.filter(t=>D.pending.has(t.id)).sort(function(a,b){return b.updated_at<a.updated_at?-1:b.updated_at>a.updated_at?1:0});
    else if(D.fl===3)D.tks=D.allOpen.filter(t=>D.lr[t.id]===false&&!D.pending.has(t.id)&&!newIds.has(t.id)).sort(function(a,b){return b.updated_at<a.updated_at?-1:b.updated_at>a.updated_at?1:0});
    else D.tks=D.allOpen.slice().sort(function(a,b){return b.created_at<a.created_at?-1:b.created_at>a.created_at?1:0});
    D.pgs=1;
    rl();up();
    function setBadge(id,c){var b=document.getElementById(id);if(c>0){b.textContent=c;b.style.display='inline-flex'}else{b.style.display='none'}}
    var turnC=0,pendC=0,waitC=0;
    D.allOpen.forEach(function(t){if(D.pending.has(t.id))pendC++;else if(newIds.has(t.id)){}else if(D.lr[t.id]===true)turnC++;else if(D.lr[t.id]===false)waitC++});
    setBadge('turn-badge',turnC);
    setBadge('pend-badge',pendC);
    setBadge('wait-badge',waitC);
    setBadge('all-badge',D.allOpen.length);
}

function tkCtx(e,id){
    e.preventDefault();
    var old=document.getElementById('tk-ctx');if(old)old.remove();
    var isPend=D.pending.has(id);
    var isYours=D.lr[id]===true&&!isPend;
    var isWait=D.lr[id]===false&&!isPend;
    if(!isYours&&!isWait&&!isPend)return false;
    var m=document.createElement('div');m.id='tk-ctx';m.className='ctx-menu';
    m.style.left=e.clientX+'px';m.style.top=e.clientY+'px';
    if(isYours){
        var opt=document.createElement('div');opt.textContent='Move to Pending';
        opt.onclick=function(){m.remove();markPending(id)};m.appendChild(opt);
    }else if(isWait){
        var opt=document.createElement('div');opt.textContent='Move to Pending';
        opt.onclick=function(){m.remove();D.pending.add(id);savePending();applyFilter()};m.appendChild(opt);
    }else{
        var back=D.lr[id]===false?'Move back to Waiting':'Move back to My Turn';
        var opt=document.createElement('div');opt.textContent=back;
        opt.onclick=function(){m.remove();unmarkPending(id)};m.appendChild(opt);
    }
    document.body.appendChild(m);
    var close=function(){if(m.parentNode)m.remove();document.removeEventListener('click',close)};
    setTimeout(function(){document.addEventListener('click',close,{once:true})},0);
    return false;
}

        el.innerHTML='<div class="rpad">'+_replyCache[k]+'</div>';
    }
    else if(i===1)el.innerHTML='<div class="rpad">'+summaryHTML(t,c)+'</div>';
    else el.innerHTML='<div class="rpad">'+threadHTML(t,c)+'</div>';
    document.getElementById('scroll-area').scrollTop=0;
}

/* =============== SUMMARY =============== */
function summaryHTML(t,c){
    const m=memoMsgs(t,c),a=memoAna(t,c);
    let h='';

    h+='<div class="action-strip act-'+a.sit+'"><span class="emoji">'+a.ico+'</span><span class="desc">'+a.lbl+'</span><span class="when">'+(a.stale>0?a.stale+'d ago':'today')+'</span></div>';

    h+='<div class="grid-stats"><div class="gs"><div class="n">'+a.tot+'</div><div class="l">Messages</div></div><div class="gs"><div class="n">'+a.nc+'</div><div class="l">Customer</div></div><div class="gs"><div class="n">'+a.na+'</div><div class="l">Agent</div></div><div class="gs"><div class="n">'+a.age+'d</div><div class="l">Age</div></div></div>';

    if(a.steps.length)h+='<div class="steps-box"><h2>What to Do Next</h2><ul>'+a.steps.map(s=>'<li>'+esc(s)+'</li>').join('')+'</ul></div>';

    const fc=m.find(x=>x.f==='Customer');
    if(fc)h+='<div class="panel"><h2>Original Issue</h2><p>'+esc(trunc(fc.t,600))+'</p></div>';

    const pub=m.filter(x=>x.f!=='Note').slice(-4);
    if(pub.length){
        h+='<div class="panel"><h2>Where You Left Off</h2>';
        pub.forEach(x=>{
            const cl=x.f==='Agent'?'agent':'customer';
            h+='<div class="exch-bubble '+cl+'"><div class="label">'+x.f+' — '+new Date(x.d).toLocaleDateString()+'</div>'+esc(trunc(x.t,350))+'</div>';
        });h+='</div>';
    }

    if(a.topics.length)h+='<div class="panel"><h2>Topics</h2><div class="topic-list">'+a.topics.map(x=>'<span class="topic-pill">'+esc(x)+'</span>').join('')+'</div></div>';

    h+='<div class="panel"><div class="tl-btn" onclick="const n=this.nextElementSibling;n.style.display=n.style.display===\'none\'?\'block\':\'none\'">&#9660; Full timeline ('+m.length+')</div><div style="display:none">';
    m.forEach(x=>{h+='<div class="tl-entry"><span class="d">'+new Date(x.d).toLocaleDateString()+'</span><span class="w '+x.f.toLowerCase()+'">'+x.f+'</span><span class="t">'+esc(trunc(x.t,120))+'</span></div>'});
    h+='</div></div>';
    return h;
}

/* =============== THREAD =============== */
function threadHTML(t,c){
    let h='';
    const total=c.length+(t.description?1:0);
    if(total>10)h+='<div style="text-align:center"><button class="jump-btn" onclick="jumpToLatest()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>Jump to latest ('+total+' messages)</button></div>';
    if(t.description)h+='<div class="bubble customer"><div class="bh"><span class="nm">'+esc(t.requester?t.requester.name:'Customer')+' (Original)</span><span class="dt">'+new Date(t.created_at).toLocaleString()+'</span></div><div class="bb">'+safe(t.description)+'</div></div>';
    c.forEach((x,i)=>{
        const tp=x.private?'note':(x.incoming?'customer':'agent');
        const lb=x.private?'Private Note':(x.incoming?'Customer':'Agent');
        const last=i===c.length-1?' id="last-msg"':'';
        h+='<div class="bubble '+tp+'"'+last+'><div class="bh"><span class="nm">'+esc(x.from_email||lb)+' ('+lb+')</span><span class="dt">'+new Date(x.created_at).toLocaleString()+'</span></div><div class="bb">'+safe(x.body||'')+'</div></div>';
    });
    return h||'<div class="empty-msg">No conversations</div>';
}
function jumpToLatest(){const el=document.getElementById('last-msg');if(el)el.scrollIntoView({behavior:'smooth',block:'center'})}

function matchKB(text,alreadyUsed){
    const low=text.toLowerCase();
    return KB.filter(k=>k.kw.test(low)&&!alreadyUsed.has(k.id));
}

function findTriedSolutions(msgs){
    const tried=new Set();
    const agentTexts=msgs.filter(x=>x.f==='Agent').map(x=>x.t.toLowerCase()).join(' ');
    KB.forEach(k=>{if(k.kw.test(agentTexts))tried.add(k.id)});
    return tried;
}

function cleanEmailBody(text){
    if(!text)return '';
    return text
        .replace(/--+\s*\n[\s\S]*$/,'')
        .replace(/_{3,}[\s\S]*$/,'')
        .replace(/^(De|From|Sent|Enviado|Date|Fecha|Para|To|Cc|Subject|Asunto):.*$/gm,'')
        .replace(/(Best regards|Kind regards|Regards|Saludos|Saludos cordiales|Atentamente|Cordialmente)[\s\S]*$/im,'')
        .replace(/\b[\w.-]+@[\w.-]+\.\w+\b/g,'')
        .replace(/(?:tel|phone|fax|cell|móvil|ext)[\s.:]*[\d\s\-+().]+/gi,'')
        .replace(/\s{2,}/g,' ')
        .trim();
}

function extractBody(text){
    let t=text;
    t=t.replace(/^(Hola|Hi|Hello|Dear|Buenos?\s*d[ií]as?|Buen d[ií]a|Estimado\/?)[\s,\w]*[,.:]\s*/i,'');
    t=t.replace(/(Saludos?\s*(cordiales)?|Best regards|Kind regards|Regards|Quedo al pendiente|Quedamos al pendiente|Quedo atento|Atentamente|Cordialmente)[,.\s]*$/i,'');
    return t.trim();
}

function stripSignature(text){
    if(!text)return '';
    var t=text;
    t=t.replace(/(?:^|\n)\s*DISCLAIMER:[\s\S]*$/i,'');
    t=t.replace(/(?:^|\n)\s*The information contained in this message[\s\S]*$/i,'');
    t=t.replace(/(?:^|\n)\s*Legal Disclaimer[\s\S]*$/i,'');
    t=t.replace(/(?:^|\n)\s*Confidentiality Notice[\s\S]*$/i,'');
    t=t.replace(/(?:^|\n)\s*(?:Koh Young (?:America|Technology)|1950 Evergreen|Plaza Concentro)[\s\S]*$/i,'');
    t=t.replace(/(?:^|\n)\s*(?:Applications? (?:Leader|Engineer|Manager)|MES (?:Developer|Leader|Engineer)|Global MES|Software Developer|Support Engineer|Field Service)[\s\S]*$/im,'');
    t=t.replace(/(?:^|\n)\s*(?:Mobile|Phone|Cell|Tel|Support|Website)\s*:[\s\S]*$/im,'');
    t=t.replace(/(?:^|\n)\s*www\.koh[\s\S]*$/i,'');
    return t.trim();
}

var _esWordRe=/\b(gracias|por favor|adjunto|problema|máquina|equipo|archivo|enviamos|le comparto|comentar|necesito|tenemos|podría|podemos|favor de|muchas gracias|de antemano|solicitud|actualización|instalación|calibración|verificar|configuración|revisamos|pendiente|sesión|remota|disponibilidad|horario|versión|compartir|funciona|sirve|errores|pregunta|requiere|soporte|también|correo|información|sistema|estamos|programa|proceso|datos|cambios|nuevo|nueva|buenos|buenas|quiero|cuando|donde|como|aquí|esto|puede|favor|cuál|alguna|todas|nuestro|nuestra|estoy|tengo|hemos|mediante|durante|obtener|acudimos|evaluar|logramos|detectado|disponible|requerimientos|múltiples|actualmente|encontramos|trabajando|integración)\b/gi;
var _enWordRe=/\b(thank you|thanks|please|attached|issue|machine|review|kindly|appreciate|follow up|looking forward|availability|schedule|screenshot|resolve|investigate|working|update|install|check|would|could|should|configuration|export|regarding|requested|assistance|forwarding|unfortunately|currently|however|actually|already)\b/gi;
function detectLang(m,subject){
    const custRaw=m.filter(x=>x.f==='Customer').map(x=>stripSignature(cleanEmailBody(x.t)));
    const agentRaw=m.filter(x=>x.f==='Agent').map(x=>cleanEmailBody(x.t));
    const lastCust=custRaw.length?custRaw[custRaw.length-1]:'';
    const trimmed=lastCust.trim();
    if(/^(hola|buenos?\s*d[ií]as?|buen d[ií]a|estimad|que tal|saludos)/i.test(trimmed))return 'es';
    if(/^(hi\b|hello|good\s*(morning|afternoon|evening)|dear|hey\b)/i.test(trimmed))return 'en';

    const lastAgent=agentRaw.length?agentRaw[agentRaw.length-1]:'';
    if(lastAgent){
        const aLow=lastAgent.toLowerCase();
        if(/^(hola|que tal|buen)/i.test(aLow.trim())||/saludos cordiales/i.test(aLow))return 'es';
        if(/^(hi\b|hello|hey\b)/i.test(aLow.trim())||/best regards/i.test(aLow))return 'en';
    }

    const custAll=custRaw.join(' ').toLowerCase();
    const all=trimmed.length>20?trimmed.toLowerCase():(custAll||((subject||'')).toLowerCase());
    const esWords=(all.match(_esWordRe)||[]).length;
    const enWords=(all.match(_enWordRe)||[]).length;

    if(esWords===0&&enWords===0){
        const esChars=(all.match(/[áéíóúüñ¿¡]/g)||[]).length;
        if(esChars>=1)return 'es';

        if(custAll.length<30&&subject){
            const subLow=subject.toLowerCase();
            const subEs=(subLow.match(/[áéíóúüñ¿¡]|solicitud|problema|falla|configuración|instalación|máquina|equipo/g)||[]).length;
            if(subEs>=1)return 'es';
        }
    }
    return esWords>enWords?'es':'en';
}

function analyzeAgentStyle(m){
    const agentMsgs=m.filter(x=>x.f==='Agent');
    if(!agentMsgs.length)return{greeting:'',signoff:'',usesName:false,formal:true,phrases:[]};

    const texts=agentMsgs.map(x=>x.t);
    const all=texts.join('\n');

    let greeting='';
    const greetPatterns=[
        /^(Hola\s+[\w]+)/m,/^(Buenos?\s+(?:días?|tardes?|noches?)[\s,]*[\w]*)/mi,
        /^(Estimado\/a?\s+[\w]+)/mi,/^(Buen día[\s,]*[\w]*)/mi,
        /^(Hi\s+[\w]+)/m,/^(Hello\s+[\w]+)/m,/^(Dear\s+[\w]+)/m
    ];
    for(const rx of greetPatterns){
        const match=all.match(rx);
        if(match){greeting=match[1];break}
    }

    let signoff='';
    const signPatterns=[
        /(Saludos\.?)\s*$/mi,/(Quedo al pendiente\.?)\s*$/mi,/(Quedamos al pendiente\.?)\s*$/mi,
        /(Saludos cordiales\.?)\s*$/mi,/(Quedo atento\.?)\s*$/mi,
        /(Best regards\.?)\s*$/mi,/(Kind regards\.?)\s*$/mi,/(Regards\.?)\s*$/mi
    ];
    for(const rx of signPatterns){
        const match=all.match(rx);
        if(match){signoff=match[1].replace(/\.$/,'');break}
    }

    const phrases=[];
    const phraseRx=[
        /quedo al pendiente/gi,/quedo atento/gi,/quedamos al pendiente/gi,
        /le comparto/gi,/le comento/gi,/me permito/gi,/por este medio/gi,
        /de antemano/gi,/buen día/gi,/favor de/gi,
        /let me know/gi,/looking forward/gi,/please find attached/gi,
        /I will review/gi,/I will get back/gi
    ];
    phraseRx.forEach(rx=>{
        const matches=all.match(rx);
        if(matches&&matches.length>=1)phrases.push(matches[0]);
    });

    const usesName=!!all.match(/^(Hola|Hi|Hello|Dear|Estimad)\s+[A-Z]/m);
    const formal=!!all.match(/(estimad|cordial|atento|de antemano|kindly|dear)/i);

    return{greeting,signoff,usesName,formal,phrases};
}

function detectIntent(text){
    const t=text.toLowerCase();
    if(/(?:compartir|enviar|mandar|proporcionar|facilitar|share|send|provide|deliver)\s*(?:la |el |los |las |the |a |an )?(?:versión|version|software|kbr|archivo|file|licen|update|actualiz)/i.test(t))
        return 'request_delivery';
    if(/(?:necesit|requie|ocupo|need|require|want|looking for)\s/i.test(t)&&/(?:versión|version|software|kbr|archivo|file|licen|update|actualiz|nueva?o?|new|latest)/i.test(t))
        return 'request_delivery';
    if(/(?:actualizar|upgrade|update|instalar nueva|install new|migrar|migrate)/i.test(t))
        return 'request_update';
    if(/(?:cotiza|quot|precio|price|cost|purchase|compra|adquirir|buy)/i.test(t))
        return 'request_quote';
    if(/(?:agendar|schedul|programar|coordinar|disponib|availab|sesión|session|reunión|meeting|call)/i.test(t))
        return 'request_schedule';
    if(/(?:error|crash|exception|fail|broken|not.work|falla|no funciona|no sirve|se cayó|problema|issue|problem|bug)/i.test(t))
        return 'report_error';
    if(/(?:línea|line|producción|production).*(down|stop|parad|detenid|caíd|halt|urgent|crítico|critical)/i.test(t))
        return 'report_urgent';
    if(/(?:cómo|how|dónde|where|qué es|what is|cuál|which|puedo|can i|se puede|is it possible)/i.test(t))
        return 'ask_question';
    if(/(?:confirmo|confirm|listo|ready|done|ya (?:quedó|está|instalé|cargué)|installed|completed)/i.test(t))
        return 'confirm_done';
    if(/(?:gracia|thank|resolved|resuelto|funciona|works|solucion)/i.test(t))
        return 'confirm_resolved';
    return 'general';
}

function nameFromEmail(fe){
    if(!fe)return null;
    var nameMatch=fe.match(/^"?([^"<]+)"?\s*</);
    if(nameMatch){var n=nameMatch[1].trim();if(n&&n.indexOf('@')<0)return n.split(' ')[0]}
    var plain=fe.replace(/[<>]/g,'').trim();
    if(plain.indexOf('@')>=0){var local=plain.split('@')[0];var parts=local.split(/[._-]/);if(parts.length>=1){var name=parts[0].charAt(0).toUpperCase()+parts[0].slice(1);if(name.length>1)return name}}
    return null;
}

    };
    const l=L[lang];

    const R=[];

    const issueText=(t.subject||'')+'  '+(firstCust?cleanEmailBody(firstCust.t):'');
    const issueLow=issueText.toLowerCase();
    const intent=detectIntent(issueLow);

    if(a.sit==='new'){
        const kbHits=matchKB(issueText,new Set());
        const intentBody=buildIntentReply(intent,ctx,issueLow,kbHits,hi,bye,lang,l,firstName);

        if(intentBody){
            R.push({g:gRec,nm:intentBody.nm,
                why:intentBody.why,
                body:intentBody.body});
        }

        if(kbHits.length&&!intentBody){
            kbHits.slice(0,2).forEach(kb=>{
                let kbBody=kb[lang];
                if(kbBody.includes('{SP_LINK}')){
                    if(spLink)kbBody=kbBody.replace(/\{SP_LINK\}/g,spLink);
                    else kbBody=kbBody.replace(/\n?\{SP_LINK\}\n?/g,'');
                }
                R.push({g:gRec,nm:l.firstResponse,
                    why:(lang==='es'?'Detectado: ':'Detected: ')+kb.id+' → "'+ trunc(issueText,100)+'"',
                    body:hi+',\n\n'+kbBody+'\n\n'+bye});
            });
        }

        if(!intentBody&&!kbHits.length){
            const needsInfo=!ctx.hasScreenshot&&!ctx.hasLogs&&(ctx.isError||ctx.isTechnical);
            R.push({g:gRec,nm:l.firstResponse,
                why:(lang==='es'?'Cliente reportó: "':'Customer reported: "')+trunc(issueText,120)+'"',

                (ctx.isUrgent?KB.find(k=>k.id==='remoteUrgent')[lang]:

        if(ctx.isTechnical)

                body:hi+',\n\n'+l.remoteWouldHelp+'\n\n'+l.pleaseTV+'\n\n'+bye});

    if(a.sit==='respond'){

        const reportsNew=custLow.match(/\b(now|another|also|still|again|new issue|different|happening again|ahora|otro|también|sigue|de nuevo|nuevo problema|diferente|otra vez|persiste)\b/i);
        const sendsInfo=custLow.match(/\b(attached|screenshot|log|here is|please find|sharing|sending|adjunto|captura|le comparto|aquí está|le envío|enviando)\b/i);

        }

                    if(spLink)kbBody=kbBody.replace(/\{SP_LINK\}/g,spLink);
                    else kbBody=kbBody.replace(/\n?\{SP_LINK\}\n?/g,'');
                }
                const alreadyAdded=R.some(r=>r.body.includes(kbBody));
                if(!alreadyAdded){
                    R.push({g:gRec,nm:(lang==='es'?'Respuesta: ':'Response: ')+kb.id,
                        why:(lang==='es'?'Detectado en mensaje: ':'Detected in message: ')+kb.id+' → "'+trunc(custText,80)+'"',
                        body:hi+',\n\n'+kbBody+'\n\n'+bye});
                }
            });
        }

        if(hasQ&&asksHow){
            const kbInstr=kbAll.find(k=>['kbrInstall','fileExport','barcodeIssue','guiSetting'].includes(k.id));

        }

        if(!R.length){

            R.push({g:gRec,nm:l.replyCustomer,
                why:(lang==='es'?'Último mensaje: "':'Last message: "')+trunc(custText,120)+'"',
                body:hi+',\n\n'+(saysYes?l.thankConfirming:'')+(hasQ?(lang==='es'?'Respecto a tu pregunta — ':'Regarding your question — ')+(fallbackKB||'['+( lang==='es'?'tu respuesta aquí':'your answer here')+']')+'\n\n':
                (fallbackKB?fallbackKB+'\n\n':(ctx.isError?l.investigating:'')+l.getBackShortly+'\n\n'))+
                (ctx.pendingAction?l.asDiscussed+ctx.pendingAction+'.\n\n':'')+bye});
        }

        if(!mentionsTV&&ctx.isTechnical&&!ctx.hadRemoteSession)
            R.push({g:gAlt,nm:l.suggestRemoteNm,
                why:lang==='es'?'Sin sesión remota aún para este tema técnico':'No remote session yet for this technical issue',
                body:hi+',\n\n'+l.suggestRemote+'\n\n'+l.availableSession+'\n\n'+bye});

        if(ctx.triedSolutions.size>0){
            const triedList=Array.from(ctx.triedSolutions).join(', ');
            R.forEach(r=>{r.why+=' | '+(lang==='es'?'Ya intentado: ':'Already tried: ')+triedList});
        }
    }

    if(a.sit==='waiting'||a.sit==='followup'){
        const agentSaid=lastAgent?lastAgent.t:'';
        const agentAsked=agentSaid.match(/\?/);
        const agentSentFile=agentSaid.toLowerCase().match(/attach|kbr|file|sent|please find|adjunto|envío|le comparto/i);
        const agentScheduled=agentSaid.toLowerCase().match(/schedul|teamviewer|remote|session|availab|sesión|remota|disponib/i);

        R.push({g:gRec,nm:a.stale>=14?l.finalFollowUp:l.followUpNm,
            why:a.stale+'d '+(lang==='es'?'desde que ':'since you ')+
                (agentAsked?(lang==='es'?'preguntaste: "':'asked: "')+trunc(agentSaid,80)+'"':

                agentScheduled?(lang==='es'?'propusiste sesión remota':'proposed a remote session'):
                (lang==='es'?'respondiste':'last replied'))+(lang==='es'?' — sin respuesta aún':' — no response yet'),

            (a.stale>=14?l.noResponseClose:
            agentAsked?l.chanceReview+trunc(agentSaid.split('?')[0],80)+'.\n\n'+l.letMeKnowContinue:
            agentSentFile?l.chanceInstall:
            agentScheduled?l.stillAvailRemote:
            l.furtherAssistance)+
            '\n\n'+bye});

    if(ctx.hadRemoteSession)
        R.push({g:gAfter,nm:l.postSession,why:lang==='es'?'Se realizó/discutió sesión remota en este ticket':'Remote session discussed/held in this ticket',

    if(ctx.isBRM)
        R.push({g:gDeliv,nm:l.deliverKBRNm,why:lang==='es'?'BRM/KBR discutido en la conversación':'BRM/KBR discussed in conversation',
            body:hi+',\n\n'+l.deliverKBR+'\n\n'+(ctx.mainIssue?l.addressesIssue+'\n\n':'')+l.toInstall+'\n\n'+l.needRemoteHelp+'\n\n'+bye});

    if(ctx.isQuote)
        R.push({g:gDeliv,nm:l.sendQuote,why:lang==='es'?'Cotización discutida en la conversación':'Quotation discussed in conversation',

    R.push({g:gClose,nm:l.closeTicket,why:(lang==='es'?'Usar cuando ':'Use when ')+subj+(lang==='es'?' esté completamente resuelto':' is fully resolved'),
        body:hi+',\n\n'+l.gladConfirm+(ctx.hadRemoteSession?'\n\n'+l.thankRemoteTime:'')+'\n\n'+l.willClose+'\n\n'+bye});

    const threadWords=allTextLow.replace(/[^a-záéíóúüñ\s]/gi,'').split(/\s+/).filter(w=>w.length>3);
    R.forEach(r=>{

            h+='<div style="padding:10px 12px;border-radius:10px;background:'+bg+';border-left:3px solid '+clr+'">'

function extractContext(allLow,m,lastCust,lastAgent){
    const isError=!!allLow.match(/error|crash|exception|fail|broken|not.work|issue|problem|falla|no funciona|no sirve|se cayó|problema/i);
    const isTechnical=!!allLow.match(/error|crash|config|install|brm|kbr|socket|database|inspect|calibrat|export|barcode|defect|spi|aoi|instalación|configuración|calibración|máquina/i);
    const isBRM=!!allLow.match(/brm|kbr|business.rule|script|customer.?property/i);
    const isInspection=!!allLow.match(/inspect|defect|barcode|pcb|spi|aoi|result|inspección|defecto|resultado/i);
    const isQuote=!!allLow.match(/quote|quotat|price|cost|purchase|po\b|cotizac|precio|costo|compra/i);
    const isScheduling=!!allLow.match(/schedul|meeting|call|appointment|availab|agendar|reunión|cita|disponibilidad|horario|junta/i);
    const hadRemoteSession=!!allLow.match(/teamviewer|remote.session|anydesk|tv.id|connected.remote|during.*(session|remote)|sesión remota|nos conectamos|conecté remotamente/i);
    const hasScreenshot=!!allLow.match(/screenshot|screen.?shot|image|picture|attached.*png|attached.*jpg|captura|imagen|adjunt.*png|adjunt.*jpg/i);
    const customerSentImages=!!(allLow.match(/\[cid:image|\[cid:.*\.png|\[cid:.*\.jpg|<img|\.png|\.jpg|\.jpeg|\.gif|screenshot|captura|imagen adjunt|attached.*image|adjunto.*imagen|here.*screenshot|adjunto.*captura/i));
    const hasLogs=!!allLow.match(/log.file|logs|attached.*log|error.log|archivo.*log|logs adjunt/i);
    const hasVersion=!!allLow.match(/version|v\d+\.\d+|brm.\d|versión/i);
    const hasSteps=!!allLow.match(/step|reproduce|when.i|happens.when|to.reproduce|paso|reproducir|cuando.hago|ocurre.cuando/i);

    let mainIssue='';
    const issuePatterns=[
        [/error.{0,30}([\w\s]{5,40})/i,'error'],
        [/issue.{0,10}with.{0,5}([\w\s]{5,40})/i,'issue with'],
        [/problem.{0,10}with.{0,5}([\w\s]{5,40})/i,'problem with'],
        [/([\w\s]{3,20})\s*(not working|is broken|crashed|fails)/i,'failure'],
        [/([\w\s]{3,20})\s*error/i,'error'],
        [/problema.{0,10}con.{0,5}([\w\sáéíóúñ]{5,40})/i,'problema con'],
        [/falla.{0,10}en.{0,5}([\w\sáéíóúñ]{5,40})/i,'falla en'],
        [/([\w\sáéíóúñ]{3,20})\s*(no funciona|no sirve|se cayó|falla)/i,'falla']
    ];
    for(const[rx]of issuePatterns){
        const match=allLow.match(rx);
        if(match){mainIssue=match[1].trim().replace(/\s+/g,' ').substring(0,40);break}
    }
    if(!mainIssue&&isBRM)mainIssue='BRM configuration';
    if(!mainIssue&&isInspection)mainIssue='inspection results';

    let wasScheduling=false;
    if(lastAgent){
        const at=lastAgent.t.toLowerCase();
        wasScheduling=!!at.match(/schedul|teamviewer|remote|availab|session|agendar|sesión|remota|disponib/i);
    }

    let pendingAction='';
    if(lastAgent){
        const at=lastAgent.t.toLowerCase();
        if(at.match(/i will|we will|going to|plan to|voy a|vamos a|estaré|revisaré|le enviaré|procederé/)){
            const pm=lastAgent.t.match(/[Ii] will ([^.!?\n]{10,60})/)||lastAgent.t.match(/[Ww]e will ([^.!?\n]{10,60})/)||
                lastAgent.t.match(/[Vv]oy a ([^.!?\n]{10,60})/)||lastAgent.t.match(/[Rr]evisaré ([^.!?\n]{10,60})/)||
                lastAgent.t.match(/[Ll]e enviaré ([^.!?\n]{10,60})/);
            if(pm)pendingAction=pm[1].trim();
        }
    }

    const isUrgent=!!allLow.match(/urgent|asap|critical|line.*(down|stop)|producti.*(stop|down|halt)|urgente|crítico|línea.*(parada|detenida|caída)|producción.*(parada|detenida)/i);

    const triedSolutions=findTriedSolutions(m);

    let agentAskedFor='';
    if(lastAgent){
        const at=lastAgent.t.toLowerCase();
        if(at.match(/log|registr/i))agentAskedFor='logs';
        else if(at.match(/screenshot|captura|imagen/i))agentAskedFor='screenshots';
        else if(at.match(/teamviewer|remote|remota|credencial/i))agentAskedFor='remote';
        else if(at.match(/version|versión/i))agentAskedFor='version';
        else if(at.match(/instalar|install|load.*kbr|cargar.*kbr/i))agentAskedFor='install';
    }

    let customerProvided='';
    if(lastCust){
        const ct=lastCust.t.toLowerCase();
        if(ct.match(/attach|adjunto|here.*(is|are)|aquí.*está|te.*(comparto|envío|mando)/i)){
            if(ct.match(/log|registr/i))customerProvided='logs';
            else if(ct.match(/screenshot|captura|imagen/i))customerProvided='screenshots';
            else customerProvided='files';
        }
        if(ct.match(/teamviewer|tv.*id|anydesk|\d{3,}.*\d{3,}/i))customerProvided='remote_credentials';
        if(ct.match(/(done|install|complet|listo|instalado|ya.*cargué|loaded)/i))customerProvided='installed';
    }

    return{isError,isTechnical,isBRM,isInspection,isQuote,isScheduling,hadRemoteSession,
        hasScreenshot,hasLogs,hasVersion,hasSteps,mainIssue,wasScheduling,pendingAction,
        isUrgent,triedSolutions,agentAskedFor,customerProvided,customerSentImages};
}

function aiPrompt(rc,extraCtx,spLink){
    const recent=rc.m.slice(-6);
    const thread=recent.map(x=>x.f+': '+cleanEmailBody(x.t)).join('\n\n---\n\n');

    const kbHits=matchKB(rc.issueText,rc.ctx.triedSolutions||new Set());
    let kbSection=kbHits.length?kbHits.map(k=>{
        let txt=k[rc.lang];
        if(txt.includes('{SP_LINK}')){
            if(spLink)txt=txt.replace(/\{SP_LINK\}/g,spLink);
            else txt=txt.replace(/\n?\{SP_LINK\}\n?/g,'');
        }
        return'- '+k.id+': '+txt;
    }).join('\n'):'';

    const sugSection=rc.suggestions.slice(0,3).map(s=>'- ['+s.nm+']: '+s.body.substring(0,200)).join('\n');

    const triedList=rc.ctx.triedSolutions&&rc.ctx.triedSolutions.size>0?Array.from(rc.ctx.triedSolutions).join(', '):'';

    const esL=rc.lang==='es';

    const lastMsg=rc.m.length?rc.m[rc.m.length-1]:null;
    const lastCustMsgs=rc.m.filter(x=>x.f==='Customer');
    const lastCust=lastCustMsgs.length?lastCustMsgs[lastCustMsgs.length-1]:null;
    const lastAgentMsgs=rc.m.filter(x=>x.f==='Agent');
    const lastAgent=lastAgentMsgs.length?lastAgentMsgs[lastAgentMsgs.length-1]:null;

    const isWaiting=D.fl===3;
    const hasImages=rc.ctx.customerSentImages;
    const asked=rc.ctx.agentAskedFor;
    const provided=rc.ctx.customerProvided;
    let action='';
    if(isWaiting&&lastAgent){
        const agentText=cleanEmailBody(lastAgent.t).toLowerCase();
        if(agentText.match(/teamviewer|remote|session|sesión|conectar/i))
            action='Follow up: ask if they are available for the remote session you proposed. Be brief: "¿Pudieron verificar lo anterior?" / "Were you able to check on this?"';
        else if(agentText.match(/issue.*report|log|registro|reporte/i))
            action='Follow up: ask if they were able to gather the logs/issue report you requested. Keep it short.';
        else if(agentText.match(/kbr|apply|install|aplicar|instalar/i))
            action='Follow up: ask if they applied the KBR and if everything is working correctly.';
        else if(agentText.match(/screenshot|captura|imagen/i))
            action='Follow up: ask if they were able to get the screenshots you requested.';
        else
            action='Follow up briefly: "Estoy dándole seguimiento a este ticket, ¿aún requieren soporte?" / "Following up, do you still need assistance?"';
    }else if(!lastAgent){
        if(rc.ctx.isUrgent)action='URGENT (line down). Ask for TeamViewer credentials NOW: "¿Me puedes compartir las credenciales de TeamViewer? Lo revisamos de inmediato." / "Could you share the TeamViewer credentials? I will look into this right away."';
        else if(rc.ctx.isError&&hasImages)action='Customer reported error with images you CANNOT see. Acknowledge, ask for Issue Report and serial number. Offer remote session.';
        else if(rc.ctx.isError)action='Customer reported an error. Ask for: 1) Issue Report (BRM > Help > Issue Report), 2) serial number if not provided. Keep it direct.';
        else if(rc.ctx.isQuote)action='Acknowledge receipt. Say you will review requirements and share timeline: "Confirmo de recibido. Revisaré los requerimientos."';
        else if(hasImages)action='Customer sent images you CANNOT see. Acknowledge receipt. Ask what the images show or offer remote session to see directly.';
        else action='Respond to the customer request. If unclear, ask ONE specific question (serial number, OR remote access, OR what behavior they expect). Do NOT ask for Issue Report unless they report an actual error.';
    }else if(lastMsg&&lastMsg.f==='Customer'){
        const ct=lastCust?cleanEmailBody(lastCust.t).toLowerCase():'';
        if(ct.match(/ya.*reuni[oó]n|en la reuni[oó]n|ya.*conectad|ready.*connect|in the meeting|joined.*meeting|ya.*sesión|in the session|ya.*call|on the call|listo para conect|ready for.*session|estoy.*reuni[oó]n|estoy.*sesión|ya.*listo.*conect|me encuentro.*reuni[oó]n|estoy en la.*sala|i.?m in the.*room|waiting.*you|esperando/i))
            action='Customer is WAITING in meeting/session. Reply in ONE sentence MAX: "En un momento me conecto." / "Connecting now." Do NOT ask questions.';
        else if(ct.match(/gracias|thanks|resolved|solved|ya funciona|it works|fixed|working now|todo.*bien|everything.*good|no more issue|sin novedad|ya qued[oó]/i)&&!ct.match(/pendiente|soporte|evaluar|support|help|issue|problem|error|necesit|need|please|por favor|falta|missing|waiting|esperando|also|también|además|asi como|así como/i))
            action='Customer says things are working/resolved. Write a warm, personalized response (3-4 sentences). Reference what they specifically did or confirmed (e.g. "the new version", "the update", "the configuration change"). Tell them you are glad it worked. Offer your continued support if anything comes up. Do NOT mention closing, pending, or managing the ticket status. Do NOT just say "glad to hear" and nothing else — add substance.';
        else if(ct.match(/teamviewer|tv.*id|id.*\d{5,}|password|contraseña|anydesk|\d{9,}/i))
            action='Customer shared TV credentials. Keep greeting and sign-off. Body is ONE sentence: "Recibido, enseguida me conecto." / "Received, connecting now."';
        else if(ct.match(/should i|shall i|do you want me|debo|quieres que|le hago|go ahead|\?.*apply|\?.*install|\?.*proceed|\?.*continue/i))
            action='Customer is asking whether to proceed with something. Answer their question directly (yes/no + brief reason). If they also shared files/images, acknowledge those too.';
        else if(ct.match(/question|pregunta|how do|cómo puedo|how can|can you|could you|podrías|puedes|es posible|is it possible|what is|qué es|cuál es|where|dónde/i))
            action='Customer asked a question. Answer it directly. If unsure, say you will check: "Lo verifico y te confirmo." / "Let me check and confirm." If they also shared files/images, acknowledge those too.';
        else if(provided==='logs'||provided==='screenshots'||provided==='files'||(ct.match(/adjunto|attach|here.*is|aquí|te.*(comparto|envío)|sharing|sent.*you|envié/i))||hasImages){
            if(rc.ctx.isError||ct.match(/error|issue|problem|fail|forbidden|exception|crash|broken|not work/i))
                action='Customer reported an error and shared images/files. Acknowledge the specific error they mentioned (quote their words). Say you will review. Offer remote session if needed. Do NOT say "connecting now" — they did NOT ask for a remote session.';
            else
                action='Customer shared info/files. Acknowledge and say you will review. If they mentioned something specific, address that too — do not just say "I will review".';
        }
        else if(ct.match(/still|sigue|todavía|again|otra vez|persiste|same|mismo|continues|continúa/i))
            action='Problem persists. Ask for remote session: "¿Me puedes compartir acceso remoto para revisarlo directamente?" / "Could you share remote credentials so I can take a look?"';
        else if(ct.match(/i will|voy a|let me|déjame|going to.*check|going to.*test|going to.*try|going to.*verify|haré|verificaré|probaré|get back to you|te confirmo|te aviso|le aviso|tomorrow|mañana|this week|esta semana|need.*time|necesito.*tiempo|give me.*time|dame.*tiempo|health check|will.*check|will.*test|will.*try|will.*verify/i))
            action='Customer says they will check/test/verify. Acknowledge briefly: "Sounds good, take your time." / "Perfecto, quedo al pendiente." Do NOT ask questions, do NOT offer help — just confirm you will wait for their update.';
        else if(provided==='installed'||ct.match(/done|listo|installed|instalé|ya.*cargué|applied|apliqué|loaded|ya lo hice|already did/i))
            action='Customer completed requested action. Ask: "¿Todo funcionando correctamente?" / "Is everything working properly now?"';
        else if(ct.match(/status|update|avance|estado|progress|follow|novedad|cuando|how.*going|cómo va/i))
            action='Status request. Be honest and direct. If reviewing, say so. If waiting on something, say what.';
        else if(ct.match(/send.*meeting|envía.*invite|inv[ií]tame|send.*invite|calendar|teams.*link|zoom.*link/i))
            action='Customer asks for meeting invite. Confirm: "Claro, envío la invitación a tu correo." / "Sure, I will send the invite to your email."';
        else action='Read the customer message carefully. Identify what they are telling you or asking, then respond to THAT specific thing. Do NOT say "connecting now" unless they asked for a remote session. Do NOT default to asking for Issue Report unless they report an error.';
    }else{
        action=rc.ctx.pendingAction?'Follow up on: '+rc.ctx.pendingAction
            :'Ask briefly if the issue is resolved: "¿El problema persiste?" / "Is the issue still occurring?"';
    }

    const imgRule=hasImages?(esL
        ?'\n- IMPORTANTE: El cliente envió imágenes/capturas que NO puedes ver. NUNCA finjas que las ves. Reconoce que las recibiste y pide descripción en texto si necesitas más contexto, o ofrece sesión remota para verlo directamente.'
        :'\n- IMPORTANT: The customer sent images/screenshots you CANNOT see. NEVER pretend you can see them. Acknowledge receipt and ask for a text description if you need more context, or offer a remote session to see it directly.')
        :'';

    const correctionSection=getCorrectionHints(esL?'es':'en',3);

    const sys=esL
?`Soporte KYA MES, Koh Young. Tuteo, directo, casual.

FORMATO: ${rc.hi}, → 1-3 oraciones → ${rc.bye}
Nada después de "${rc.bye}".

EJEMPLOS de respuesta:
- Error: "¿Nos podrías compartir el Issue Report de BRM? (Help > Issue Report)"
- Logs recibidos: "Recibido, lo revisaré y te doy seguimiento."
- Confirma acción: "¿Todo funcionando correctamente?"
- No sabes: "Lo verifico y te confirmo."
- Remoto: "¿Me compartes las credenciales de TeamViewer?"
- Resuelto: "Me da gusto, cualquier cosa estamos para apoyarte."
- Seguimiento: "¿Pudieron verificar lo anterior?"

REGLAS:
- Responde SOLO al último mensaje.
- No repitas lo que dijo el cliente.
- No inventes info. No cites el subject del ticket.
- No ofrezcas TeamViewer si no es necesario.${imgRule}

⛔ PROHIBIDO — NUNCA escribas estas frases:
- "no dudes en" (ni contactarnos, ni contactarme, ni escribirnos)
- "Estimado" / "Buen día" / "Le informo"
- "cerrar este ticket" / "mantener ticket"
- "Espero que te encuentres bien"
- "cualquier duda" / "Si necesitas más apoyo"
- "Quedo al pendiente de sus comentarios"
En vez de "no dudes en contactarnos" di: "cualquier cosa estamos para apoyarte"${correctionSection}`

:`KYA MES support, Koh Young. Direct, casual, technical.

FORMAT: ${rc.hi}, → 1-3 sentences → ${rc.bye}
Nothing after "${rc.bye}".

EXAMPLES:
- Error: "Could you please share the BRM Issue Report? (Help > Issue Report)"
- Logs received: "Thank you! I will review and keep you posted."
- Confirms action: "Is everything working properly now?"
- Unsure: "Let me check and confirm."
- Remote: "Please give me TeamViewer session."
- Resolved: "Great to hear! Let me know if anything comes up."
- Follow-up: "Were you able to check on this?"

RULES:
- Respond ONLY to the last message.
- Do NOT repeat what the customer said.
- Do NOT invent info. Do NOT quote ticket subject.
- Do NOT offer TeamViewer unless needed.${imgRule}

⛔ FORBIDDEN — NEVER write these phrases:
- "do not hesitate" (nor "don't hesitate")
- "Dear" / "I hope this email finds you"
- "close this ticket" / "keep this ticket"
- "Thank you for reaching out"
- "If you need further assistance" / "any questions"
Instead of "do not hesitate to contact us" say: "let me know if anything comes up"${correctionSection}`;

    const lastCustText=lastCust?cleanEmailBody(lastCust.t):'(no customer message)';

    let usrParts=[];

    if(extraCtx&&extraCtx.length>0){
        if(window._aiReply){
            usrParts.push('=== YOUR TASK ===');
            usrParts.push('MODIFY this draft following the instruction below.');
            usrParts.push('\nYOUR PREVIOUS DRAFT:\n'+window._aiReply);
            usrParts.push('\nINSTRUCTION: '+extraCtx);
            usrParts.push('Keep the same format (greeting + body + sign-off). Only change what the instruction says.');
        }else{
            usrParts.push('=== YOUR TASK ===');
            usrParts.push('INSTRUCTION FROM AGENT: '+extraCtx);
            usrParts.push('Follow this instruction precisely when writing your reply.');
            usrParts.push('\nCUSTOMER\'S LAST MESSAGE:\n'+lastCustText);
        }
    }else if(isWaiting&&lastAgent){
        const lastAgentText=cleanEmailBody(lastAgent.t);
        usrParts.push('=== YOUR TASK ===');
        usrParts.push('ACTION: '+action);
        usrParts.push('\nYOUR LAST MESSAGE (agent):\n'+lastAgentText);
        if(lastCust)usrParts.push('\nCUSTOMER\'S LAST MESSAGE:\n'+lastCustText);
    }else{
        usrParts.push('=== YOUR TASK ===');
        usrParts.push('ACTION: '+action);
        usrParts.push('\nCUSTOMER\'S LAST MESSAGE (you MUST respond to THIS):\n'+lastCustText);
    }

    var isRegenerate=extraCtx&&extraCtx.length>0&&window._aiReply;
    if(!isRegenerate){
        usrParts.push('');
        usrParts.push('=== TICKET CONTEXT (for your understanding only — do NOT quote ticket subject or number in your reply) ===');
        usrParts.push('Ticket #'+rc.t.id+': '+rc.t.subject);
        usrParts.push('Customer: '+rc.firstName);
        if(rc.ctx.mainIssue)usrParts.push('Issue: '+rc.ctx.mainIssue);
        if(hasImages)usrParts.push('⚠ Customer sent images/screenshots (you CANNOT see them)');

        usrParts.push('\nCONVERSATION THREAD (for context only — respond to the LAST message above):');
        usrParts.push(thread);

        if(spLink)usrParts.push('\nSHAREPOINT FOLDER: '+spLink+'\nWhen asking customer to upload files, include this link.\n');
        if(kbSection)usrParts.push('\nVERIFIED SOLUTIONS (use if relevant):\n'+kbSection);
        if(sugSection)usrParts.push('\nEXAMPLE REPLIES:\n'+sugSection);
        if(triedList)usrParts.push('\nAlready tried (do NOT suggest again): '+triedList);

        var examples=getAIExamples(esL?'es':'en',3,lastCustText);
        if(examples.length){
            usrParts.push('\n=== LEARNED EXAMPLES (this agent\'s real replies — match this style) ===');
            examples.forEach(function(ex){
                usrParts.push('Customer: '+ex.c+'\nAgent replied: '+ex.a+'\n');
            });
        }
    }

    usrParts.push('\nWrite ONLY the email. Start with "'+rc.hi+'," end with "'+rc.bye+'". Nothing else.');

    const usr=usrParts.join('\n');
    return{sys,usr};
}

function cleanAIReply(text){
    let t=text;
    const rc=window._replyCtx;
    const hi=rc?rc.hi:'Hi';
    const bye=rc?rc.bye:'Best regards,';
    const hiIdx=t.indexOf(hi+',');
    if(hiIdx>0)t=t.substring(hiIdx);
    const byeIdx=t.lastIndexOf(bye);
    if(byeIdx>0)t=t.substring(0,byeIdx+bye.length);
    t=t.replace(/\*\*/g,'').replace(/^#{1,3}\s+.*$/gm,'');
    t=t.replace(/\[Your Name.*?\]/gi,'').replace(/\[Team Name.*?\]/gi,'');
    t=t.trim();
    return t;
}

async function tryOllama(sys,usr){
    const resp=await fetch('/ollama',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'qwen2.5:7b',messages:[{role:'system',content:sys},{role:'user',content:usr}],stream:false,keep_alive:-1,options:{temperature:0.2,num_predict:400,num_ctx:6144,top_p:0.8,repeat_penalty:1.3}})
    });
    if(!resp.ok)throw new Error('Ollama '+resp.status);
    const data=await resp.json();
    let reply=data.message?data.message.content:'';
    reply=cleanAIReply(reply);
    return{reply,provider:'Ollama (Qwen 2.5 7B)'};
}

async function ensureSPFolder(){

    try{

            body:JSON.stringify({ticketId:t.id,emails:emails})

        if(data.link){

    return null;
