<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MES FreshDesk Pro Max</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect rx='14' width='64' height='64' fill='%235FBC6B'/><path d='M32 12l3 7 7 3-7 3-3 7-3-7-7-3 7-3zM46 32l2 5 5 2-5 2-2 5-2-5-5-2 5-2zM24 38l2 4 4 2-4 2-2 4-2-4-4-2 4-2z' fill='white'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
    <span class="brand">MES FreshDesk Pro Max</span>
    <span class="dot"></span>
    <input type="password" id="inp-key" placeholder="API Key">
    <button class="nbtn ghost" onclick="toggleKey()">Show</button>
    <input type="text" id="inp-domain" value="kyexpert.freshdesk.com">
    <button class="nbtn primary" onclick="connect()">Connect</button>
    <input type="text" id="inp-search" placeholder="#ID, name, keyword, customer">
    <button class="nbtn primary" onclick="doSearch()">Search</button>
    <span class="conn-status" id="conn-status"></span>
    <span class="ticket-stats" id="ticket-stats" style="display:none" onclick="renderDashboard()" title="Click to open Dashboard"></span>
</nav>

<div class="app">
    <!-- LEFT: ticket list -->
    <div class="left">
        <div class="tabs">
            <button onclick="filt(this,'new')">New<span class="tab-badge bg-red" id="new-badge" style="display:none">0</span></button>
            <button class="on" onclick="filt(this,2)">My Turn<span class="tab-badge bg-amber" id="turn-badge" style="display:none">0</span></button>
            <button onclick="filt(this,4)">Pending<span class="tab-badge bg-purple" id="pend-badge" style="display:none">0</span></button>
            <button onclick="filt(this,3)">Waiting<span class="tab-badge bg-green" id="wait-badge" style="display:none">0</span></button>
            <button onclick="filt(this,'all')">All<span class="tab-badge bg-gray" id="all-badge" style="display:none">0</span></button>
            <button onclick="refresh()" title="Refresh" style="margin-left:auto;flex-shrink:0;background:none;border:none;cursor:pointer;font-size:14px;padding:2px 4px;color:var(--g500)">&#x21bb;</button>
        </div>
        <div class="prog-bar" id="prog" style="display:none"><div class="fill" id="prog-fill"></div></div>
        <div class="list" id="list"><div class="empty-msg">Connect to load tickets</div></div>
        <div class="pgr" id="pgr" style="display:none">
            <button id="pb" onclick="pg(-1)">Prev</button><span id="pi"></span><button id="pn" onclick="pg(1)">Next</button>
        </div>
    </div>

    <!-- RIGHT: detail (static structure = scroll works) -->
    <div class="right-panel">
        <div id="hdr"></div>
        <div id="tab-bar"></div>
        <div id="scroll-area">
            <div id="content"><div class="empty-msg" style="height:60vh">Select a ticket</div></div>
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="data/kb.js"></script>
<script src="js/nlp.js"></script>
<script src="js/attachments.js"></script>
<script src="ai_pipeline.js"></script>
<script src="js/sharepoint.js"></script>
<script src="js/api.js"></script>
<script src="js/ai.js"></script>
<script src="js/send-modal.js"></script>
<script src="js/reply.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/tickets.js"></script>
<script src="js/right-panel.js"></script>
<script>

var _praw=JSON.parse(localStorage.getItem('fd_pending')||'[]');
var _pend=new Set(Array.isArray(_praw)?_praw:Object.keys(_praw).map(Number));

let D={key:'',dom:'',tks:[],cur:null,cvs:[],fl:2,pg:1,pgs:1,aid:null,anm:'',sig:'',allOpen:[],lr:{},newTks:[],pending:_pend};

document.getElementById('inp-search').onkeydown=e=>{if(e.key==='Enter')doSearch()};
document.getElementById('inp-key').onkeydown=e=>{if(e.key==='Enter')connect()};

(function(){const k=localStorage.getItem('fd_apikey');if(k){document.getElementById('inp-key').value=k;setTimeout(connect,300)}})();

/* =============== HEARTBEAT / SHUTDOWN =============== */
setInterval(()=>{fetch('/heartbeat').catch(()=>{})},15000);
</script>
</body>
</html>
