<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Hub</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --f:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --white:#fff;--black:#1d1d1f;
    --g50:#fafafa;--g100:#f5f5f7;--g200:#e8e8ed;--g300:#d2d2d7;--g400:#aeaeb2;--g500:#86868b;--g600:#6e6e73;--g700:#48484a;
    --blue:#007aff;--blue2:#0055d4;--blue-bg:rgba(0,122,255,0.08);
    --green:#30d158;--green-bg:rgba(48,209,88,0.1);
    --orange:#ff9f0a;--orange-bg:rgba(255,159,10,0.1);
    --red:#ff453a;--red-bg:rgba(255,69,58,0.08);
    --purple:#bf5af2;--purple-bg:rgba(191,90,242,0.08);
    --teal:#64d2ff;
    --r:16px;--r2:12px;--r3:8px;
}
html,body{height:100%;overflow:hidden;font-family:var(--f);color:var(--black);background:var(--g100);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

/* ===== TOP NAV ===== */
nav{
    height:52px;display:flex;align-items:center;padding:0 20px;gap:10px;
    background:rgba(255,255,255,0.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-bottom:0.5px solid var(--g200);position:relative;z-index:100;
}
nav .brand{font-size:17px;font-weight:600;letter-spacing:-0.4px;color:var(--black)}
nav .dot{width:4px;height:4px;border-radius:50%;background:var(--g300);margin:0 6px}
nav input{
    height:30px;border:none;background:var(--g100);border-radius:8px;padding:0 10px;
    font:13px/30px var(--f);color:var(--black);outline:none;transition:all .2s;
}
nav input:focus{background:var(--white);box-shadow:0 0 0 3px rgba(0,122,255,0.25)}
nav input::placeholder{color:var(--g400)}
nav #inp-key{width:150px}
nav #inp-domain{width:180px}
nav #inp-search{width:200px;margin-left:auto}
nav .nbtn{
    height:30px;padding:0 14px;border:none;border-radius:980px;
    font:500 12px/30px var(--f);cursor:pointer;transition:all .2s;
}
nav .nbtn.primary{background:var(--blue);color:var(--white)}
nav .nbtn.primary:hover{background:var(--blue2)}
nav .nbtn.ghost{background:none;color:var(--g600)}
nav .nbtn.ghost:hover{background:var(--g100)}
nav .conn-status{font:500 11px var(--f);color:var(--g400);white-space:nowrap}
nav .conn-status.on{color:var(--green)}

/* ===== LAYOUT ===== */
.app{display:flex;height:calc(100vh - 52px)}

/* ===== LEFT PANEL ===== */
.left{width:360px;display:flex;flex-direction:column;background:var(--white);border-right:0.5px solid var(--g200)}
.tabs{display:flex;padding:12px 12px 0;gap:4px}
.tabs button{
    height:32px;padding:0 14px;border:none;border-radius:980px;
    font:500 12px var(--f);cursor:pointer;color:var(--g600);background:none;transition:all .15s;
}
.tabs button:hover{background:var(--g100)}
.tabs button.on{background:var(--black);color:var(--white)}
.tabs .cnt{margin-left:auto;font:500 11px var(--f);color:var(--g400);align-self:center;padding-right:4px}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;background:#e53e3e;color:#fff;font:700 10px/1 var(--f);padding:0 5px;margin-left:5px;vertical-align:middle}
.list{flex:1;overflow-y:auto;padding:8px 0}
.list::-webkit-scrollbar{width:0;background:transparent}
.tkt{
    display:flex;gap:12px;padding:12px 16px;cursor:pointer;
    border-bottom:0.5px solid var(--g100);transition:background .12s;position:relative;
}
.tkt:hover{background:var(--g50)}
.tkt.active{background:var(--blue-bg)}
.tkt.active::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--blue)}
.tkt .pri{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0}
.tkt .col{flex:1;min-width:0}
.tkt .ttl{font:500 13px/1.3 var(--f);color:var(--black);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tkt .sub{font:12px var(--f);color:var(--g500);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tkt .right{text-align:right;flex-shrink:0}
.tkt .time{font:11px var(--f);color:var(--g400)}
.tkt .indicator{
    display:inline-block;margin-top:4px;height:18px;padding:0 7px;border-radius:980px;
    font:600 9px/18px var(--f);letter-spacing:0.3px;text-transform:uppercase;
}
.tkt .indicator.yours{background:var(--orange-bg);color:#b36b00}
.tkt .indicator.wait{background:var(--green-bg);color:#1a8a3a}
.tkt .indicator.new{background:var(--blue-bg);color:var(--blue)}
.tkt .indicator.stale{background:var(--red-bg);color:#c00}
.pgr{display:flex;gap:8px;padding:10px;justify-content:center;border-top:0.5px solid var(--g200)}
.pgr button{
    height:28px;padding:0 12px;border:0.5px solid var(--g200);border-radius:8px;
    font:12px var(--f);cursor:pointer;background:var(--white);color:var(--g600);
}
.pgr button:disabled{opacity:.3;cursor:default}
.pgr span{font:12px var(--f);color:var(--g400);align-self:center}

/* ===== RIGHT PANEL ===== */
.right-panel{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--g100)}
#hdr{flex-shrink:0}
#tab-bar{flex-shrink:0}
#scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
#scroll-area::-webkit-scrollbar{width:6px}
#scroll-area::-webkit-scrollbar-track{background:transparent}
#scroll-area::-webkit-scrollbar-thumb{background:var(--g300);border-radius:3px}
.rpad{padding:24px 32px 60px;max-width:800px}

.hdr-box{padding:20px 32px;background:var(--white);border-bottom:0.5px solid var(--g200)}
.hdr-box h1{font:600 20px/1.35 var(--f);letter-spacing:-0.4px;color:var(--black);margin-bottom:8px}
.hdr-box .chips{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.hdr-box .hdr-actions{margin-top:10px}
.btn-fd{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:980px;font:600 11px/1 var(--f);color:var(--white);background:linear-gradient(135deg,#0ea5e9,#6366f1);border:none;cursor:pointer;text-decoration:none;letter-spacing:0.2px;transition:opacity .15s}
.btn-fd:hover{opacity:.85}
.btn-fd svg{width:12px;height:12px;fill:currentColor}
.chip{
    height:22px;padding:0 9px;border-radius:980px;
    font:600 10px/22px var(--f);letter-spacing:0.2px;display:inline-flex;align-items:center;
}
.chip-open{background:var(--blue-bg);color:var(--blue)}
.chip-pending{background:var(--orange-bg);color:#b36b00}
.chip-resolved{background:var(--green-bg);color:#1a8a3a}
.chip-closed{background:var(--g100);color:var(--g500)}
.chip-urg{background:var(--red-bg);color:var(--red)}
.chip-high{background:var(--orange-bg);color:#c05500}
.chip-med{background:#fff8e1;color:#9a7b00}
.chip-low{background:var(--green-bg);color:#1a8a3a}
.chip-meta{background:none;color:var(--g500);padding:0;font-weight:400;font-size:12px}

.tab-row{display:flex;padding:0 32px;background:var(--white);border-bottom:0.5px solid var(--g200)}
.tab-row button{
    height:42px;padding:0 6px;margin:0 10px;border:none;border-bottom:2px solid transparent;
    font:500 13px var(--f);color:var(--g500);background:none;cursor:pointer;transition:all .15s;
}
.tab-row button:hover{color:var(--black)}
.tab-row button.on{color:var(--blue);border-bottom-color:var(--blue)}
.tab-row .bdg{
    display:inline-flex;height:16px;padding:0 5px;border-radius:8px;
    font:600 10px/16px var(--f);background:var(--g100);color:var(--g500);margin-left:4px;
}
.tab-row button.on .bdg{background:var(--blue-bg);color:var(--blue)}

/* ===== SUMMARY CONTENT ===== */
.action-strip{
    display:flex;align-items:center;gap:14px;padding:18px 20px;border-radius:var(--r);margin-bottom:20px;
    font:600 15px/1.3 var(--f);letter-spacing:-0.2px;
    animation:fadeUp .4s ease;
}
.action-strip .emoji{font-size:24px}
.action-strip .desc{flex:1}
.action-strip .when{font:400 12px var(--f);opacity:.55}
.action-strip.act-respond{background:linear-gradient(135deg,#fff7ed,#fff1e0);color:#7c2d12}
.action-strip.act-waiting{background:linear-gradient(135deg,#faf5ff,#f3e8ff);color:#581c87}
.action-strip.act-followup{background:linear-gradient(135deg,#fef2f2,#ffe4e6);color:#7f1d1d}
.action-strip.act-new{background:linear-gradient(135deg,#eff6ff,#dbeafe);color:#1e3a8a}

.grid-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;animation:fadeUp .45s ease}
.gs{background:var(--white);border-radius:var(--r2);padding:16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.gs .n{font:700 24px var(--f);color:var(--blue);letter-spacing:-.5px}
.gs .l{font:500 11px var(--f);color:var(--g500);margin-top:2px}

.panel{background:var(--white);border-radius:var(--r);padding:20px 22px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);animation:fadeUp .5s ease}
.panel h2{font:600 11px var(--f);color:var(--g400);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
.panel p{font:14px/1.7 var(--f);color:var(--g700)}

.steps-box{background:linear-gradient(135deg,#fffbeb,#fef9c3);border-radius:var(--r);padding:20px 22px;margin-bottom:16px;animation:fadeUp .47s ease}
.steps-box h2{font:600 11px var(--f);color:#92400e;text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
.steps-box li{list-style:none;font:14px/1.7 var(--f);color:#78350f;padding:3px 0;display:flex;gap:8px}
.steps-box li::before{content:"\2192";color:#d97706;font-weight:700}

.exch-bubble{padding:12px 16px;border-radius:var(--r2);margin-bottom:8px;border-left:3px solid;font:13px/1.7 var(--f);animation:fadeUp .5s ease}
.exch-bubble.agent{background:#f0f4ff;border-color:var(--blue);color:var(--g700)}
.exch-bubble.customer{background:#faf5ff;border-color:var(--purple);color:var(--g700)}
.exch-bubble .label{font:600 10px var(--f);color:var(--g400);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}

.topic-list{display:flex;gap:6px;flex-wrap:wrap}
.topic-pill{height:26px;padding:0 12px;border-radius:980px;font:500 12px/26px var(--f);background:var(--g100);color:var(--g600);transition:all .15s}
.topic-pill:hover{background:var(--g200)}

.tl-btn{font:500 13px var(--f);color:var(--blue);cursor:pointer;padding:8px 0;user-select:none;display:flex;align-items:center;gap:4px}
.tl-btn:hover{color:var(--blue2)}
.tl-entry{display:flex;gap:10px;padding:6px 0;border-bottom:0.5px solid var(--g100);font:12px var(--f)}
.tl-entry:last-child{border:none}
.tl-entry .d{color:var(--g400);min-width:70px}
.tl-entry .w{min-width:56px;font-weight:600}
.tl-entry .w.agent{color:var(--blue)}
.tl-entry .w.customer{color:var(--purple)}
.tl-entry .w.note{color:var(--green)}
.tl-entry .t{color:var(--g700);flex:1}

/* ===== THREAD ===== */
.bubble{margin-bottom:12px;border-radius:var(--r);padding:16px 20px;border-left:3px solid;animation:fadeUp .3s ease}
.bubble.agent{background:#f0f4ff;border-color:var(--blue)}
.bubble.customer{background:#faf5ff;border-color:var(--purple)}
.bubble.note{background:#f0fdf4;border-color:var(--green)}
.bubble .bh{display:flex;justify-content:space-between;margin-bottom:10px}
.bubble .bh .nm{font:600 13px var(--f);color:var(--black)}
.bubble .bh .dt{font:12px var(--f);color:var(--g400)}
.bubble .bb{font:13px/1.8 var(--f);color:var(--g700)}
.bubble .bb img{max-width:100%;border-radius:var(--r3);margin:8px 0}
.bubble .bb a{color:var(--blue);text-decoration:none}
.bubble .bb a:hover{text-decoration:underline}

/* ===== REPLIES ===== */
.rg{margin-bottom:24px}
.rg h3{font:600 11px var(--f);color:var(--g400);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.rc{
    background:var(--white);border-radius:var(--r);padding:18px 20px;margin-bottom:10px;
    box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid transparent;
    transition:all .2s;animation:fadeUp .3s ease;
}
.rc:hover{border-color:var(--blue);box-shadow:0 4px 12px rgba(0,122,255,.08)}
.rc .rc-title{font:600 15px/1.3 var(--f);color:var(--black);letter-spacing:-.2px}
.rc .rc-why{font:12px var(--f);color:var(--blue);margin-top:2px}
.rc .rc-body{
    margin-top:10px;padding:14px 16px;background:var(--g50);border-radius:var(--r2);
    font:13px/1.7 var(--f);color:var(--g600);white-space:pre-wrap;
    max-height:80px;overflow:hidden;position:relative;cursor:pointer;transition:max-height .3s;
}
.rc .rc-body.shut::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(transparent,var(--g50));pointer-events:none}
.rc .rc-body.open{max-height:1000px}
.rc .rc-copy{
    margin-top:10px;height:32px;padding:0 18px;border:none;border-radius:980px;
    font:500 12px/32px var(--f);cursor:pointer;background:var(--blue);color:var(--white);transition:all .15s;
}
.rc .rc-copy:hover{background:var(--blue2)}
.rc .rc-copy.did{background:var(--green)}
.lang-badge{display:inline-block;padding:4px 12px;border-radius:980px;font:600 10px/1 var(--f);letter-spacing:0.3px;color:var(--blue);background:var(--blue-bg);margin-bottom:12px;text-transform:uppercase}
.ctx-box{padding:8px 12px;border-radius:8px;background:var(--orange-bg);color:#b36b00;font:500 11px/1.4 var(--f);margin-bottom:12px}
.ai-btn{display:flex;align-items:center;gap:8px;margin:16px 0;padding:12px 20px;border:2px dashed var(--blue);border-radius:12px;background:var(--blue-bg);color:var(--blue);font:600 13px/1 var(--f);cursor:pointer;transition:all .15s;width:100%}
.ai-btn:hover{background:var(--blue);color:#fff;border-style:solid}
.ai-btn:disabled{opacity:.6;cursor:wait;border-style:dotted}
.ai-btn svg{width:16px;height:16px;flex-shrink:0}
.ai-result{margin-top:12px;padding:16px;border-radius:12px;background:var(--blue-bg);border:1px solid color-mix(in srgb,var(--blue) 20%,transparent)}
.ai-result .rc-body{white-space:pre-wrap;font:13px/1.6 var(--f);color:var(--black);margin:8px 0}
.ai-result .rc-copy{margin-top:10px;height:32px;padding:0 18px;border:none;border-radius:980px;font:500 12px/32px var(--f);cursor:pointer;background:var(--blue);color:var(--white);transition:all .15s}
.ai-result .rc-copy:hover{background:var(--blue2)}
.ai-result .rc-copy.did{background:var(--green)}

.empty-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--g400);gap:8px;font:14px var(--f)}
.loading-msg{text-align:center;padding:60px;color:var(--g400);font:13px var(--f)}
.loading-msg::after{content:'';display:inline-block;width:14px;height:14px;border:2px solid var(--g200);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;margin-left:8px;vertical-align:middle}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<nav>
    <span class="brand">Support Hub</span>
    <span class="dot"></span>
    <input type="password" id="inp-key" placeholder="API Key">
    <button class="nbtn ghost" onclick="toggleKey()">Show</button>
    <input type="text" id="inp-domain" value="kyexpert.freshdesk.com">
    <button class="nbtn primary" onclick="connect()">Connect</button>
    <input type="text" id="inp-search" placeholder="Search tickets...">
    <button class="nbtn primary" onclick="doSearch()">Search</button>
    <span class="conn-status" id="conn-status"></span>
</nav>

<div class="app">
    <!-- LEFT: ticket list -->
    <div class="left">
        <div class="tabs">
            <button onclick="filt(this,'new')">New Tickets<span class="tab-badge" id="new-badge" style="display:none">0</span></button>
            <button class="on" onclick="filt(this,2)">My Turn</button>
            <button onclick="filt(this,3)">Waiting</button>
            <button onclick="filt(this,'all')">All</button>
            <span class="cnt" id="cnt"></span>
            <button onclick="refresh()" title="Refresh" style="margin-left:auto;background:none;border:none;cursor:pointer;font-size:1rem;padding:2px 6px;color:var(--g500)">&#x21bb;</button>
        </div>
        <div class="list" id="list"><div class="empty-msg">Connect to load tickets</div></div>
        <div class="pgr" id="pgr" style="display:none">
            <button id="pb" onclick="pg(-1)">Prev</button><span id="pi"></span><button id="pn" onclick="pg(1)">Next</button>
        </div>
    </div>

    <!-- RIGHT: detail (static structure = scroll works) -->
    <div class="right-panel">
        <div id="hdr"><div class="empty-msg" style="height:100%">Select a ticket</div></div>
        <div id="tab-bar"></div>
        <div id="scroll-area">
            <div id="content"></div>
        </div>
    </div>
</div>

<script>
const PC={1:'var(--green)',2:'var(--orange)',3:'var(--red)',4:'var(--red)'};
const PN={1:'Low',2:'Medium',3:'High',4:'Urgent'};
const PCLS={1:'chip-low',2:'chip-med',3:'chip-high',4:'chip-urg'};
const SN={2:'Open',3:'Pending',4:'Resolved',5:'Closed'};
const SCLS={2:'chip-open',3:'chip-pending',4:'chip-resolved',5:'chip-closed'};
const ICLS={1:'pill-low',2:'pill-med',3:'pill-high',4:'pill-urg'};

let D={key:'',dom:'',tks:[],cur:null,cvs:[],fl:2,pg:1,pgs:1,aid:null,anm:'',allOpen:[],lr:{},canned:null,newTks:[]};

document.getElementById('inp-search').onkeydown=e=>{if(e.key==='Enter')doSearch()};
document.getElementById('inp-key').onkeydown=e=>{if(e.key==='Enter')connect()};
function toggleKey(){const i=document.getElementById('inp-key');i.type=i.type==='password'?'text':'password'}

(function(){const k=localStorage.getItem('fd_apikey');if(k){document.getElementById('inp-key').value=k;setTimeout(connect,300)}})();

async function api(p,retries){
    retries=retries||0;
    const r=await fetch('/fd/'+p,{headers:{'X-FD-Key':D.key,'X-FD-Domain':D.dom}});
    if(r.status===429&&retries<3){
        const wait=Math.pow(2,retries)*2000;
        await new Promise(ok=>setTimeout(ok,wait));
        return api(p,retries+1);
    }
    if(!r.ok)throw new Error('API '+r.status);return r;
}
async function get(p){return(await api(p)).json()}

async function connect(){
    D.key=document.getElementById('inp-key').value.trim();
    D.dom=document.getElementById('inp-domain').value.trim();
    if(!D.key||!D.dom)return st('Enter key & domain');
    st('Connecting...');
    try{
        const me=await get('agents/me');D.aid=me.id;D.anm=me.contact?me.contact.name:'Agent';
        localStorage.setItem('fd_apikey',D.key);st(D.anm,1);
        loadCanned();
        await load();
        await loadNewTickets();
        if(!D._newPoll)D._newPoll=setInterval(()=>{loadNewTickets()},60000);
    }catch(e){
        if(e.message.includes('404')){try{await get('tickets?per_page=1');localStorage.setItem('fd_apikey',D.key);st('Connected',1);load()}catch(e2){st('Failed')}}
        else st('Failed: '+e.message);
    }
}

function loadCanned(){
    const cached=localStorage.getItem('fd_canned');
    if(cached){try{D.canned=JSON.parse(cached);return}catch(e){}}
    get('canned_response_folders').then(folders=>{
        if(!folders||!folders.length){D.canned=[];return}
        const fetchSeq=async()=>{
            const all=[];
            for(const f of folders){
                try{const r=await get('canned_response_folders/'+f.id+'/responses');all.push(...r)}catch(e){}
            }
            return all;
        };
        return fetchSeq().then(all=>{
            D.canned=all.filter(c=>c.title&&(c.title.includes('[MES]')||c.title.includes('[BRM]')));
            try{localStorage.setItem('fd_canned',JSON.stringify(D.canned))}catch(e){}
        });
    }).catch(()=>{D.canned=[]});
}

async function loadAll(){
    document.getElementById('list').innerHTML='<div class="loading-msg">Loading tickets</div>';
    let q='"agent_id:'+D.aid+'"';
    let all=[],pg=1;
    while(true){
        const d=await get('search/tickets?query='+encodeURIComponent(q)+'&page='+pg);
        const res=d.results||[];
        all=all.concat(res);
        if(res.length<30||pg>=10)break;
        pg++;
    }
    D.allOpen=all.filter(t=>t.status!==4&&t.status!==5);
    document.getElementById('list').innerHTML='<div class="loading-msg">Loading details 0/'+D.allOpen.length+'</div>';
    D.lr={};
    const cache=JSON.parse(localStorage.getItem('fd_cache2')||'{}');
    const batches=[];
    for(let i=0;i<D.allOpen.length;i+=5)batches.push(D.allOpen.slice(i,i+5));
    let done=0;
    for(const batch of batches){
        const results=await Promise.all(batch.map(t=>{
            const c=cache[t.id];
            if(c&&c.u===t.updated_at){return Promise.resolve({id:t.id,cached:true,lr:c.lr,rn:c.rn,co:c.co})}
            return get('tickets/'+t.id+'?include=stats,requester,company').then(d=>({id:t.id,cached:false,d})).catch(()=>({id:t.id,cached:true,lr:true,rn:'Unknown',co:''}));
        }));
        for(const r of results){
            const t=D.allOpen.find(x=>x.id===r.id);
            if(r.cached&&!r.d){
                D.lr[t.id]=r.lr;t._reqName=r.rn;t._company=r.co;
            }else{
                const d=r.d;
                const rr=d.stats?d.stats.requester_responded_at:null;
                const ar=d.stats?d.stats.agent_responded_at:null;
                D.lr[t.id]=!ar?true:(!rr?false:new Date(rr)>new Date(ar));
                t._reqName=d.requester?d.requester.name:'Unknown';
                t._company=d.company?d.company.name:'';
                cache[t.id]={u:t.updated_at,lr:D.lr[t.id],rn:t._reqName,co:t._company,ar:ar};
            }
            done++;
        }
        document.getElementById('list').innerHTML='<div class="loading-msg">Loading details '+done+'/'+D.allOpen.length+'</div>';
    }
    try{localStorage.setItem('fd_cache2',JSON.stringify(cache))}catch(e){}
    applyFilter();
}

async function loadNewTickets(){
    try{
        if(!D._teamIds){
            let allAgents=[],apg=1;
            while(true){
                const a=await get('agents?per_page=100&page='+apg);
                allAgents=allAgents.concat(a);
                if(a.length<100)break;
                apg++;
            }
            D._teamIds=allAgents.filter(a=>{
                const n=a.contact?a.contact.name:'';
                return /alexis|ramiro/i.test(n);
            }).map(a=>a.id);
        }
        if(!D._teamIds.length){D.newTks=[];updateNewBadge();return}

        let all=[];
        for(const aid of D._teamIds){
            let q='"agent_id:'+aid+' AND status:2"';
            let pg=1;
            while(true){
                const d=await get('search/tickets?query='+encodeURIComponent(q)+'&page='+pg);
                const res=d.results||[];
                all=all.concat(res);
                if(res.length<30||pg>=10)break;
                pg++;
            }
        }
        let filtered=all;

        const noReply=[];
        const cache=JSON.parse(localStorage.getItem('fd_cache2')||'{}');
        const batches=[];
        for(let i=0;i<filtered.length;i+=5)batches.push(filtered.slice(i,i+5));
        for(const batch of batches){
            const results=await Promise.all(batch.map(t=>{
                const c=cache[t.id];
                if(c&&c.u===t.updated_at&&c.ar!==undefined){
                    return Promise.resolve({id:t.id,cached:true,replied:!!c.ar,rn:c.rn,co:c.co});
                }
                return get('tickets/'+t.id+'?include=stats,requester,company').then(d=>({id:t.id,cached:false,d})).catch(()=>({id:t.id,cached:true,replied:false,rn:'Unknown',co:''}));
            }));
            for(const r of results){
                const t=filtered.find(x=>x.id===r.id);
                if(r.cached&&!r.d){
                    t._reqName=r.rn;t._company=r.co;
                    if(!r.replied)noReply.push(t);
                }else if(r.d){
                    const replied=!!(r.d.stats&&r.d.stats.agent_responded_at);
                    t._reqName=r.d.requester?r.d.requester.name:'Unknown';
                    t._company=r.d.company?r.d.company.name:'';
                    cache[t.id]={u:t.updated_at,lr:true,rn:t._reqName,co:t._company,ar:r.d.stats?r.d.stats.agent_responded_at:null};
                    if(!replied)noReply.push(t);
                }else{
                    noReply.push(t);
                }
            }
        }
        try{localStorage.setItem('fd_cache2',JSON.stringify(cache))}catch(e){}
        D.newTks=noReply.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
        updateNewBadge();
    }catch(e){D.newTks=[];updateNewBadge()}
}

function updateNewBadge(){
    const c=D.newTks.length;
    const badge=document.getElementById('new-badge');
    if(c>0){badge.textContent=c;badge.style.display='inline-flex'}
    else{badge.style.display='none'}
}

function applyFilter(){
    if(D.fl==='new'){
        D.tks=D.newTks.slice();
    }
    else if(D.fl===2)D.tks=D.allOpen.filter(t=>D.lr[t.id]===true).sort((a,b)=>new Date(a.updated_at)-new Date(b.updated_at));
    else if(D.fl===3)D.tks=D.allOpen.filter(t=>D.lr[t.id]===false).sort((a,b)=>new Date(b.updated_at)-new Date(a.updated_at));
    else D.tks=D.allOpen.slice();
    D.pgs=1;
    rl();up();document.getElementById('cnt').textContent=D.tks.length;
}

async function load(){
    document.getElementById('list').innerHTML='<div class="loading-msg">Loading</div>';
    try{
        if(D.aid){
            if(D.fl==='new'){if(D.newTks.length===0)await loadNewTickets();applyFilter()}
            else if(D.allOpen.length===0){await loadAll()}
            else{applyFilter()}
        }else{
            D.tks=await get('tickets?per_page=100&page='+D.pg+'&order_by=updated_at&order_type=desc&include=requester');
            rl();up();document.getElementById('cnt').textContent=D.tks.length;
        }
    }catch(e){document.getElementById('list').innerHTML='<div class="empty-msg">'+esc(e.message)+'</div>'}
}

function rl(){
    const el=document.getElementById('list');
    if(!D.tks.length){el.innerHTML='<div class="empty-msg">No tickets</div>';return}
    el.innerHTML=D.tks.map(t=>{
        const ac=D.cur&&D.cur.id===t.id?'active':'';
        const rq=t._reqName||(t.requester?t.requester.name:'Unknown');
        const co=t._company||'';
        const sub=co?(esc(rq)+' &middot; '+esc(co)):esc(rq);
        const stale=Math.floor((Date.now()-new Date(t.updated_at))/864e5);
        let ind='',ic='';
        const isNew=D.newTks.some(n=>n.id===t.id);
        if(isNew){ind='new';ic='NEW'}
        else if(D.lr[t.id]===true){ind='yours';ic='YOUR TURN'}
        else if(D.lr[t.id]===false){ind='wait';ic='WAITING'}
        return '<div class="tkt '+ac+'" onclick="sel('+t.id+')">'+
            '<div class="pri" style="background:'+(PC[t.priority]||'var(--g300)')+'"></div>'+
            '<div class="col"><div class="ttl">#'+t.id+' '+esc(t.subject||'')+'</div><div class="sub">'+sub+'</div></div>'+
            '<div class="right"><div class="time">'+ago(new Date(t.updated_at))+'</div>'+(ind?'<div class="indicator '+ind+'">'+ic+'</div>':'')+'</div></div>';
    }).join('');
}

async function sel(id){
    document.getElementById('hdr').innerHTML='';
    document.getElementById('tab-bar').innerHTML='';
    document.getElementById('content').innerHTML='<div class="loading-msg">Loading</div>';
    try{
        const t=await get('tickets/'+id+'?include=requester');
        let allConvs=[],pg=1;
        while(true){
            const page=await get('tickets/'+id+'/conversations?per_page=100&page='+pg);
            allConvs=allConvs.concat(page);
            if(page.length<100)break;
            pg++;
        }
        D.cur=t;D.cvs=allConvs;window._langOverride=null;rl();renderRight();
    }catch(e){document.getElementById('content').innerHTML='<div class="empty-msg">'+esc(e.message)+'</div>'}
}

function renderRight(){
    const t=D.cur,c=D.cvs;if(!t)return;
    const rq=t.requester?t.requester.name:'Unknown';
    const age=Math.floor((Date.now()-new Date(t.created_at))/864e5);
    const stale=Math.floor((Date.now()-new Date(t.updated_at))/864e5);

    document.getElementById('hdr').innerHTML=
        '<div class="hdr-box"><h1>#'+t.id+' — '+esc(t.subject||'')+'</h1>'+
        '<div class="chips">'+
        '<span class="chip '+(SCLS[t.status]||'')+'">'+(SN[t.status]||t.status)+'</span>'+
        '<span class="chip '+(PCLS[t.priority]||'')+'">'+(PN[t.priority]||'?')+'</span>'+
        '<span class="chip chip-meta">'+esc(rq)+'</span>'+
        '<span class="chip chip-meta">'+age+'d old</span>'+
        '<span class="chip chip-meta">Updated '+(stale===0?'today':stale+'d ago')+'</span>'+
        '</div>'+
        '<div class="hdr-actions"><a class="btn-fd" href="https://help.kohyoung.com/a/tickets/'+t.id+'" target="_blank" rel="noopener"><svg viewBox="0 0 16 16"><path d="M9 2h5v5l-2-2-4 4-1.5-1.5L10.5 4 9 2zM3 3h4v1.5H3.5v8h8V9H13v4.5A1.5 1.5 0 0111.5 15h-8A1.5 1.5 0 012 13.5v-8A1.5 1.5 0 013.5 4H3V3z"/></svg>Open in Freshdesk</a></div>'+
        '</div>';

    document.getElementById('tab-bar').innerHTML=
        '<div class="tab-row">'+
        '<button class="on" onclick="tab(this,0)">Summary</button>'+
        '<button onclick="tab(this,1)">Thread <span class="bdg">'+c.length+'</span></button>'+
        '<button onclick="tab(this,2)">Quick Reply</button>'+
        '</div>';

    showPane(0);
}

function tab(b,i){b.parentElement.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');showPane(i)}

function showPane(i){
    const t=D.cur,c=D.cvs;
    const el=document.getElementById('content');
    el.scrollTop=0;
    if(i===0)el.innerHTML='<div class="rpad">'+summaryHTML(t,c)+'</div>';
    else if(i===1)el.innerHTML='<div class="rpad">'+threadHTML(t,c)+'</div>';
    else el.innerHTML='<div class="rpad">'+replyHTML(t,c)+'</div>';
    document.getElementById('scroll-area').scrollTop=0;
}

/* =============== SUMMARY =============== */
function summaryHTML(t,c){
    const m=msgs(t,c),a=ana(t,m);
    let h='';

    h+='<div class="action-strip act-'+a.sit+'"><span class="emoji">'+a.ico+'</span><span class="desc">'+a.lbl+'</span><span class="when">'+(a.stale>0?a.stale+'d ago':'today')+'</span></div>';

    h+='<div class="grid-stats"><div class="gs"><div class="n">'+a.tot+'</div><div class="l">Messages</div></div><div class="gs"><div class="n">'+a.nc+'</div><div class="l">Customer</div></div><div class="gs"><div class="n">'+a.na+'</div><div class="l">Agent</div></div><div class="gs"><div class="n">'+a.age+'d</div><div class="l">Age</div></div></div>';

    if(a.steps.length)h+='<div class="steps-box"><h2>What to Do Next</h2><ul>'+a.steps.map(s=>'<li>'+esc(s)+'</li>').join('')+'</ul></div>';

    const fc=m.find(x=>x.f==='Customer');
    if(fc)h+='<div class="panel"><h2>Original Issue</h2><p>'+esc(trunc(fc.t,600))+'</p></div>';

    const pub=m.filter(x=>x.f!=='Note').slice(-4);
    if(pub.length){
        h+='<div class="panel"><h2>Where You Left Off</h2>';
        pub.forEach(x=>{
            const cl=x.f==='Agent'?'agent':'customer';
            h+='<div class="exch-bubble '+cl+'"><div class="label">'+x.f+' — '+new Date(x.d).toLocaleDateString()+'</div>'+esc(trunc(x.t,350))+'</div>';
        });h+='</div>';
    }

    if(a.topics.length)h+='<div class="panel"><h2>Topics</h2><div class="topic-list">'+a.topics.map(x=>'<span class="topic-pill">'+esc(x)+'</span>').join('')+'</div></div>';

    h+='<div class="panel"><div class="tl-btn" onclick="const n=this.nextElementSibling;n.style.display=n.style.display===\'none\'?\'block\':\'none\'">&#9660; Full timeline ('+m.length+')</div><div style="display:none">';
    m.forEach(x=>{h+='<div class="tl-entry"><span class="d">'+new Date(x.d).toLocaleDateString()+'</span><span class="w '+x.f.toLowerCase()+'">'+x.f+'</span><span class="t">'+esc(trunc(x.t,120))+'</span></div>'});
    h+='</div></div>';
    return h;
}

/* =============== THREAD =============== */
function threadHTML(t,c){
    let h='';
    const total=c.length+(t.description?1:0);
    if(total>10)h+='<div style="text-align:center;padding:8px"><button onclick="jumpToLatest()" style="padding:6px 16px;border:1px solid var(--g200);border-radius:8px;background:var(--white);font:600 12px var(--f);color:var(--blue);cursor:pointer">Jump to latest ('+total+' messages)</button></div>';
    if(t.description)h+='<div class="bubble customer"><div class="bh"><span class="nm">'+esc(t.requester?t.requester.name:'Customer')+' (Original)</span><span class="dt">'+new Date(t.created_at).toLocaleString()+'</span></div><div class="bb">'+safe(t.description)+'</div></div>';
    c.forEach((x,i)=>{
        const tp=x.private?'note':(x.incoming?'customer':'agent');
        const lb=x.private?'Private Note':(x.incoming?'Customer':'Agent');
        const last=i===c.length-1?' id="last-msg"':'';
        h+='<div class="bubble '+tp+'"'+last+'><div class="bh"><span class="nm">'+esc(x.from_email||lb)+' ('+lb+')</span><span class="dt">'+new Date(x.created_at).toLocaleString()+'</span></div><div class="bb">'+safe(x.body||'')+'</div></div>';
    });
    return h||'<div class="empty-msg">No conversations</div>';
}
function jumpToLatest(){const el=document.getElementById('last-msg');if(el)el.scrollIntoView({behavior:'smooth',block:'center'})}

function matchKB(text,alreadyUsed){
    const low=text.toLowerCase();
    return KB.filter(k=>k.kw.test(low)&&!alreadyUsed.has(k.id));
}

function findTriedSolutions(msgs){
    const tried=new Set();
    const agentTexts=msgs.filter(x=>x.f==='Agent').map(x=>x.t.toLowerCase()).join(' ');
    KB.forEach(k=>{if(k.kw.test(agentTexts))tried.add(k.id)});
    return tried;
}

function matchCanned(issueLow,allTextLow,ctx,lang){
    if(!D.canned||!D.canned.length)return[];
    const words=issueLow.replace(/[^a-záéíóúüñ\s]/gi,'').split(/\s+/).filter(w=>w.length>3);
    return D.canned.filter(cr=>{
        const title=cr.title.toLowerCase();
        const content=(cr.content_text||strip(cr.content||'')).toLowerCase();
        const titleWords=title.replace(/[\[\]]/g,'').split(/\s+/).filter(w=>w.length>3);
        let score=0;
        for(const tw of titleWords){
            if(issueLow.includes(tw))score+=2;
            if(allTextLow.includes(tw))score+=1;
        }
        for(const w of words){
            if(title.includes(w))score+=2;
            if(content.includes(w))score+=1;
        }
        if(ctx.isBRM&&title.includes('[brm]'))score+=3;
        if(ctx.isInspection&&title.includes('[mes]'))score+=3;
        if(ctx.isError&&(content.includes('error')||title.includes('error')))score+=2;
        cr._score=score;
        cr._id=cr.id;
        return score>=5;
    }).sort((a,b)=>b._score-a._score).slice(0,2);
}

function cannedBody(cr,firstName,tid,hi,bye,lang){
    let body=strip(cr.content||'').replace(/\{\{ticket\.requester\.name\}\}/gi,firstName).replace(/\{\{ticket\.id\}\}/gi,String(tid||''));
    const hasAttach=/\[attachment\]|\[image\]/i.test(body);
    body=body.replace(/\[attachment\]/gi,'').replace(/\[image\]/gi,'').trim();
    if(hasAttach){
        const note=lang==='es'
            ?'⚠️ Esta canned response ("'+cr.title+'") contiene adjuntos.\nUsar "Insert Canned Response" → "'+cr.title+'" en Freshdesk para incluir los archivos adjuntos.'
            :'⚠️ This canned response ("'+cr.title+'") contains attachments.\nUse "Insert Canned Response" → "'+cr.title+'" in Freshdesk to include the attached files.';
        if(!body||body.length<10){
            const intro=lang==='es'?'Adjunto encontrarás la información solicitada. Por favor sigue las instrucciones del manual adjunto.':'Please find the requested information attached. Follow the instructions provided in the attached manual.';
            body=hi+',\n\n'+intro+'\n\n'+bye+'\n\n---\n'+note;
        }else{
            body=body+'\n\n---\n'+note;
        }
    }
    return body;
}

function cleanEmailBody(text){
    if(!text)return '';
    return text
        .replace(/--+\s*\n[\s\S]*$/,'')
        .replace(/_{3,}[\s\S]*$/,'')
        .replace(/^(De|From|Sent|Enviado|Date|Fecha|Para|To|Cc|Subject|Asunto):.*$/gm,'')
        .replace(/(Best regards|Kind regards|Regards|Saludos|Saludos cordiales|Atentamente|Cordialmente)[\s\S]*$/im,'')
        .replace(/\b[\w.-]+@[\w.-]+\.\w+\b/g,'')
        .replace(/(?:tel|phone|fax|cell|móvil|ext)[\s.:]*[\d\s\-+().]+/gi,'')
        .replace(/\s{2,}/g,' ')
        .trim();
}

function extractBody(text){
    let t=text;
    t=t.replace(/^(Hola|Hi|Hello|Dear|Buenos?\s*d[ií]as?|Buen d[ií]a|Estimado\/?)[\s,\w]*[,.:]\s*/i,'');
    t=t.replace(/(Saludos?\s*(cordiales)?|Best regards|Kind regards|Regards|Quedo al pendiente|Quedamos al pendiente|Quedo atento|Atentamente|Cordialmente)[,.\s]*$/i,'');
    return t.trim();
}

function detectLang(m,subject){
    const custMsgs=m.filter(x=>x.f==='Customer').map(x=>extractBody(cleanEmailBody(x.t)));
    const bodies=custMsgs.join(' ').toLowerCase();
    const all=bodies.length>20?bodies:((subject||'')+' '+bodies).toLowerCase();
    const esWords=(all.match(/\b(gracias|por favor|adjunto|problema|máquina|equipo|archivo|enviamos|le comparto|comentar|necesito|tenemos|podría|podemos|favor de|muchas gracias|de antemano|solicitud|actualización|instalación|calibración|verificar|configuración|revisamos|pendiente|sesión|remota|disponibilidad|horario|versión|compartir|funciona|sirve|errores|pregunta|requiere|soporte|también|correo|información|sistema|estamos|programa|proceso|datos|cambios|nuevo|nueva)\b/gi)||[]).length;
    const enWords=(all.match(/\b(thank you|thanks|please|attached|issue|machine|review|kindly|appreciate|follow up|looking forward|availability|schedule|screenshot|resolve|investigate|version|working|error|update|install|check|would|could|should|also|about|have|need|want|with|from|this|that|were|been|will|configuration|export|file|send|share)\b/gi)||[]).length;
    if(esWords===0&&enWords===0){
        const esChars=(all.match(/[áéíóúüñ¿¡]/g)||[]).length;
        if(esChars>=2)return 'es';
    }
    return esWords>enWords?'es':'en';
}

function analyzeAgentStyle(m){
    const agentMsgs=m.filter(x=>x.f==='Agent');
    if(!agentMsgs.length)return{greeting:'',signoff:'',usesName:false,formal:true,phrases:[]};

    const texts=agentMsgs.map(x=>x.t);
    const all=texts.join('\n');

    let greeting='';
    const greetPatterns=[
        /^(Hola\s+[\w]+)/m,/^(Buenos?\s+(?:días?|tardes?|noches?)[\s,]*[\w]*)/mi,
        /^(Estimado\/a?\s+[\w]+)/mi,/^(Buen día[\s,]*[\w]*)/mi,
        /^(Hi\s+[\w]+)/m,/^(Hello\s+[\w]+)/m,/^(Dear\s+[\w]+)/m
    ];
    for(const rx of greetPatterns){
        const match=all.match(rx);
        if(match){greeting=match[1];break}
    }

    let signoff='';
    const signPatterns=[
        /(Saludos\.?)\s*$/mi,/(Quedo al pendiente\.?)\s*$/mi,/(Quedamos al pendiente\.?)\s*$/mi,
        /(Saludos cordiales\.?)\s*$/mi,/(Quedo atento\.?)\s*$/mi,
        /(Best regards\.?)\s*$/mi,/(Kind regards\.?)\s*$/mi,/(Regards\.?)\s*$/mi
    ];
    for(const rx of signPatterns){
        const match=all.match(rx);
        if(match){signoff=match[1].replace(/\.$/,'');break}
    }

    const phrases=[];
    const phraseRx=[
        /quedo al pendiente/gi,/quedo atento/gi,/quedamos al pendiente/gi,
        /le comparto/gi,/le comento/gi,/me permito/gi,/por este medio/gi,
        /de antemano/gi,/buen día/gi,/favor de/gi,
        /let me know/gi,/looking forward/gi,/please find attached/gi,
        /I will review/gi,/I will get back/gi
    ];
    phraseRx.forEach(rx=>{
        const matches=all.match(rx);
        if(matches&&matches.length>=1)phrases.push(matches[0]);
    });

    const usesName=!!all.match(/^(Hola|Hi|Hello|Dear|Estimad)\s+[A-Z]/m);
    const formal=!!all.match(/(estimad|cordial|atento|de antemano|kindly|dear)/i);

    return{greeting,signoff,usesName,formal,phrases};
}

function detectIntent(text){
    const t=text.toLowerCase();
    if(/(?:compartir|enviar|mandar|proporcionar|facilitar|share|send|provide|deliver)\s*(?:la |el |los |las |the |a |an )?(?:versión|version|software|kbr|archivo|file|licen|update|actualiz)/i.test(t))
        return 'request_delivery';
    if(/(?:necesit|requie|ocupo|need|require|want|looking for)\s/i.test(t)&&/(?:versión|version|software|kbr|archivo|file|licen|update|actualiz|nueva?o?|new|latest)/i.test(t))
        return 'request_delivery';
    if(/(?:actualizar|upgrade|update|instalar nueva|install new|migrar|migrate)/i.test(t))
        return 'request_update';
    if(/(?:cotiza|quot|precio|price|cost|purchase|compra|adquirir|buy)/i.test(t))
        return 'request_quote';
    if(/(?:agendar|schedul|programar|coordinar|disponib|availab|sesión|session|reunión|meeting|call)/i.test(t))
        return 'request_schedule';
    if(/(?:error|crash|exception|fail|broken|not.work|falla|no funciona|no sirve|se cayó|problema|issue|problem|bug)/i.test(t))
        return 'report_error';
    if(/(?:línea|line|producción|production).*(down|stop|parad|detenid|caíd|halt|urgent|crítico|critical)/i.test(t))
        return 'report_urgent';
    if(/(?:cómo|how|dónde|where|qué es|what is|cuál|which|puedo|can i|se puede|is it possible)/i.test(t))
        return 'ask_question';
    if(/(?:confirmo|confirm|listo|ready|done|ya (?:quedó|está|instalé|cargué)|installed|completed)/i.test(t))
        return 'confirm_done';
    if(/(?:gracia|thank|resolved|resuelto|funciona|works|solucion)/i.test(t))
        return 'confirm_resolved';
    return 'general';
}

            anotherRemote:'Since we already had a remote session, would you be available for another one to investigate this further?',
            shareNewErrors:'Could you please share any new error messages or screenshots? A remote session may also help us resolve this faster.',
            willReviewDetails:'I will review the details and get back to you with an update.',
            thankMessage:'Thank you for your message. ',
            thankConfirming:'Thank you for confirming. ',
            regYourQuestion:'Regarding your question — [your answer here].',
            investigating:'I am investigating the '+ctx.mainIssue+' issue and ',
            willReviewShared:'review what you shared and ',
            getBackShortly:'will get back to you shortly.',
            asDiscussed:'As discussed, ',
            followUp:'I wanted to follow up on '+subj+'. ',
            noResponseClose:'As we have not heard back in a while, I will proceed to close this case in the next few days. If you still need assistance, please reply and I will reopen it.',
            chanceReview:'Have you had a chance to review my last message? I was asking about ',
            letMeKnowContinue:'Please let me know so I can continue helping you.',
            chanceInstall:'Have you had a chance to install/review the files I sent? Please let me know if you ran into any issues or need help with the process.',
            stillAvailRemote:'Are you still available for the remote session? Please share your preferred date and time, and I will make sure to accommodate.',
            furtherAssistance:'Please let me know if you need any further assistance or if the issue has been resolved.',
            postSessionSummary:'Following our remote session regarding '+subj+', here is a summary:',
            actionsTaken:'Actions taken:',
            describeActions:'[Describe what was done]',
            brmChanges:'[BRM/KBR changes made]',
            pendingItems:'Pending items:',
            ifAny:'[If any]',
            monitorSystem:'Please monitor '+(ctx.isInspection?'the inspection results':'the system')+' and let us know if everything is working as expected.',
            deliverKBR:'Please find attached the updated KBR for '+subj+'.',
            addressesIssue:'This update addresses the '+ctx.mainIssue+' issue we discussed.',
            toInstall:'To install:\n1. Open BRM\n2. File > Load KBR\n3. Select the attached .kbr file\n4. Verify the configuration',
            needRemoteHelp:'Let me know if you need remote assistance during the installation.',
            quoteFor:'Please find below the quotation for '+subj+':',
            quoteDetails:'[Quotation details]',
            validDays:'This quotation is valid for 30 days. Please let me know if you would like to proceed.',
            gladConfirm:'I am glad to confirm that '+(ctx.mainIssue?'the '+ctx.mainIssue+' issue':'the issue reported in this ticket')+' has been resolved.',
            thankRemoteTime:'Thank you for your time during our remote session.',
            willClose:'I will proceed to close this ticket. If you need further assistance, do not hesitate to reach out.',
            suggestRemote:'After reviewing the conversation about '+subj+', I think a remote session via TeamViewer would help us resolve this more efficiently'+(ctx.isError?' and let me see the error firsthand':'')+'.',
            availableSession:'Would you be available for a session? Please share your preferred times.',
            firstResponse:'First Response',
            schedRemote:'Schedule Remote Session',
            confirmResolution:'Confirm Resolution',
            confirmRemote:'Confirm Remote Session',
            ackInfo:'Acknowledge Info',
            provideInstructions:'Provide Instructions',
            ackNewIssue:'New/Recurring Issue',
            replyCustomer:'Reply to Customer',
            suggestRemoteNm:'Suggest Remote Session',
            followUpNm:'Follow-up',
            finalFollowUp:'Final Follow-up',
            postSession:'Post-Session Summary',
            deliverKBRNm:'Deliver KBR',
            sendQuote:'Send Quotation',
            closeTicket:'Resolved — Close Ticket'
        }
    };
    const l=L[lang];
    const gRec=lang==='es'?'Recomendado':'Recommended Now';
    const gAlt=lang==='es'?'Alternativa':'Alternative';
    const gAfter=lang==='es'?'Post-Sesión':'After Session';
    const gDeliv=lang==='es'?'Entregable':'Deliverable';
    const gClose=lang==='es'?'Cerrar':'Close';

    const R=[];

    const issueText=(t.subject||'')+'  '+(firstCust?cleanEmailBody(firstCust.t):'');
    const issueLow=issueText.toLowerCase();
    const cannedMatch=matchCanned(issueLow,cleanTextLow,ctx,lang);
    const usedCannedIds=new Set();

    const intent=detectIntent(issueLow);

    if(a.sit==='new'){
        const kbHits=matchKB(issueText,new Set());
        const intentBody=buildIntentReply(intent,ctx,issueLow,kbHits,hi,bye,lang,l,firstName);

        if(intentBody){
            R.push({g:gRec,nm:intentBody.nm,
                why:intentBody.why,
                body:intentBody.body});
        }

        if(kbHits.length&&!intentBody){
            kbHits.slice(0,2).forEach(kb=>{
                R.push({g:gRec,nm:l.firstResponse,
                    why:(lang==='es'?'Detectado: ':'Detected: ')+kb.id+' → "'+ trunc(issueText,100)+'"',
                    body:hi+',\n\n'+kb[lang]+'\n\n'+bye});
            });
        }

        if(!intentBody&&!kbHits.length&&!cannedMatch.length){
            const needsInfo=!ctx.hasScreenshot&&!ctx.hasLogs&&(ctx.isError||ctx.isTechnical);
            R.push({g:gRec,nm:l.firstResponse,
                why:(lang==='es'?'Cliente reportó: "':'Customer reported: "')+trunc(issueText,120)+'"',
                body:hi+',\n\n'+
                (ctx.isUrgent?KB.find(k=>k.id==='remoteUrgent')[lang]:
                needsInfo?l.toInvestigate:
                ctx.isScheduling?l.scheduleSession:
                ctx.isQuote?l.prepareQuote:
                l.willLookInto)+
                '\n\n'+bye});
        }

        if(cannedMatch.length){
            cannedMatch.forEach(cr=>{
                usedCannedIds.add(cr._id);
                const body=cannedBody(cr,firstName,t.id,hi,bye,lang);
                R.push({g:gAlt,nm:cr.title,
                    why:(lang==='es'?'Canned response relacionada: "':'Related canned response: "')+cr.title+'"',
                    body:body});
            });
        }

        if(ctx.isTechnical)
            R.push({g:gAlt,nm:l.schedRemote,
                why:(lang==='es'?'Tema técnico sobre ':'Technical issue about ')+ctx.mainIssue+(lang==='es'?' — remoto es más rápido':' — remote is faster'),
                body:hi+',\n\n'+l.remoteWouldHelp+'\n\n'+l.pleaseTV+'\n\n'+bye});
    }

    if(a.sit==='respond'){
        if(cannedMatch.length){
            cannedMatch.forEach(cr=>{
                usedCannedIds.add(cr._id);
                const body=cannedBody(cr,firstName,t.id,hi,bye,lang);
                R.push({g:gRec,nm:cr.title,
                    why:(lang==='es'?'Canned response coincide con problema inicial: "':'Canned response matches initial issue: "')+trunc(issueText,100)+'"',
                    body:body});
            });
        }
        const custText=lastCust?lastCust.t:'';
        const custLow=custText.toLowerCase();
        const hasQ=custText.match(/\?/);
        const saysYes=custLow.match(/\b(yes|ok|sure|agree|confirm|available|can do|sounds good|go ahead|sí|si|claro|de acuerdo|confirmo|disponible|adelante|listo|perfecto)\b/i);
        const asksHow=custLow.match(/\b(how to|how do|how can|steps|instructions|procedure|cómo|como|pasos|instrucciones|procedimiento)\b/i);
        const reportsNew=custLow.match(/\b(now|another|also|still|again|new issue|different|happening again|ahora|otro|también|sigue|de nuevo|nuevo problema|diferente|otra vez|persiste)\b/i);
        const sendsInfo=custLow.match(/\b(attached|screenshot|log|here is|please find|sharing|sending|adjunto|captura|le comparto|aquí está|le envío|enviando)\b/i);
        const mentionsTV=custLow.match(/teamviewer|remote|tv\s*id|anydesk|remota|sesión remota/i);
        const mentionsDone=custLow.match(/\b(done|completed|installed|working|fixed|resolved|looks good|thank|listo|completado|instalado|funcionando|resuelto|se arregló|gracias|todo bien)\b/i);

        const kbHits=matchKB(custText,ctx.triedSolutions);
        const kbAll=matchKB(allText,ctx.triedSolutions);

        if(mentionsDone){
            R.push({g:gRec,nm:l.confirmResolution,
                why:(lang==='es'?'Cliente indica que se resolvió: "':'Customer indicates resolved: "')+trunc(custText,100)+'"',
                body:hi+',\n\n'+l.gladResolved+'\n\n'+(ctx.hadRemoteSession?l.afterRemote:'')+l.letUsKnow+'\n\n'+bye});
        }

        if(ctx.customerProvided==='remote_credentials'||mentionsTV){
            R.push({g:gRec,nm:l.confirmRemote,
                why:(lang==='es'?'Cliente compartió credenciales/mencionó remota: "':'Customer shared credentials/mentioned remote: "')+trunc(custText,100)+'"',
                body:hi+',\n\n'+l.thankConfirm+l.shareDateTime+'.\n\n'+l.beforeConnect+'\n\n'+bye});
        }else if(saysYes&&ctx.wasScheduling){
            R.push({g:gRec,nm:l.confirmRemote,
                why:(lang==='es'?'Cliente aceptó sesión remota':'Customer agreed to remote session'),
                body:hi+',\n\n'+l.thankConfirm+l.shareDateTime+'.\n\n'+l.beforeConnect+'\n\n'+bye});
        }

        if(ctx.customerProvided==='logs'||ctx.customerProvided==='screenshots'||ctx.customerProvided==='files'){
            const what=ctx.customerProvided==='screenshots'?l.theScreenshots:(ctx.customerProvided==='logs'?l.theLogFiles:l.theInfo);
            const nextAction=kbHits.length?kbHits[0][lang]:l.willReview+(ctx.customerProvided==='logs'||ctx.customerProvided==='screenshots'?l.them:l.this_)+l.getBackFindings;
            R.push({g:gRec,nm:l.ackInfo,
                why:(lang==='es'?'Cliente envió '+ctx.customerProvided+': "':'Customer sent '+ctx.customerProvided+': "')+trunc(custText,100)+'"',
                body:hi+',\n\n'+l.thankSharing+what+'.\n\n'+nextAction+'\n\n'+bye});
        }

        if(ctx.customerProvided==='installed'){
            R.push({g:gRec,nm:lang==='es'?'Verificar Instalación':'Verify Installation',
                why:(lang==='es'?'Cliente indica que instaló: "':'Customer indicates installed: "')+trunc(custText,100)+'"',
                body:hi+',\n\n'+(lang==='es'?
                    'Gracias por confirmar la instalación. ¿Podrías verificar que todo funcione correctamente y compartir los resultados?':
                    'Thank you for confirming the installation. Could you verify that everything is working correctly and share the results?')+'\n\n'+bye});
        }

        if(kbHits.length&&!mentionsDone&&!ctx.customerProvided){
            kbHits.slice(0,2).forEach(kb=>{
                const alreadyAdded=R.some(r=>r.body.includes(kb[lang]));
                if(!alreadyAdded){
                    R.push({g:gRec,nm:(lang==='es'?'Respuesta: ':'Response: ')+kb.id,
                        why:(lang==='es'?'Detectado en mensaje: ':'Detected in message: ')+kb.id+' → "'+trunc(custText,80)+'"',
                        body:hi+',\n\n'+kb[lang]+'\n\n'+bye});
                }
            });
        }

        if(hasQ&&asksHow){
            const kbInstr=kbAll.find(k=>['kbrInstall','fileExport','barcodeIssue','guiSetting'].includes(k.id));
            R.push({g:gRec,nm:l.provideInstructions,
                why:(lang==='es'?'Cliente pregunta cómo: "':'Customer asking how to: "')+trunc(custText,100)+'"',
                body:hi+',\n\n'+(kbInstr?kbInstr[lang]:l.regQuestion+'\n\n1. ['+l.step+' 1]\n2. ['+l.step+' 2]\n3. ['+l.step+' 3]')+'\n\n'+(ctx.isBRM?l.backupFirst+'\n\n':'')+l.questionsProcess+'\n\n'+bye});
        }

        if(reportsNew&&!mentionsDone){
            const isPersist=custLow.match(/again|still|persist|sigue|otra vez|persiste/i);
            const kbFix=kbHits.length?'\n\n'+kbHits[0][lang]:'';
            R.push({g:gRec,nm:l.ackNewIssue,
                why:(lang==='es'?'Cliente reporta problema persiste/nuevo: "':'Customer reports issue persists/new: "')+trunc(custText,100)+'"',
                body:hi+',\n\n'+(lang==='es'?'Gracias por informarnos':'Thank you for letting me know')+(isPersist?l.persisting:l.additionalIssue)+'. '+(isPersist?l.understandFrustrating:l.importantRightAway)+kbFix+'\n\n'+
                (ctx.hadRemoteSession?l.anotherRemote:ctx.isTechnical&&!kbFix?l.shareNewErrors:(!kbFix?l.willReviewDetails:''))+'\n\n'+bye});
        }

        if(!R.length){
            const fallbackKB=kbAll.length?kbAll[0][lang]:'';
            R.push({g:gRec,nm:l.replyCustomer,
                why:(lang==='es'?'Último mensaje: "':'Last message: "')+trunc(custText,120)+'"',
                body:hi+',\n\n'+(saysYes?l.thankConfirming:'')+(hasQ?(lang==='es'?'Respecto a tu pregunta — ':'Regarding your question — ')+(fallbackKB||'['+( lang==='es'?'tu respuesta aquí':'your answer here')+']')+'\n\n':
                (fallbackKB?fallbackKB+'\n\n':(ctx.isError?l.investigating:'')+l.getBackShortly+'\n\n'))+
                (ctx.pendingAction?l.asDiscussed+ctx.pendingAction+'.\n\n':'')+bye});
        }

        if(!mentionsTV&&ctx.isTechnical&&!ctx.hadRemoteSession)
            R.push({g:gAlt,nm:l.suggestRemoteNm,
                why:lang==='es'?'Sin sesión remota aún para este tema técnico':'No remote session yet for this technical issue',
                body:hi+',\n\n'+l.suggestRemote+'\n\n'+l.availableSession+'\n\n'+bye});

        if(ctx.triedSolutions.size>0){
            const triedList=Array.from(ctx.triedSolutions).join(', ');
            R.forEach(r=>{r.why+=' | '+(lang==='es'?'Ya intentado: ':'Already tried: ')+triedList});
        }
    }

    if(a.sit==='waiting'||a.sit==='followup'){
        const agentSaid=lastAgent?lastAgent.t:'';
        const agentAsked=agentSaid.match(/\?/);
        const agentSentFile=agentSaid.toLowerCase().match(/attach|kbr|file|sent|please find|adjunto|envío|le comparto/i);
        const agentScheduled=agentSaid.toLowerCase().match(/schedul|teamviewer|remote|session|availab|sesión|remota|disponib/i);

        R.push({g:gRec,nm:a.stale>=14?l.finalFollowUp:l.followUpNm,
            why:a.stale+'d '+(lang==='es'?'desde que ':'since you ')+
                (agentAsked?(lang==='es'?'preguntaste: "':'asked: "')+trunc(agentSaid,80)+'"':
                agentSentFile?(lang==='es'?'enviaste archivos/KBR':'sent files/KBR'):
                agentScheduled?(lang==='es'?'propusiste sesión remota':'proposed a remote session'):
                (lang==='es'?'respondiste':'last replied'))+(lang==='es'?' — sin respuesta aún':' — no response yet'),
            body:hi+',\n\n'+l.followUp+
            (a.stale>=14?l.noResponseClose:
            agentAsked?l.chanceReview+trunc(agentSaid.split('?')[0],80)+'.\n\n'+l.letMeKnowContinue:
            agentSentFile?l.chanceInstall:
            agentScheduled?l.stillAvailRemote:
            l.furtherAssistance)+
            '\n\n'+bye});
    }

    if(ctx.hadRemoteSession)
        R.push({g:gAfter,nm:l.postSession,why:lang==='es'?'Se realizó/discutió sesión remota en este ticket':'Remote session discussed/held in this ticket',
            body:hi+',\n\n'+l.postSessionSummary+'\n\n'+l.actionsTaken+'\n- '+l.describeActions+'\n'+(ctx.isBRM?'- '+l.brmChanges+'\n':'')+'\n'+l.pendingItems+'\n- '+l.ifAny+'\n\n'+l.monitorSystem+'\n\n'+bye});

    if(ctx.isBRM)
        R.push({g:gDeliv,nm:l.deliverKBRNm,why:lang==='es'?'BRM/KBR discutido en la conversación':'BRM/KBR discussed in conversation',
            body:hi+',\n\n'+l.deliverKBR+'\n\n'+(ctx.mainIssue?l.addressesIssue+'\n\n':'')+l.toInstall+'\n\n'+l.needRemoteHelp+'\n\n'+bye});

    if(ctx.isQuote)
        R.push({g:gDeliv,nm:l.sendQuote,why:lang==='es'?'Cotización discutida en la conversación':'Quotation discussed in conversation',
            body:hi+',\n\n'+l.quoteFor+'\n\n'+l.quoteDetails+'\n\n'+l.validDays+'\n\n'+bye});

    R.push({g:gClose,nm:l.closeTicket,why:(lang==='es'?'Usar cuando ':'Use when ')+subj+(lang==='es'?' esté completamente resuelto':' is fully resolved'),
        body:hi+',\n\n'+l.gladConfirm+(ctx.hadRemoteSession?'\n\n'+l.thankRemoteTime:'')+'\n\n'+l.willClose+'\n\n'+bye});

    if(D.canned&&D.canned.length){
        const gCanned='Canned Responses';
        const remaining=D.canned.filter(cr=>!usedCannedIds.has(cr.id));
        const topics=findTopics(allTextLow);
        const relevantCanned=remaining.filter(cr=>{
            const title=cr.title.toLowerCase();
            if(topics.includes('BRM/KBR')&&title.includes('[brm]'))return true;
            if((topics.includes('Inspection')||topics.includes('Export')||topics.includes('Error'))&&title.includes('[mes]'))return true;
            if(ctx.isBRM&&title.includes('[brm]'))return true;
            if(ctx.isInspection&&title.includes('[mes]'))return true;
            return false;
        });
        relevantCanned.forEach(cr=>{
            const body=cannedBody(cr,firstName,t.id,hi,bye,lang);
            R.push({g:gCanned,nm:cr.title,why:lang==='es'?'Canned response de Freshdesk':'Freshdesk canned response',body:body});
        });
    }

    const threadWords=allTextLow.replace(/[^a-záéíóúüñ\s]/gi,'').split(/\s+/).filter(w=>w.length>3);
    R.forEach(r=>{
        const bLow=r.body.toLowerCase();
        let score=0;
        for(const w of threadWords){if(bLow.includes(w))score++}
        if(r.g===gRec)score+=20;
        else if(r.g===gAlt)score+=5;
        r._score=score;
    });
    R.sort((a,b)=>b._score-a._score);
    if(R.length>5)R.length=5;
    window._R=R;
    window._replyCtx={t,m,lang,hi,bye,firstName,subj,ctx,issueText,suggestions:R,cannedAll:D.canned||[]};
    const G={};R.forEach((r,i)=>{if(!G[r.g])G[r.g]=[];G[r.g].push({...r,i})});
    let h='<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'
        +'<div class="lang-badge" style="margin-bottom:0">'+(lang==='es'?'Español detectado':'English detected')+'</div>'
        +'<button onclick="toggleLang()" style="background:none;border:1px solid var(--g200);border-radius:980px;padding:3px 10px;font:600 10px/1 var(--f);color:var(--g500);cursor:pointer;display:flex;align-items:center;gap:4px" title="'+(lang==='es'?'Switch to English':'Cambiar a Español')+'">'
        +'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M12.5 18l3.5-7 3.5 7M15.91 16h4.18"/></svg>'
        +(lang==='es'?'EN':'ES')
        +'</button></div>';
    if(ctx.triedSolutions.size>0){
        h+='<div class="ctx-box"><b>'+(lang==='es'?'Soluciones ya intentadas':'Already tried')+':</b> '+Array.from(ctx.triedSolutions).join(', ')+'</div>';
    }

    const lastMsg=m.length?m[m.length-1]:null;
    if(lastMsg){
        const isC=lastMsg.f==='Customer';
        const lbl=isC?firstName:(lastMsg.f==='Note'?(lang==='es'?'Nota interna':'Internal note'):'Agent');
        const clr=isC?'var(--orange)':'var(--blue)';
        const bg=isC?'var(--orange-bg)':'var(--blue-bg)';
        const cleanTxt=cleanEmailBody(lastMsg.t);
        const preview=cleanTxt.length>500?cleanTxt.substring(0,500)+'…':cleanTxt;
        h+='<div style="margin-bottom:14px;padding:12px;border-radius:10px;background:'+bg+';border-left:3px solid '+clr+'">'
            +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
            +'<span style="font:600 11px/1 var(--f);color:'+clr+';text-transform:uppercase">'+(lang==='es'?'Último mensaje — ':'Last message — ')+esc(lbl)+'</span>'
            +'<span style="font:11px var(--f);color:var(--g400)">'+timeAgo(lastMsg.d)+'</span></div>'
            +'<div style="font:13px/1.5 var(--f);color:var(--g700);white-space:pre-wrap">'+esc(preview)+'</div></div>';
    }

    h+='<button class="ai-btn" onclick="generateAI(\'ollama\')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>'
        +(lang==='es'?'Generar respuesta con IA':'Generate reply with AI')+'</button>'
        +'<div id="ai-out"></div>';

    for(const[g,items]of Object.entries(G)){
        h+='<div class="rg"><h3>'+esc(g)+'</h3>';
        items.forEach(r=>{
            h+='<div class="rc"><div class="rc-title">'+esc(r.nm)+'</div><div class="rc-why">'+esc(r.why)+'</div>'+
                '<div class="rc-body shut" onclick="this.classList.toggle(\'shut\');this.classList.toggle(\'open\')">'+esc(r.body)+'</div>'+
                '<button class="rc-copy" onclick="cp('+r.i+',this)">Copy to clipboard</button></div>';
        });h+='</div>';
    }
    return h;
}

function toggleLang(){
    const rc=window._replyCtx;if(!rc)return;
    const newLang=rc.lang==='es'?'en':'es';
    window._langOverride=newLang;
    showPane(2);
}

function extractContext(allLow,m,lastCust,lastAgent){
    const isError=!!allLow.match(/error|crash|exception|fail|broken|not.work|issue|problem|falla|no funciona|no sirve|se cayó|problema/i);
    const isTechnical=!!allLow.match(/error|crash|config|install|brm|kbr|socket|database|inspect|calibrat|export|barcode|defect|spi|aoi|instalación|configuración|calibración|máquina/i);
    const isBRM=!!allLow.match(/brm|kbr|business.rule|script|customer.?property/i);
    const isInspection=!!allLow.match(/inspect|defect|barcode|pcb|spi|aoi|result|inspección|defecto|resultado/i);
    const isQuote=!!allLow.match(/quote|quotat|price|cost|purchase|po\b|cotizac|precio|costo|compra/i);
    const isScheduling=!!allLow.match(/schedul|meeting|call|appointment|availab|agendar|reunión|cita|disponibilidad|horario|junta/i);
    const hadRemoteSession=!!allLow.match(/teamviewer|remote.session|anydesk|tv.id|connected.remote|during.*(session|remote)|sesión remota|nos conectamos|conecté remotamente/i);
    const hasScreenshot=!!allLow.match(/screenshot|screen.?shot|image|picture|attached.*png|attached.*jpg|captura|imagen|adjunt.*png|adjunt.*jpg/i);
    const hasLogs=!!allLow.match(/log.file|logs|attached.*log|error.log|archivo.*log|logs adjunt/i);
    const hasVersion=!!allLow.match(/version|v\d+\.\d+|brm.\d|versión/i);
    const hasSteps=!!allLow.match(/step|reproduce|when.i|happens.when|to.reproduce|paso|reproducir|cuando.hago|ocurre.cuando/i);

    let mainIssue='';
    const issuePatterns=[
        [/error.{0,30}([\w\s]{5,40})/i,'error'],
        [/issue.{0,10}with.{0,5}([\w\s]{5,40})/i,'issue with'],
        [/problem.{0,10}with.{0,5}([\w\s]{5,40})/i,'problem with'],
        [/([\w\s]{3,20})\s*(not working|is broken|crashed|fails)/i,'failure'],
        [/([\w\s]{3,20})\s*error/i,'error'],
        [/problema.{0,10}con.{0,5}([\w\sáéíóúñ]{5,40})/i,'problema con'],
        [/falla.{0,10}en.{0,5}([\w\sáéíóúñ]{5,40})/i,'falla en'],
        [/([\w\sáéíóúñ]{3,20})\s*(no funciona|no sirve|se cayó|falla)/i,'falla']
    ];
    for(const[rx]of issuePatterns){
        const match=allLow.match(rx);
        if(match){mainIssue=match[1].trim().replace(/\s+/g,' ').substring(0,40);break}
    }
    if(!mainIssue&&isBRM)mainIssue='BRM configuration';
    if(!mainIssue&&isInspection)mainIssue='inspection results';

    let wasScheduling=false;
    if(lastAgent){
        const at=lastAgent.t.toLowerCase();
        wasScheduling=!!at.match(/schedul|teamviewer|remote|availab|session|agendar|sesión|remota|disponib/i);
    }

    let pendingAction='';
    if(lastAgent){
        const at=lastAgent.t.toLowerCase();
        if(at.match(/i will|we will|going to|plan to|voy a|vamos a|estaré|revisaré|le enviaré|procederé/)){
            const pm=lastAgent.t.match(/[Ii] will ([^.!?\n]{10,60})/)||lastAgent.t.match(/[Ww]e will ([^.!?\n]{10,60})/)||
                lastAgent.t.match(/[Vv]oy a ([^.!?\n]{10,60})/)||lastAgent.t.match(/[Rr]evisaré ([^.!?\n]{10,60})/)||
                lastAgent.t.match(/[Ll]e enviaré ([^.!?\n]{10,60})/);
            if(pm)pendingAction=pm[1].trim();
        }
    }

    const isUrgent=!!allLow.match(/urgent|asap|critical|line.*(down|stop)|producti.*(stop|down|halt)|urgente|crítico|línea.*(parada|detenida|caída)|producción.*(parada|detenida)/i);

    const triedSolutions=findTriedSolutions(m);

    let agentAskedFor='';
    if(lastAgent){
        const at=lastAgent.t.toLowerCase();
        if(at.match(/log|registr/i))agentAskedFor='logs';
        else if(at.match(/screenshot|captura|imagen/i))agentAskedFor='screenshots';
        else if(at.match(/teamviewer|remote|remota|credencial/i))agentAskedFor='remote';
        else if(at.match(/version|versión/i))agentAskedFor='version';
        else if(at.match(/instalar|install|load.*kbr|cargar.*kbr/i))agentAskedFor='install';
    }

    let customerProvided='';
    if(lastCust){
        const ct=lastCust.t.toLowerCase();
        if(ct.match(/attach|adjunto|here.*(is|are)|aquí.*está|te.*(comparto|envío|mando)/i)){
            if(ct.match(/log|registr/i))customerProvided='logs';
            else if(ct.match(/screenshot|captura|imagen/i))customerProvided='screenshots';
            else customerProvided='files';
        }
        if(ct.match(/teamviewer|tv.*id|anydesk|\d{3,}.*\d{3,}/i))customerProvided='remote_credentials';
        if(ct.match(/(done|install|complet|listo|instalado|ya.*cargué|loaded)/i))customerProvided='installed';
    }

    return{isError,isTechnical,isBRM,isInspection,isQuote,isScheduling,hadRemoteSession,
        hasScreenshot,hasLogs,hasVersion,hasSteps,mainIssue,wasScheduling,pendingAction,
        isUrgent,triedSolutions,agentAskedFor,customerProvided};
}

function cleanAIReply(text){
    let t=text;
    const rc=window._replyCtx;
    const hi=rc?rc.hi:'Hi';
    const bye=rc?rc.bye:'Best regards,';
    const hiIdx=t.indexOf(hi+',');
    if(hiIdx>0)t=t.substring(hiIdx);
    const byeIdx=t.lastIndexOf(bye);
    if(byeIdx>0)t=t.substring(0,byeIdx+bye.length);
    t=t.replace(/\*\*/g,'').replace(/^#{1,3}\s+.*$/gm,'');
    t=t.replace(/\[Your Name.*?\]/gi,'').replace(/\[Team Name.*?\]/gi,'');
    t=t.trim();
    return t;
}

async function tryOllama(sys,usr){
    const ollamaHost=location.hostname==='localhost'||location.hostname==='127.0.0.1'?'localhost':location.hostname;
    const resp=await fetch('http://'+ollamaHost+':11434/api/chat',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'qwen2.5:7b',messages:[{role:'system',content:sys},{role:'user',content:usr}],stream:false,options:{temperature:0.4,num_predict:500,top_p:0.9,repeat_penalty:1.1}})
    });
    if(!resp.ok)throw new Error('Ollama '+resp.status);
    const data=await resp.json();
    let reply=data.message?data.message.content:'';
    reply=cleanAIReply(reply);
    return{reply,provider:'Ollama (Qwen 2.5 7B)'};
}

async function tryClaude(sys,usr,apiKey){
    const resp=await fetch('/claude',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({apiKey:apiKey,messages:[{role:'user',content:usr}],system:sys})
    });
    if(!resp.ok){
        if(resp.status===401){localStorage.removeItem('fd_claude_key');throw new Error('Invalid API key')}
        const err=await resp.json().catch(()=>({}));
        throw new Error(err.error&&err.error.message||'API error '+resp.status);
    }
    const data=await resp.json();
    let reply=data.content&&data.content[0]?data.content[0].text:'';
    reply=cleanAIReply(reply);
    return{reply,provider:'Claude Haiku'};
}

function msgs(t,c){

    c.forEach(x=>{r.push({f:x.private?'Note':(x.incoming?'Customer':'Agent'),t:x.body_text||strip(x.body||''),d:x.created_at})});
    return r;

function ana(t,m){
    const age=Math.floor((Date.now()-new Date(t.created_at))/864e5);
    const stale=Math.floor((Date.now()-new Date(t.updated_at))/864e5);
    const pub=m.filter(x=>x.f!=='Note'),last=pub[pub.length-1];
    const nc=m.filter(x=>x.f==='Customer').length,na=m.filter(x=>x.f==='Agent').length;
    const txt=m.map(x=>x.t.toLowerCase()).join(' ');

    let sit,lbl,ico;
    if(nc>0&&na===0){sit='new';lbl='New ticket — needs your first response';ico='⚡'}
    else if(last&&last.f==='Customer'){sit='respond';lbl='Customer replied — your turn to respond';ico='✉️'}
    else{sit='waiting';lbl='Waiting for customer response';ico='⏳'}
    if(stale>=7&&sit==='waiting'){sit='followup';lbl='No response in '+stale+' days — time to follow up';ico='🔔'}

    return{sit,lbl,ico,age,stale,nc,na,tot:m.length,topics:findTopics(txt),steps:nextSteps(sit,findTopics(txt),stale)};
}

function findTopics(t){
    const M={'Remote Session':/teamviewer|remote.*(session|support|access)|anydesk/i,'Installation':/install|setup|deploy|upgrade|migration/i,'Error':/error|crash|exception|fail|broken|not.work/i,'Config':/config|setting|parameter|property/i,'BRM/KBR':/brm|kbr|business.rule|script/i,'License':/license|activation|serial/i,'Database':/database|db|sql|connection.string/i,'Network':/socket|network|tcp|port|firewall/i,'Export':/export|xslt|csv|xml|output/i,'Inspection':/inspect|defect|result|barcode|pcb|spi|aoi/i,'Quote':/quote|quotat|price|cost|purchase|po\b/i,'Calibration':/calibrat|alignment|offset/i,'Update':/update|patch|version|release|firmware/i};
    return Object.entries(M).filter(([,r])=>r.test(t)).map(([k])=>k);
}

function nextSteps(sit,top,stale){
    const s=[];
    if(sit==='new'){s.push('Send first response acknowledging the issue');if(top.includes('Error'))s.push('Ask for screenshots, logs, and software version');if(top.includes('Remote Session'))s.push('Schedule TeamViewer session');if(top.includes('Quote'))s.push('Prepare quotation')}
    else if(sit==='respond'){s.push("Read customer's latest reply and respond");if(top.some(x=>['Remote Session','Error','Inspection'].includes(x)))s.push('Consider scheduling a remote session')}
    else if(sit==='waiting'){s.push('No action needed yet');if(stale>=3)s.push('Send a follow-up in a few days')}
    else if(sit==='followup'){s.push('Send follow-up message ('+stale+'d without response)');if(stale>=14)s.push('Consider closing if no reply after follow-up')}
    return s;
}

/* =============== SEARCH / FILTERS / PAGER =============== */
async function doSearch(){
    const q=document.getElementById('inp-search').value.trim();
    if(!q){load();return}if(!D.key)return st('Connect first');
    document.getElementById('list').innerHTML='<div class="loading-msg">Searching</div>';
    try{
        let qr='"'+q;if(D.aid)qr+=' AND agent_id:'+D.aid;qr+='"';
        const d=await get('search/tickets?query='+encodeURIComponent(qr));
        D.tks=d.results||[];D.pg=1;D.pgs=Math.ceil((d.total||D.tks.length)/30)||1;
        rl();up();document.getElementById('cnt').textContent=(d.total||D.tks.length);
        document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('on'));
    }catch(e){document.getElementById('list').innerHTML='<div class="empty-msg">'+esc(e.message)+'</div>'}
}
function filt(b,f){document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('on'));b.classList.add('on');D.fl=f;D.pg=1;document.getElementById('inp-search').value='';if(f==='new'){if(D.newTks.length>0){applyFilter()}else{load()}}else if(D.allOpen.length>0){applyFilter()}else{load()}}
function refresh(){D.allOpen=[];D.lr={};D.newTks=[];localStorage.removeItem('fd_cache2');loadNewTickets();load()}
function pg(d){D.pg+=d;if(D.pg<1)D.pg=1;load()}
function up(){document.getElementById('pgr').style.display='flex';document.getElementById('pb').disabled=D.pg<=1;document.getElementById('pn').disabled=D.pg>=D.pgs;document.getElementById('pi').textContent='Page '+D.pg}

/* =============== UTILS =============== */
function st(m,ok){const e=document.getElementById('conn-status');e.textContent=m;e.className='conn-status'+(ok?' on':'')}
function timeAgo(d){if(!d)return'';const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago'}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function strip(h){const d=document.createElement('div');d.innerHTML=h;return d.textContent||''}
function trunc(s,n){return s&&s.length>n?s.substring(0,n)+'…':s||''}
function ago(d){const s=Math.floor((Date.now()-d)/1000);if(s<60)return'now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d'}
function safe(h){const d=document.createElement('div');d.innerHTML=h;d.querySelectorAll('script,style,iframe,object,embed,form,input').forEach(e=>e.remove());d.querySelectorAll('*').forEach(e=>{for(const a of[...e.attributes])if(a.name.startsWith('on'))e.removeAttribute(a.name)});return d.innerHTML}

/* =============== HEARTBEAT / SHUTDOWN =============== */
setInterval(()=>{fetch('/heartbeat').catch(()=>{})},15000);
