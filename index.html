<script>

var _praw=JSON.parse(localStorage.getItem('fd_pending')||'[]');
var _pend=new Set(Array.isArray(_praw)?_praw:Object.keys(_praw).map(Number));

let D={key:'',dom:'',tks:[],cur:null,cvs:[],fl:2,pg:1,pgs:1,aid:null,anm:'',sig:'',allOpen:[],lr:{},newTks:[],pending:_pend};

document.getElementById('inp-search').onkeydown=e=>{if(e.key==='Enter')doSearch()};
document.getElementById('inp-key').onkeydown=e=>{if(e.key==='Enter')connect()};
function toggleKey(){const i=document.getElementById('inp-key');i.type=i.type==='password'?'text':'password'}

(function(){const k=localStorage.getItem('fd_apikey');if(k){document.getElementById('inp-key').value=k;setTimeout(connect,300)}})();

var _q=[],_qPri=[],_qRun=0,_qPriRun=0,_qMax=6,_qNormMax=4;
function _qFlush(){
    while(_qPri.length&&_qRun<_qMax){_qRun++;_qPriRun++;var pj=_qPri.shift();pj()}
    while(_q.length&&_qRun<_qMax&&(_qRun-_qPriRun)<_qNormMax){_qRun++;var nj=_q.shift();nj()}
}
function api(p,opts){
    opts=opts||{};
    var isPri=!!opts.priority;
    return new Promise(function(resolve,reject){
        var fn=function(){
            var retries=0;
            function attempt(){
                var init={headers:{'X-FD-Key':D.key,'X-FD-Domain':D.dom}};
                if(opts.method){init.method=opts.method;init.headers['Content-Type']='application/json'}
                if(opts.body)init.body=opts.body;
                fetch('/fd/'+p,init).then(function(r){
                    if(r.status===429&&retries<3){
                        retries++;
                        var ra=r.headers.get('Retry-After');
                        var wait=ra?parseInt(ra)*1000:Math.pow(2,retries)*1000;
                        setTimeout(attempt,wait);return;
                    }
                    _qRun--;if(isPri)_qPriRun--;_qFlush();
                    if(!r.ok){reject(new Error('API '+r.status));return}
                    resolve(r);
                }).catch(function(e){_qRun--;if(isPri)_qPriRun--;_qFlush();reject(e)});
            }
            attempt();
        };
        if(isPri){_qPri.push(fn)}else{_q.push(fn)}
        _qFlush();
    });
}
async function get(p,opts){return(await api(p,opts)).json()}

async function connect(){
    D.key=document.getElementById('inp-key').value.trim();
    D.dom=document.getElementById('inp-domain').value.trim();
    if(!D.key||!D.dom)return st('Enter key & domain');
    st('Connecting...');
    try{
        const me=await get('agents/me');D.aid=me.id;D.anm=me.contact?me.contact.name:'Agent';D.sig=me.signature||'';
        localStorage.setItem('fd_apikey',D.key);st(D.anm,1);
        D._cacheNew=JSON.parse(localStorage.getItem('fd_cache_new')||'{}');
        if(Object.keys(D._cacheNew).length)D._earlyNewIds=new Set(Object.keys(D._cacheNew).map(Number));
        await Promise.all([loadNewTickets(),load()]);
        loadStats();
        AIPipeline.loadIndex();
        if(!D._newPoll)D._newPoll=setInterval(()=>{refresh()},300000);
    }catch(e){
        if(e.message.includes('404')){try{await get('tickets?per_page=1');localStorage.setItem('fd_apikey',D.key);st('Connected',1);load()}catch(e2){st('Failed')}}
        else st('Failed: '+e.message);
    }
}

var _statsRun=0,_statsCache={ts:0,allT:null,myT:null,resp6:null},_statsMerged=new Set(),_statsNoResp=new Set();
async function loadStats(){
    var run=++_statsRun;
    try{
        var yr=new Date().getFullYear(),now=new Date();
        var tags=["branchkya","KYA Internal"];
        var mes="cf_rand412401:'MES'";
        var el=document.getElementById('ticket-stats');
        var CK='fd_resp6';
        var cache=JSON.parse(localStorage.getItem(CK)||'{}');
        var merged=new Set();
        var noResp=new Set();
        Object.keys(cache).forEach(function(k){
            if(cache[k]==='merged')merged.add(Number(k));
            else if(!cache[k])noResp.add(Number(k));
        });
        _statsMerged=merged;_statsNoResp=noResp;

        function render(allT,myT){
            if(_statsRun!==run)return;
            var total=0,totalClosed=0,closed=0;
            allT.forEach(function(t){if(!merged.has(t.id)){total++;if(t.status===4||t.status===5){totalClosed++;if(t.responder_id===D.aid)closed++}}});
            var mine=0;
            myT.forEach(function(t){if(!noResp.has(t.id)&&!merged.has(t.id))mine++});
            var closedPct=totalClosed>0?Math.round(closed/totalClosed*100):0;
            var pct=total>0?Math.round(mine/total*100):0;
            var clr=pct>=30?'green':pct>=20?'amber':'red';
            var clrC=closedPct>=30?'green':closedPct>=20?'amber':'red';
            el.innerHTML='<span class="stat-group"><span class="stat-label">Assigned</span>'+mine+' / '+total+' <span class="pct '+clr+'">'+pct+'%</span></span><span class="stat-group"><span class="stat-label">Resolved</span>'+closed+' / '+totalClosed+' <span class="pct '+clrC+'">'+closedPct+'%</span></span>';
            el.title=D.anm+' '+yr+': Assigned '+mine+' de '+total+' ('+pct+'%) · Resolved '+closed+' de '+totalClosed+' ('+closedPct+'%)';
            el.style.display='';
        }

        var allT,myT;
        if(_statsCache.allT&&Date.now()-_statsCache.ts<900000){
            allT=_statsCache.allT;myT=_statsCache.myT;
        }else{
            async function pages(q){
                var out=[],pg=1;
                while(pg<=10){
                    try{
                        var d=await get('search/tickets?query='+encodeURIComponent(q)+'&page='+pg);
                        var r=d.results||[];out=out.concat(r);if(r.length<30)break;pg++;
                    }catch(e){break}
                }
                return out;
            }
            var qtr=[['-01-01','-04-01'],['-04-01','-07-01'],['-07-01','-10-01'],['-10-01','-01-01']];
            var queries=[];
            for(var i=0;i<4;i++){
                var ds=yr+qtr[i][0];
                if(new Date(ds)>now)break;
                var prev=new Date(ds);prev.setDate(prev.getDate()-1);
                var ps=prev.getFullYear()+'-'+String(prev.getMonth()+1).padStart(2,'0')+'-'+String(prev.getDate()).padStart(2,'0');
                var de=i<3?(yr+qtr[i][1]):((yr+1)+'-01-01');
                var df="created_at:>'"+ps+"' AND created_at:<'"+de+"'";
                for(var ti=0;ti<tags.length;ti++){
                    queries.push('"'+"tag:'"+tags[ti]+"' AND "+mes+' AND '+df+'"');
                }
            }
            if(_statsRun!==run)return;
            var results=await Promise.all(queries.map(function(q){return pages(q)}));

            var seen=new Set();allT=[];myT=[];
            var yrs=String(yr);
            for(var i=0;i<results.length;i++)results[i].forEach(function(t){
                if(!seen.has(t.id)&&t.created_at&&t.created_at.slice(0,4)===yrs){
                    seen.add(t.id);allT.push(t);
                    if(t.responder_id===D.aid)myT.push(t);
                }
            });
            _statsCache={ts:Date.now(),allT:allT,myT:myT,resp6:cache};
        }

        render(allT,myT);

        var myIds=new Set(myT.map(function(t){return t.id}));
        var unchecked=allT.filter(function(t){return !(t.id in cache)||cache[t.id]===false});
        if(unchecked.length>0){
            for(var b=0;b<unchecked.length;b+=5){
                if(_statsRun!==run)return;
                var batch=unchecked.slice(b,b+5);
                await Promise.all(batch.map(function(t){
                    return get('tickets/'+t.id+'/conversations?per_page=100').then(function(convs){
                        var cl=convs||[];
                        var last=cl.length?cl[cl.length-1]:null;
                        var isMerged=last&&last.private&&last.body_text&&last.body_text.indexOf('merged into ticket')!==-1;
                        if(isMerged){cache[t.id]='merged';merged.add(t.id);}
                        else{
                            var has=cl.some(function(c){return c.incoming===false&&!c.private});
                            cache[t.id]=has;
                            if(!has)noResp.add(t.id);
                        }
                    }).catch(function(){});
                }));
                render(allT,myT);
                if(b%25===0){try{localStorage.setItem(CK,JSON.stringify(cache))}catch(e){}}
                await new Promise(function(r){setTimeout(r,1500)});
            }
            try{localStorage.setItem(CK,JSON.stringify(cache))}catch(e){}
        }
    }catch(e){console.warn('loadStats',e)}
}

function animateNumbers(){
    document.querySelectorAll('[data-count]').forEach(function(el){
        var target=parseInt(el.getAttribute('data-count'),10);
        if(isNaN(target)||target===0){el.textContent='0';return}
        var duration=600,startTime=null;
        function step(ts){
            if(!startTime)startTime=ts;
            var p=Math.min((ts-startTime)/duration,1);
            var ease=1-Math.pow(1-p,3);
            el.textContent=Math.round(ease*target);
            if(p<1)requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
    });
}

function animateBars(){
    requestAnimationFrame(function(){
        document.querySelectorAll('[data-width]').forEach(function(el){
            el.style.width=el.getAttribute('data-width');
        });
    });
}

function renderDashboard(){
    var allT=_statsCache.allT;
    if(!allT||!allT.length){document.getElementById('content').innerHTML='<div class="dash" style="text-align:center;padding-top:120px"><div class="dash-title">Loading Dashboard</div><p style="color:var(--g500);margin:16px 0 24px">Fetching ticket data...</p><div style="width:200px;height:4px;background:var(--g100);border-radius:2px;margin:0 auto;overflow:hidden"><div style="width:40%;height:100%;background:var(--blue);border-radius:2px;animation:barPulse 1.5s ease infinite"></div></div><style>@keyframes barPulse{0%{width:20%;margin-left:0}50%{width:50%;margin-left:25%}100%{width:20%;margin-left:80%}}</style></div>';document.getElementById('hdr').innerHTML='<div class="hdr-box"><h1>Dashboard</h1></div>';document.getElementById('tab-bar').innerHTML='';if(!D._dashWait){D._dashWait=setInterval(function(){if(_statsCache.allT&&_statsCache.allT.length){clearInterval(D._dashWait);D._dashWait=null;renderDashboard()}},500)}return}
    var merged=_statsMerged,noResp=_statsNoResp;
    var yr=new Date().getFullYear();
    var aMap=D._agentMap||{};
    var SRC={1:'Email',2:'Portal',3:'Phone',5:'Feedback Widget',7:'Chat',8:'Mobihelp',9:'Feedback Widget',10:'Outbound Email'};

    var totalRaw=allT.length;
    var mergedCount=0,noRespCount=0,tagBranch=0,tagInternal=0,tagBoth=0;
    var statusCounts={},agentData={},quarterCounts={},monthlyCounts={};
    var priorityCounts={},sourceCounts={},typeCounts={},companyCounts={},tagDetail={};
    var totalResolved=0,totalOpen=0;
    var mergedByAgent={},noRespByAgent={};

    allT.forEach(function(t){
        var isMerged=merged.has(t.id);
        var isNoResp=noResp.has(t.id)&&!isMerged;
        if(isMerged){mergedCount++;var mrid=t.responder_id||0;mergedByAgent[mrid]=(mergedByAgent[mrid]||0)+1;return}
        if(isNoResp){noRespCount++;var nrid=t.responder_id||0;noRespByAgent[nrid]=(noRespByAgent[nrid]||0)+1}

        var tags=(t.tags||[]).map(function(x){return x.toLowerCase()});
        var hasBranch=tags.indexOf('branchkya')!==-1;
        var hasInternal=tags.indexOf('kya internal')!==-1;
        if(hasBranch)tagBranch++;
        if(hasInternal)tagInternal++;
        if(hasBranch&&hasInternal)tagBoth++;
        tags.forEach(function(tg){
            if(tg==='branchkya'||tg==='kya internal')return;
            tagDetail[tg]=(tagDetail[tg]||0)+1;
        });

        var sn=SN[t.status]||('Status '+t.status);
        statusCounts[sn]=(statusCounts[sn]||0)+1;
        if(t.status===2||t.status===8)totalOpen++;

        var pn=PN[t.priority]||('P'+t.priority);
        priorityCounts[pn]=(priorityCounts[pn]||0)+1;

        var src=SRC[t.source]||('Source '+t.source);
        sourceCounts[src]=(sourceCounts[src]||0)+1;

        var tp=t.type||'(none)';
        typeCounts[tp]=(typeCounts[tp]||0)+1;

        var co=(t.custom_fields&&t.custom_fields.cf_rand61013)?t.custom_fields.cf_rand61013:'(unknown)';
        companyCounts[co]=(companyCounts[co]||0)+1;

        var rid=t.responder_id||0;
        if(!agentData[rid])agentData[rid]={name:aMap[rid]||(rid===0?'Unassigned':'Agent #'+rid),assigned:0,responded:0,resolved:0,closed:0,open:0,pending:0};
        agentData[rid].assigned++;
        if(!isNoResp)agentData[rid].responded++;
        if(t.status===4||t.status===5){agentData[rid].resolved++;totalResolved++;if(t.status===5)agentData[rid].closed++}
        if(t.status===2||t.status===8)agentData[rid].open++;
        if(t.status===3)agentData[rid].pending++;

        if(t.created_at){
            var m=parseInt(t.created_at.slice(5,7));
            var qk=m<=3?'Q1':m<=6?'Q2':m<=9?'Q3':'Q4';
            quarterCounts[qk]=(quarterCounts[qk]||0)+1;
            var mk=t.created_at.slice(0,7);
            monthlyCounts[mk]=(monthlyCounts[mk]||0)+1;
        }
    });

    var real=totalRaw-mergedCount;
    var agents=Object.keys(agentData).map(function(k){var o=agentData[k];o._rid=Number(k);return o}).sort(function(a,b){return b.assigned-a.assigned});
    var cache=_statsCache.resp6||JSON.parse(localStorage.getItem('fd_resp6')||'{}');
    var cacheKeys=Object.keys(cache);

    _ddFilters={};_ddNext=0;
    var kAll=_ddReg(function(){return true});
    var kReal=_ddReg(function(t){return !merged.has(t.id)});
    var kMerged=_ddReg(function(t){return merged.has(t.id)});
    var kNoResp=_ddReg(function(t){return noResp.has(t.id)&&!merged.has(t.id)});
    var kOpen=_ddReg(function(t){return !merged.has(t.id)&&(t.status===2||t.status===8)});
    var kResolved=_ddReg(function(t){return !merged.has(t.id)&&(t.status===4||t.status===5)});
    var kTagB=_ddReg(function(t){return (t.tags||[]).some(function(x){return x.toLowerCase()==='branchkya'})});
    var kTagI=_ddReg(function(t){return (t.tags||[]).some(function(x){return x.toLowerCase()==='kya internal'})});
    var kBoth=_ddReg(function(t){var tg=(t.tags||[]).map(function(x){return x.toLowerCase()});return tg.indexOf('branchkya')!==-1&&tg.indexOf('kya internal')!==-1});
    var kPending=_ddReg(function(t){return !merged.has(t.id)&&t.status===3});
    function dd(k,l){return "dashDrill('"+k+"','"+l.replace(/'/g,"\\'")+"')"}

    var totPend=agents.reduce(function(s,a){return s+a.pending},0);
    var SNR={};Object.keys(SN).forEach(function(k){SNR[SN[k]]=Number(k)});
    var PNR={};Object.keys(PN).forEach(function(k){PNR[PN[k]]=Number(k)});
    var SRCR={};Object.keys(SRC).forEach(function(k){SRCR[SRC[k]]=Number(k)});
    var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    var h='<div class="dash">';
    h+='<div class="dash-title">MES Dashboard <span>'+yr+'</span></div>';

    h+='<div class="dash-heroes">';
    h+='<div class="dash-hero" onclick="'+dd(kAll,'All Tickets from API')+'">';
    h+='<div class="dh-num" data-count="'+totalRaw+'">0</div>';
    h+='<div class="dh-label">Total Tickets from API</div>';
    h+='<div class="dh-sub">';
    h+='<span class="dh-pill green" onclick="event.stopPropagation();'+dd(kReal,'Real Tickets (non-merged)')+'"><span data-count="'+real+'">0</span> real</span>';
    h+='<span class="dh-pill red" onclick="event.stopPropagation();'+dd(kMerged,'Merged Tickets')+'"><span data-count="'+mergedCount+'">0</span> merged</span>';
    h+='<span class="dh-pill orange" onclick="event.stopPropagation();'+dd(kNoResp,'No Agent Response')+'"><span data-count="'+noRespCount+'">0</span> no response</span>';
    h+='</div></div>';

    h+='<div class="dash-hero" onclick="'+dd(kResolved,'Resolved / Closed')+'">';
    h+='<div class="dh-num" data-count="'+totalResolved+'">0</div>';
    h+='<div class="dh-label">Resolved + Closed</div>';
    h+='<div class="dh-sub">';
    h+='<span class="dh-pill purple" onclick="event.stopPropagation();'+dd(kOpen,'Open Tickets')+'"><span data-count="'+totalOpen+'">0</span> open</span>';
    h+='<span class="dh-pill teal" onclick="event.stopPropagation();'+dd(kPending,'Pending Tickets')+'"><span data-count="'+totPend+'">0</span> pending</span>';
    h+='</div></div>';
    h+='</div>';

    h+='<div class="dash-pills">';
    h+='<span class="dp" onclick="'+dd(kTagB,'Tag: branchkya')+'"><strong>'+tagBranch+'</strong> branchkya</span>';
    h+='<span class="dp" onclick="'+dd(kTagI,'Tag: KYA Internal')+'"><strong>'+tagInternal+'</strong> KYA Internal</span>';
    h+='<span class="dp" onclick="'+dd(kBoth,'Both Tags')+'"><strong>'+tagBoth+'</strong> Both Tags</span>';
    h+='<span class="dp"><strong>'+cacheKeys.length+'/'+totalRaw+'</strong> cached</span>';
    h+='</div>';

    h+='<div class="dash-section">Agents</div>';
    h+='<div class="dash-agents">';
    agents.forEach(function(a,ai){
        var rid=a._rid;
        var aPct=real>0?Math.round(a.assigned/real*100):0;
        var nrCount=noRespByAgent[rid]||0;
        var mrCount=mergedByAgent[rid]||0;
        var kAsg=_ddReg(function(t){return !merged.has(t.id)&&(t.responder_id||0)===rid});
        var kRsp=_ddReg(function(t){return !merged.has(t.id)&&!noResp.has(t.id)&&(t.responder_id||0)===rid});
        var kNr=_ddReg(function(t){return !merged.has(t.id)&&noResp.has(t.id)&&(t.responder_id||0)===rid});
        var kMr=_ddReg(function(t){return merged.has(t.id)&&(t.responder_id||0)===rid});
        var kOp=_ddReg(function(t){return !merged.has(t.id)&&(t.status===2||t.status===8)&&(t.responder_id||0)===rid});
        var kPe=_ddReg(function(t){return !merged.has(t.id)&&t.status===3&&(t.responder_id||0)===rid});
        var kRe=_ddReg(function(t){return !merged.has(t.id)&&(t.status===4||t.status===5)&&(t.responder_id||0)===rid});
        var kCl=_ddReg(function(t){return !merged.has(t.id)&&t.status===5&&(t.responder_id||0)===rid});
        var nm=a.name;
        h+='<div class="dash-agent" style="animation-delay:'+(ai*60)+'ms">';
        h+='<div class="da-name" onclick="'+dd(kAsg,nm+' — Assigned')+'">'+esc(nm)+'</div>';
        h+='<div class="da-stats">';
        h+='<span class="da-chip assigned" onclick="'+dd(kAsg,nm+' — Assigned')+'">'+a.assigned+' assigned</span>';

function barChart(data,color){
    var max=Math.max.apply(null,data.map(function(d){return d.v}))||1;
    var h='<div class="dash-chart">';
    data.forEach(function(d){
        var w=Math.round(d.v/max*100);
        var oc=d.oc?' onclick="'+d.oc+'"':'';
        h+='<div class="dash-chart-row"'+oc+'><span class="dash-chart-label" title="'+esc(d.l)+'">'+esc(d.l)+'</span><div class="dash-chart-bar-bg"><div class="dash-chart-bar-fill" data-width="'+w+'%" style="width:0;background:'+(d.c||color||'var(--blue)')+'"></div></div><span class="dash-chart-val">'+d.v+'</span></div>';
    });
    h+='</div>';
    return h;
}

async function fetchByStatus(st){
    try{
        let q='"agent_id:'+D.aid+' AND status:'+st+'"';
        let all=[],pg=1;
        while(true){
            const d=await get('search/tickets?query='+encodeURIComponent(q)+'&page='+pg);
            const res=d.results||[];
            all=all.concat(res);
            if(res.length<30||pg>=10)break;
            pg++;
        }
        return all;
    }catch(e){return[]}
}

async function checkLastReply(tid){
    var batch=await get('tickets/'+tid+'/conversations?per_page=100');
    if(!batch||!batch.length)return true;
    if(batch.length>=100){
        var page=2;
        while(true){
            var more=await get('tickets/'+tid+'/conversations?per_page=100&page='+page);
            if(!more||!more.length)break;
            batch=batch.concat(more);
            if(more.length<100)break;
            page++;
        }
    }
    for(var i=batch.length-1;i>=0;i--){if(!batch[i].private)return batch[i].incoming!==false}
    return true;
}

var _progBar,_progFill;
function showProg(done,total){
    if(!_progBar){_progBar=document.getElementById('prog');_progFill=document.getElementById('prog-fill')}
    if(total>0){_progBar.style.display='block';_progFill.style.width=Math.round(done/total*100)+'%'}
    else if(_progBar.style.display!=='none'){_progFill.style.width='100%';setTimeout(function(){_progBar.style.display='none';_progFill.style.width='0'},350)}
}
async function loadAll(){
    document.getElementById('list').innerHTML='<div class="loading-msg">Loading tickets</div>';
    showProg(0,1);
    const lists=await Promise.all([2,3,8].map(st=>fetchByStatus(st)));
    const seen=new Set();
    D.allOpen=[].concat(...lists).filter(t=>{if(seen.has(t.id))return false;seen.add(t.id);return true});
    D.lr={};
    var craw=JSON.parse(localStorage.getItem('fd_cache4')||'{}');
    const cache=craw._v===6?craw:{_v:6};
    let done=0;const total=D.allOpen.length;
    var _loadThrottle=0;function tick(){done++;showProg(done,total);if(!_loadThrottle){_loadThrottle=setTimeout(function(){_loadThrottle=0;applyFilter()},2000)}}
    D.allOpen.forEach(function(t){
        var c=cache[t.id];
        if(c&&c.u===t.updated_at&&c.rn&&c.rn!=='Unknown'){D.lr[t.id]=!!c.lr;t._reqName=c.rn;t._company=c.co;tick()}
    });
    applyFilter();
    await Promise.all(D.allOpen.filter(function(t){return !cache[t.id]||cache[t.id].u!==t.updated_at}).map(function(t){
        var lr=checkLastReply(t.id).catch(function(){return true});
        var det=get('tickets/'+t.id+'?include=requester,company').catch(function(){return null});
        return Promise.all([lr,det]).then(function(r){
            D.lr[t.id]=!!r[0];
            t._reqName=r[1]&&r[1].requester?r[1].requester.name:'Unknown';
            t._company=r[1]?coName(r[1]):'';
            if(r[1])cache[t.id]={u:t.updated_at,lr:r[0],rn:t._reqName,co:t._company};
            else cache[t.id]={u:null,lr:r[0],rn:t._reqName,co:t._company};
            tick();
        });
    }));
    applyFilter();showProg(0,0);
    try{localStorage.setItem('fd_cache4',JSON.stringify(cache))}catch(e){}
}

async function loadNewTickets(){
    try{
        if(!D._teamIds){
            let allAgents=[],apg=1;
            while(true){
                const a=await get('agents?per_page=100&page='+apg);
                allAgents=allAgents.concat(a);
                if(a.length<100)break;
                apg++;
            }
            D._agentMap={};
            allAgents.forEach(a=>{D._agentMap[a.id]=a.contact?a.contact.name:'Agent #'+a.id});
            D._teamIds=allAgents.filter(a=>{
                const n=a.contact?a.contact.name:'';
                return /alexis|ramiro/i.test(n);
            }).map(a=>a.id);
        }
        if(!D._teamIds.length){D.newTks=[];updateNewBadge();return}

        var searchOne=async function(aid){
            let q='"agent_id:'+aid+' AND status:2"',r=[],pg=1;
            while(true){const d=await get('search/tickets?query='+encodeURIComponent(q)+'&page='+pg);const res=d.results||[];r=r.concat(res);if(res.length<30||pg>=10)break;pg++}
            return r;
        };
        var all=[].concat(...await Promise.all(D._teamIds.map(searchOne)));
        D._earlyNewIds=new Set(all.map(function(t){return t.id}));

        var noReply=[];
        var cache=D._cacheNew||(D._cacheNew={});
        await Promise.all(all.map(function(t){
            var c=cache[t.id];
            if(c&&c.u===t.updated_at&&c.ar!==undefined){
                t._reqName=c.rn;t._company=c.co;if(!c.ar)noReply.push(t);return Promise.resolve();
            }
            return get('tickets/'+t.id+'?include=stats,requester,company').then(function(d){
                var replied=!!(d.stats&&d.stats.agent_responded_at);
                t._reqName=d.requester?d.requester.name:'Unknown';
                t._company=coName(d);
                cache[t.id]={u:t.updated_at,rn:t._reqName,co:t._company,ar:d.stats?d.stats.agent_responded_at:null};
                if(!replied)noReply.push(t);
            }).catch(function(){noReply.push(t)});
        }));
        try{localStorage.setItem('fd_cache_new',JSON.stringify(cache))}catch(e){}
        D.newTks=noReply.sort(function(a,b){return a.created_at<b.created_at?-1:a.created_at>b.created_at?1:0});
        D._earlyNewIds=null;
        updateNewBadge();
    }catch(e){D.newTks=[];updateNewBadge()}
}

function updateNewBadge(){
    const c=D.newTks.length;
    const badge=document.getElementById('new-badge');
    if(c>0){badge.textContent=c;badge.style.display='inline-flex'}
    else{badge.style.display='none'}
}

function applyFilter(){
    var newIds=D._earlyNewIds||new Set(D.newTks.map(function(t){return t.id}));
    _newIdSet=newIds;
    if(D.fl==='new'){
        D.tks=D.newTks.slice();
    }
    else if(D.fl===2)D.tks=D.allOpen.filter(t=>D.lr[t.id]===true&&!D.pending.has(t.id)&&!newIds.has(t.id)).sort(function(a,b){return a.updated_at<b.updated_at?-1:a.updated_at>b.updated_at?1:0});
    else if(D.fl===4)D.tks=D.allOpen.filter(t=>D.pending.has(t.id)).sort(function(a,b){return b.updated_at<a.updated_at?-1:b.updated_at>a.updated_at?1:0});
    else if(D.fl===3)D.tks=D.allOpen.filter(t=>D.lr[t.id]===false&&!D.pending.has(t.id)&&!newIds.has(t.id)).sort(function(a,b){return b.updated_at<a.updated_at?-1:b.updated_at>a.updated_at?1:0});
    else D.tks=D.allOpen.slice().sort(function(a,b){return b.created_at<a.created_at?-1:b.created_at>a.created_at?1:0});
    D.pgs=1;
    rl();up();
    function setBadge(id,c){var b=document.getElementById(id);if(c>0){var changed=b.textContent!==String(c);b.textContent=c;b.style.display='inline-flex';if(changed){b.style.animation='none';b.offsetHeight;b.style.animation='countPulse .3s ease'}}else{b.style.display='none'}}
    var turnC=0,pendC=0,waitC=0;
    D.allOpen.forEach(function(t){if(D.pending.has(t.id))pendC++;else if(newIds.has(t.id)){}else if(D.lr[t.id]===true)turnC++;else if(D.lr[t.id]===false)waitC++});
    setBadge('turn-badge',turnC);
    setBadge('pend-badge',pendC);
    setBadge('wait-badge',waitC);
    setBadge('all-badge',D.allOpen.length);
}

async function load(){
    document.getElementById('list').innerHTML='<div class="loading-msg">Loading</div>';
    try{
        if(D.aid){
            if(D.fl==='new'){if(D.newTks.length===0)await loadNewTickets();applyFilter()}
            else if(D.allOpen.length===0){await loadAll()}
            else{applyFilter()}
        }else{
            D.tks=await get('tickets?per_page=100&page='+D.pg+'&order_by=updated_at&order_type=desc&include=requester');
            rl();up();
        }
    }catch(e){document.getElementById('list').innerHTML='<div class="empty-msg">'+esc(e.message)+'</div>'}
}

var _newIdSet=new Set();
function rl(){
    var el=document.getElementById('list');
    if(!D.tks.length){el.innerHTML='<div class="empty-msg">No tickets</div>';return}
    var curId=D.cur?D.cur.id:0,now=Date.now(),h='';
    for(var j=0;j<D.tks.length;j++){
        var t=D.tks[j];
        var ac=t.id===curId?' active':'';
        var rq=t._reqName||(t.requester?t.requester.name:'Unknown');
        var co=t._company||'';
        var sub=co?(esc(rq)+' &middot; '+esc(co)):esc(rq);
        var ind='',ic='';
        if(_newIdSet.has(t.id)){ind='new';ic='NEW'}
        else if(D.pending.has(t.id)){ind='pend';ic='PENDING'}
        else if(D.lr[t.id]===true){ind='yours';ic='YOUR TURN'}
        else if(D.lr[t.id]===false){ind='wait';ic='WAITING'}
        h+='<div class="tkt'+ac+'" onclick="sel('+t.id+')" onmouseenter="prefetch('+t.id+')" oncontextmenu="return tkCtx(event,'+t.id+')"><div class="pri" style="background:'+(PC[t.priority]||'var(--g300)')+'"></div><div class="col"><div class="ttl">#'+t.id+' '+esc(t.subject||'')+'</div><div class="sub">'+sub+'</div></div><div class="right"><div class="time">'+ago(new Date(t.updated_at))+'</div>'+(ind?'<div class="indicator '+ind+'">'+ic+'</div>':'')+'</div></div>';
    }
    el.innerHTML=h;
}
function rlActive(id){
    var prev=document.querySelector('.tkt.active');
    if(prev)prev.classList.remove('active');
    var all=document.getElementById('list').children;
    for(var i=0;i<all.length;i++){if(all[i].getAttribute('onclick')==='sel('+id+')')all[i].classList.add('active')}
}

function tkCtx(e,id){
    e.preventDefault();
    var old=document.getElementById('tk-ctx');if(old)old.remove();
    var isPend=D.pending.has(id);
    var isYours=D.lr[id]===true&&!isPend;
    var isWait=D.lr[id]===false&&!isPend;
    if(!isYours&&!isWait&&!isPend)return false;
    var m=document.createElement('div');m.id='tk-ctx';m.className='ctx-menu';
    m.style.left=e.clientX+'px';m.style.top=e.clientY+'px';
    if(isYours){
        var opt=document.createElement('div');opt.textContent='Move to Pending';
        opt.onclick=function(){m.remove();markPending(id)};m.appendChild(opt);
    }else if(isWait){
        var opt=document.createElement('div');opt.textContent='Move to Pending';
        opt.onclick=function(){m.remove();D.pending.add(id);savePending();applyFilter()};m.appendChild(opt);
    }else{
        var back=D.lr[id]===false?'Move back to Waiting':'Move back to My Turn';
        var opt=document.createElement('div');opt.textContent=back;
        opt.onclick=function(){m.remove();unmarkPending(id)};m.appendChild(opt);
    }
    document.body.appendChild(m);
    var close=function(){if(m.parentNode)m.remove();document.removeEventListener('click',close)};
    setTimeout(function(){document.addEventListener('click',close,{once:true})},0);
    return false;
}

var _selCache={};
var _prefetching={};
function prefetch(id){
    if(_selCache[id]||_prefetching[id])return;
    _prefetching[id]=true;
    Promise.all([
        get('tickets/'+id+'?include=requester,company').catch(function(){return null}),
        get('tickets/'+id+'/conversations?per_page=100').catch(function(){return[]})
    ]).then(function(r){
        var t=r[0],cvs=r[1]||[];
        if(!t){delete _prefetching[id];return}
        t._company=coName(t);
        _selCache[id]={t:t,cvs:cvs,ts:Date.now()};
        delete _prefetching[id];
    }).catch(function(){delete _prefetching[id]});
}
async function sel(id){
    _memoKey='';_memoMsgs=null;_memoAna=null;_replyCache={};
    var cached=_selCache[id];
    if(cached&&Date.now()-cached.ts<900000){
        D.cur=cached.t;D.cvs=cached.cvs;window._langOverride=null;rlActive(id);renderRight();
        return;
    }
    var stub=D.allOpen.find(function(t){return t.id===id})||D.newTks.find(function(t){return t.id===id});
    if(stub){
        document.getElementById('hdr').innerHTML='<div class="hdr-box"><h1>#'+id+' — '+esc(stub.subject||'')+'</h1><div class="chips">'
            +'<span class="chip '+(SCLS[stub.status]||'')+'">'+(SN[stub.status]||stub.status)+'</span>'
            +'<span class="chip '+(PCLS[stub.priority]||'')+'">'+(PN[stub.priority]||'?')+'</span>'
            +'<span class="chip chip-meta">'+esc(stub._reqName||(stub.requester?stub.requester.name:''))+'</span>'
            +'</div></div>';
        document.getElementById('tab-bar').innerHTML='';
    }else{
        document.getElementById('hdr').innerHTML='';
        document.getElementById('tab-bar').innerHTML='';
    }
    document.getElementById('content').innerHTML='<div class="loading-msg">Loading</div>';
    try{
        var r=await Promise.all([
            get('tickets/'+id+'?include=requester,company',{priority:1}),
            get('tickets/'+id+'/conversations?per_page=100',{priority:1}).catch(function(){return[]})
        ]);
        var t=r[0],firstPage=r[1]||[];
        if(!t.requester&&t.requester_id){try{t.requester=await get('contacts/'+t.requester_id,{priority:1})}catch(e){}}
        t._company=coName(t);
        var allConvs=firstPage.slice();
        if(firstPage.length>=100){
            var pg=2;
            while(true){
                var page=await get('tickets/'+id+'/conversations?per_page=100&page='+pg,{priority:1});
                if(!page||!page.length)break;
                allConvs=allConvs.concat(page);
                if(page.length<100)break;
                pg++;
            }
        }
        _selCache[id]={t:t,cvs:allConvs,ts:Date.now()};
        D.cur=t;D.cvs=allConvs;window._langOverride=null;rlActive(id);renderRight();
    }catch(e){document.getElementById('content').innerHTML='<div class="empty-msg">'+esc(e.message)+'</div>'}
}

    const l=L[lang];

    if(a.sit==='new'){
        const kbHits=matchKB(issueText,new Set());

        if(kbHits.length&&!intentBody){

                let kbBody=kb[lang];

            R.push({g:gAlt,nm:l.suggestRemoteNm,

async function tryOllama(sys,usr,analysis){
    var model=window._ollamaModel||'qwen2.5:7b';
    const ta=document.getElementById('custom-reply');
    const resp=await fetch('/ollama',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:model,messages:[{role:'system',content:sys},{role:'user',content:usr}],stream:true,think:false,keep_alive:-1,options:{temperature:0.2,num_predict:200,num_ctx:4096,top_p:0.8,repeat_penalty:1.3}})
    });
    if(!resp.ok)throw new Error('Ollama '+resp.status);
    const reader=resp.body.getReader();
    const dec=new TextDecoder();
    let reply='',buf='';
    while(true){
        const{done,value}=await reader.read();
        if(done)break;
        buf+=dec.decode(value,{stream:true});
        const lines=buf.split('\n');
        buf=lines.pop();
        for(const ln of lines){
            if(!ln.trim())continue;
            try{
                const chunk=JSON.parse(ln);
                if(chunk.message&&chunk.message.content){
                    reply+=chunk.message.content;
                    if(ta){ta.value=reply;ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';}
                }
            }catch(e){}
        }
    }
    if(buf.trim()){try{const chunk=JSON.parse(buf);if(chunk.message&&chunk.message.content)reply+=chunk.message.content}catch(e){}}
    var rc=window._replyCtx;
    if(rc&&analysis){
        var validated=AIPipeline.validate(reply,analysis,rc);
        reply=validated.text;
    }
    return{reply,provider:'Ollama ('+model+')'};
}

/* =============== ANALYSIS ENGINE =============== */
var _memoMsgs=null,_memoAna=null,_memoKey='';
function _mKey(){return D.cur?D.cur.id+':'+D.cvs.length:''}
function memoMsgs(t,c){var k=_mKey();if(k===_memoKey&&_memoMsgs)return _memoMsgs;_memoKey=k;_memoMsgs=msgs(t,c);_memoAna=null;return _memoMsgs}
function memoAna(t,c){if(_memoAna)return _memoAna;var m=memoMsgs(t,c);_memoAna=ana(t,m);return _memoAna}
function msgs(t,c){
    const r=[];
    const desc=t.description_text||strip(t.description||'');
    const reqName=t.requester?t.requester.name:'Customer';
    if(desc)r.push({f:'Customer',t:desc,d:t.created_at,who:reqName});
    c.forEach(x=>{
        const f=x.private?'Note':(x.incoming?'Customer':'Agent');
        const who=x.incoming?nameFromEmail(x.from_email)||reqName:(x.from_email||'Agent');
        r.push({f:f,t:x.body_text||strip(x.body||''),d:x.created_at,who:who});
    });
    return r;
}

function ana(t,m){
    const age=Math.floor((Date.now()-new Date(t.created_at))/864e5);
    const stale=Math.floor((Date.now()-new Date(t.updated_at))/864e5);
    const pub=m.filter(x=>x.f!=='Note'),last=pub[pub.length-1];
    const nc=m.filter(x=>x.f==='Customer').length,na=m.filter(x=>x.f==='Agent').length;
    const txt=m.map(x=>x.t.toLowerCase()).join(' ');

    let sit,lbl,ico;
    if(nc>0&&na===0){sit='new';lbl='New ticket — needs your first response';ico='⚡'}
    else if(last&&last.f==='Customer'){sit='respond';lbl='Customer replied — your turn to respond';ico='✉️'}
    else{sit='waiting';lbl='Waiting for customer response';ico='⏳'}
    if(stale>=7&&sit==='waiting'){sit='followup';lbl='No response in '+stale+' days — time to follow up';ico='🔔'}

    return{sit,lbl,ico,age,stale,nc,na,tot:m.length,topics:findTopics(txt),steps:nextSteps(sit,findTopics(txt),stale)};
}

function findTopics(t){
    const M={'Remote Session':/teamviewer|remote.*(session|support|access)|anydesk/i,'Installation':/install|setup|deploy|upgrade|migration/i,'Error':/error|crash|exception|fail|broken|not.work/i,'Config':/config|setting|parameter|property/i,'BRM/KBR':/brm|kbr|business.rule|script/i,'License':/license|activation|serial/i,'Database':/database|db|sql|connection.string/i,'Network':/socket|network|tcp|port|firewall/i,'Export':/export|xslt|csv|xml|output/i,'Inspection':/inspect|defect|result|barcode|pcb|spi|aoi/i,'Quote':/quote|quotat|price|cost|purchase|po\b/i,'Calibration':/calibrat|alignment|offset/i,'Update':/update|patch|version|release|firmware/i};
    return Object.entries(M).filter(([,r])=>r.test(t)).map(([k])=>k);
}

function nextSteps(sit,top,stale){
    const s=[];
    if(sit==='new'){s.push('Send first response acknowledging the issue');if(top.includes('Error'))s.push('Ask for screenshots, logs, and software version');if(top.includes('Remote Session'))s.push('Schedule TeamViewer session');if(top.includes('Quote'))s.push('Prepare quotation')}
    else if(sit==='respond'){s.push("Read customer's latest reply and respond");if(top.some(x=>['Remote Session','Error','Inspection'].includes(x)))s.push('Consider scheduling a remote session')}
    else if(sit==='waiting'){s.push('No action needed yet');if(stale>=3)s.push('Send a follow-up in a few days')}
    else if(sit==='followup'){s.push('Send follow-up message ('+stale+'d without response)');if(stale>=14)s.push('Consider closing if no reply after follow-up')}
    return s;
}

        }else{
            var ql=q.toLowerCase();
            var local=D.allOpen.concat(D.newTks||[]).filter(function(t){
                if(t.subject&&t.subject.toLowerCase().indexOf(ql)!==-1)return true;
                var rn=t._reqName||(t.requester?t.requester.name:'');

function cleanSignature(html){
    if(!html)return '';
    html=html.replace(/&nbsp;/gi,' ');
    html=html.replace(/\{\{[^}]*\}\}/g,'');
    html=html.replace(/(hola\s+hello|hello\s+hola|hola|hello|hi|hey|dear|buenos\s+d[ií]as|buenas\s+tardes|buen\s+d[ií]a|estimado)[,.\s]*/i,'');
    html=html.replace(/(saludos\s+cordiales\s*[\/,.\s]*best\s+regards|best\s+regards\s*[\/,.\s]*saludos\s+cordiales|saludos\s+cordiales|best\s+regards|kind\s+regards|sincerely|cordialmente|atentamente)\s*[,.]*/i,'');
    for(var i=0;i<3;i++)html=html.replace(/<(div|p|span)[^>]*>(\s|<br\s*\/?>)*<\/\1>/gi,'');
    html=html.replace(/(<br\s*\/?\s*>\s*){3,}/gi,'<br><br>');
    html=html.replace(/^(\s*(<br\s*\/?>)\s*)*/gi,'');
    return html;
}

function _buildCcList(){
    if(!D.cur)return[];
    const s=new Set();
    (D.cur.cc_emails||[]).forEach(function(e){s.add(e)});

    (D.cur.ticket_cc_emails||[]).forEach(function(e){s.add(e)});
    return Array.from(s).filter(function(e){return e&&e.indexOf('@')>0});
}

            await fetch('/fd/tickets/'+D.cur.id,{
                method:'PUT',
                headers:{'X-FD-Key':D.key,'X-FD-Domain':D.dom,'Content-Type':'application/json'},
                body:JSON.stringify({status:4})
            }).catch(function(){});
            D.cur.status=4;
        }else if(D.cur.status===2&&D.aid){
            await fetch('/fd/tickets/'+D.cur.id,{
                method:'PUT',
                headers:{'X-FD-Key':D.key,'X-FD-Domain':D.dom,'Content-Type':'application/json'},
                body:JSON.stringify({status:3,responder_id:Number(D.aid)})
            }).catch(function(){});
        }

        window._attachments=[];
        statusEl.className='send-modal-status ok';
        statusEl.textContent=window._resolveOnSend
            ?(esL?'Enviado y ticket cerrado':'Reply sent & ticket resolved')
            :(esL?'Enviado correctamente':'Reply sent successfully');
        sendBtn.style.display='none';

        if(rc){
            var sent=text;
            if(window._aiOriginal&&window._aiOriginal!==sent){
                var w1=window._aiOriginal.toLowerCase().split(/\s+/);
                var w2=sent.toLowerCase().split(/\s+/);
                var cm=w1.filter(function(w){return w2.indexOf(w)>=0}).length;
                var sim=cm/Math.max(w1.length,w2.length,1);
                if(sim<0.85){
                    AIPipeline.saveCorrection(window._aiOriginal,sent,rc.lang);
                    statusEl.textContent+=(esL?' (corrección guardada)':' (correction saved)');
                }
            }
            window._aiOriginal=null;
        }

        try{var r6=JSON.parse(localStorage.getItem('fd_resp6')||'{}');r6[D.cur.id]=true;localStorage.setItem('fd_resp6',JSON.stringify(r6));_statsNoResp.delete(D.cur.id);if(_statsCache.resp6)_statsCache.resp6[D.cur.id]=true}catch(e){}

        if(window._resolveOnSend){
            D.allOpen=D.allOpen.filter(t=>t.id!==D.cur.id);
            delete D.lr[D.cur.id];
            D.pending.delete(D.cur.id);
            savePending();
            applyFilter();
            setTimeout(()=>{closeSendModal();D.cur=null;document.getElementById('content').innerHTML=''},1200);
        }else{
            D.lr[D.cur.id]=false;
            try{var c4=JSON.parse(localStorage.getItem('fd_cache4')||'{}');if(c4[D.cur.id]){c4[D.cur.id].lr=false;c4[D.cur.id].u=null;localStorage.setItem('fd_cache4',JSON.stringify(c4))}}catch(e){}
            var wasNew=D.newTks.some(t=>t.id===D.cur.id);
            if(wasNew){
                var tk=D.newTks.find(t=>t.id===D.cur.id);
                D.newTks=D.newTks.filter(t=>t.id!==D.cur.id);
                updateNewBadge();
                if(tk&&!D.allOpen.some(t=>t.id===tk.id))D.allOpen.push(tk);
                try{if(D._cacheNew)delete D._cacheNew[D.cur.id];localStorage.setItem('fd_cache_new',JSON.stringify(D._cacheNew||{}))}catch(e){}
            }
            applyFilter();
            setTimeout(()=>{closeSendModal();sel(D.cur.id)},1200);
        }
    }catch(e){
        statusEl.className='send-modal-status err';
        statusEl.textContent=(esL?'Error: ':'Error: ')+e.message;
        sendBtn.disabled=false;
    }
}

/* =============== HEARTBEAT / SHUTDOWN =============== */
setInterval(()=>{fetch('/heartbeat').catch(()=>{})},15000);
</script>
